name: Clean Stale Actions Caches

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 0'   # weekly – Sunday 03:00 UTC

permissions:
  actions: write
  pull-requests: read

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - name: Clean stale GitHub Actions caches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import subprocess, json, sys, os
          from datetime import datetime, timezone, timedelta

          REPO = os.environ["GH_REPO"]
          NOW  = datetime.now(timezone.utc)

          def api(path, method="GET"):
              r = subprocess.run(
                  ["gh", "api", "-X", method, f"repos/{REPO}/{path}"],
                  capture_output=True, text=True,
              )
              if r.returncode != 0:
                  if method == "DELETE" and ("404" in r.stderr or "409" in r.stderr):
                      return None  # already gone
                  print(f"[WARN] {method} {path}: {r.stderr.strip()}", file=sys.stderr)
                  return {} if method == "GET" else None
              return json.loads(r.stdout) if r.stdout.strip() else ({} if method == "GET" else None)

          def paginate(path, key=None, max_pages=10):
              items, page = [], 1
              while page <= max_pages:
                  sep = "&" if "?" in path else "?"
                  data = api(f"{path}{sep}per_page=100&page={page}")
                  chunk = (data.get(key, []) if isinstance(data, dict) and key
                           else (data if isinstance(data, list) else []))
                  if not chunk:
                      break
                  items.extend(chunk)
                  if len(chunk) < 100:
                      break
                  page += 1
              return items

          # -- before -------------------------------------------------------
          ub = api("actions/cache/usage")
          before_bytes = ub.get("active_caches_size_in_bytes", 0)

          # -- PR lookup tables ---------------------------------------------
          open_pr_nums       = set()
          open_pr_branches   = set()
          recent_pr_nums     = set()   # merged < 24 h -> protect
          recent_pr_branches = set()
          old_pr_nums        = set()   # merged >= 24 h -> deletable
          old_pr_branches    = set()

          for pr in paginate("pulls?state=open"):
              open_pr_nums.add(pr["number"])
              open_pr_branches.add(pr["head"]["ref"])

          # scan up to 500 recently-updated closed PRs to capture recent merges
          for pr in paginate("pulls?state=closed&sort=updated&direction=desc", max_pages=5):
              if not pr.get("merged_at"):
                  continue
              n  = pr["number"]
              br = pr["head"]["ref"]
              ma = datetime.fromisoformat(pr["merged_at"].replace("Z", "+00:00"))
              if (NOW - ma) < timedelta(hours=24):
                  recent_pr_nums.add(n)
                  recent_pr_branches.add(br)
              else:
                  old_pr_nums.add(n)
                  old_pr_branches.add(br)

          # -- scan caches --------------------------------------------------
          caches = paginate("actions/caches", key="actions_caches", max_pages=20)
          total  = len(caches)

          kept = {"on-main": 0, "open-PR": 0, "merged-within-24h": 0, "unknown-ref": 0}
          deleted_count = 0
          deleted_bytes = 0
          unknown_entries = []

          for c in caches:
              ref  = c["ref"]
              cid  = c["id"]
              size = c.get("size_in_bytes", 0)

              # Safety rule 1: main is always protected
              if ref == "refs/heads/main":
                  kept["on-main"] += 1
                  continue

              # Pull-request cache: refs/pull/<N>/merge
              if ref.startswith("refs/pull/") and ref.endswith("/merge"):
                  try:
                      n = int(ref.split("/")[2])
                  except (IndexError, ValueError):
                      kept["unknown-ref"] += 1
                      unknown_entries.append(c)
                      continue
                  if n in open_pr_nums:
                      kept["open-PR"] += 1
                      continue
                  if n in recent_pr_nums:
                      kept["merged-within-24h"] += 1
                      continue
                  if n in old_pr_nums:
                      api(f"actions/caches/{cid}", method="DELETE")
                      deleted_count += 1
                      deleted_bytes += size
                      continue
                  # PR not in any list -> unknown, skip
                  kept["unknown-ref"] += 1
                  unknown_entries.append(c)
                  continue

              # Branch cache: refs/heads/<branch>
              if ref.startswith("refs/heads/"):
                  branch = ref[len("refs/heads/"):]
                  if branch in open_pr_branches:
                      kept["open-PR"] += 1
                      continue
                  if branch in recent_pr_branches:
                      kept["merged-within-24h"] += 1
                      continue
                  if branch in old_pr_branches:
                      api(f"actions/caches/{cid}", method="DELETE")
                      deleted_count += 1
                      deleted_bytes += size
                      continue
                  # Branch not tied to any known PR -> unknown, skip
                  kept["unknown-ref"] += 1
                  unknown_entries.append(c)
                  continue

              # Any other ref pattern -> unknown, skip
              kept["unknown-ref"] += 1
              unknown_entries.append(c)

          # -- after --------------------------------------------------------
          ua = api("actions/cache/usage")
          after_bytes = ua.get("active_caches_size_in_bytes", 0)

          def gb(b): return b / 1_073_741_824

          print(f"\n{'='*56}")
          print(f"CACHE CLEANUP SUMMARY  --  {REPO}")
          print(f"{'='*56}")
          print(f"Total scanned         : {total}")
          print(f"Deleted               : {deleted_count}  ({gb(deleted_bytes):.2f} GB freed)")
          print(f"Kept - on-main        : {kept['on-main']}")
          print(f"Kept - open-PR        : {kept['open-PR']}")
          print(f"Kept - merged <24 h   : {kept['merged-within-24h']}")
          print(f"Kept - unknown-ref    : {kept['unknown-ref']}")
          print(f"Before                : {gb(before_bytes):.3f} GB")
          print(f"After                 : {gb(after_bytes):.3f} GB")
          if unknown_entries:
              print("\nUnknown-ref entries skipped (inspect manually):")
              for e in unknown_entries:
                  sz = e.get("size_in_bytes", 0) / 1_048_576
                  print(f"  ref={e['ref']}  size={sz:.1f} MB  key={str(e.get('key',''))[:60]}")
          PYEOF

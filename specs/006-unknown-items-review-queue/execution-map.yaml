# 006-unknown-items-review-queue — Execution Map (Agent OS v1)
#
# Authoritative state of the 006 spec for Maestro dispatch. Mirrors the task
# plan in tasks.md but adds: slice status, agent assignments, allowed files,
# validation contracts, parallel-safety semantics.
#
# 006 is a DOCS-ONLY feature. Every slice below carries `type: docs` and
# touches only documentation under `specs/006-unknown-items-review-queue/**`
# or the documented coordination surfaces (`CLAUDE.md`, `005/wave-status.md`).
# No slice writes application code, schema, OpenAPI YAML, or UI artefacts.
# No slice touches a `[GATED]` path; `approval_required: false` everywhere.
#
# Schema reference: docs/agent-os/slice-schema.yaml
# Wave summary:     specs/006-unknown-items-review-queue/wave-status.md
# Brief source:     specs/006-unknown-items-review-queue/tasks.md
#                   (each slice's full brief lives in tasks.md; this file
#                   provides the dispatch-time schema fields only)
#
# Updated: 2026-05-24 — initial authoring, after PR #308 push of commit
# `7cfe25c` (CodeRabbit response). All 23 slices at `status: proposed`.

spec: 006-unknown-items-review-queue
version: 1

# 015-pos-sale-posting-to-erpnext — Execution Map (Agent OS v1)
#
# Authoritative state of the 015 spec for Maestro dispatch. Mirrors the task
# plan in tasks.md but adds: slice status, agent assignments, allowed files,
# validation contracts, parallel-safety, and the GATED-first serialization.
#
# 015 is the KEYSTONE of the ERPNext arc: it turns a PROCESSED 008 sale (and its
# void/refund terminal events) into ERPNext accounting truth by serving the FIXED
# 012 pull/feed contract (erpnext-connector/posting-feed.yaml). DP2 exposes the
# feed of pending posting work-items (connectorPullPostings) and ingests outcomes
# (connectorAckOutcome); it makes NO outbound HTTP calls and holds NO ERPNext
# credentials — the connector (separate repo, ADR 0008) is the only ERPNext-calling
# component. Posting-time item/warehouse resolution (015-RESOLVE) is DP2-side; an
# unresolvable line/store fails-to-DLQ BEFORE the work-item is offered.
#
# The OQs are RATIFIED by the SIGNED owner rider (011-DR-POSTING-R1, 2026-06-05):
# interim Sales-Invoice-only / outstanding-AR mode (R1/OQ-7); DP2-side resolution
# (R2/OQ-8-bis); fail-to-DLQ postures (R3/R4/R5 — OQ-5/6/8). Payment Entry is a
# LATER, separately-gated arc (DP2 tender model → 012 payment extension → connector
# PE → payment repair) — NOT in 015.
#
# TWO slices are `[GATED]` (Constitution §IV/§VIII, Standing Rules §3), both under
# packages/db/**:
#   - 015-EVENT-TYPE → register erpnext.posting.requested in OUTBOX_EVENT_TYPES
#                      (packages/db/src/outbox/producer.ts) — the 008-LIVELOOP
#                      sale.captured registration (#496) is the precedent.
#   - 015-SCHEMA     → new erpnext_posting_status Drizzle schema + migration under
#                      packages/db/** (next number after 0018, 0019 indicative;
#                      paired *.down.sql, lock-duration review; O-3 idempotency
#                      unique on the originating row's own (tenant,source,external);
#                      fail-closed RLS; NO money column).
# Both carry `approval_required: true` and `status: proposed`. They touch DISJOINT
# files within packages/db (the outbox registry vs a new schema+migration) so they
# are parallel_safety: safe with each other, even though both block the feed/ack.
#
# NO 012 CONTRACT slice: the DP2-side feed/ack implements the FIXED posting-feed.yaml
# (read-only input); the rider-R2 SaleLine.erpnextItemRef correction it needed is
# already on main (#494). Any further contract change is a separate [GATED] 012 slice.
#
# IMPORTANT: authoring this map does NOT authorize the first dispatch. The first
# slice touching packages/db / apps/api is a new threshold the owner crosses
# explicitly. 015-SIGNOFF-STATE (T001) — the new-state-table decision — must be
# recorded before 015-SCHEMA dispatches (mirrors 010-SIGNOFF-READONLY).
#
# The DLQ drain + reconciliation RUN + repair API (015-DLQ-DRAIN) belongs to 017,
# which has NO spec yet — listed `status: proposed`, hard non-dispatchable. Payment
# Entry posting (015-PAYMENT-ENTRY) is a later separately-gated arc — also non-
# dispatchable here.
#
# Schema reference: docs/agent-os/slice-schema.yaml
# Wave summary:     specs/015-pos-sale-posting-to-erpnext/wave-status.md
# Brief source:     specs/015-pos-sale-posting-to-erpnext/tasks.md
#
# Predecessor docs on main: 012 MERGED (#476/#479/#481/#482 + #494 erpnextItemRef);
# 013 CLOSED (#489); 008 CLOSED + DP-008-LIVELOOP SHIPPED (#496/#497); 014-CRUD
# MERGED (#495 — erpnext_warehouse_map / 0018). gated_by the SIGNED posting +
# stock-impact decisions (011-DR-POSTING + 011-DR-STOCK-IMPACT) + the 2026-06-05 rider.
#
# Status: 015 implementation NOT STARTED — planning chain (spec/plan/data-model/
# tasks) + this map authored on branch docs/015-plan (off origin/main). No slice
# dispatched yet. MVP = 015-US1-FEED (serve the posting feed, happy path) once the
# two [GATED] foundational slices + the isolation harness land.
#
# Updated: 2026-06-06 — initial authoring (post /speckit-tasks + /speckit-analyze).
#          OQs RATIFIED by the 2026-06-05 owner rider at spec time; the new-state-
#          table decision recommended at data-model time (T001 [SIGN-OFF]).
#          /speckit-analyze: 0 critical / 0 high; 2 medium (spec §13 stale prereqs,
#          derived-stories note) REMEDIATED.

version: 1

base: origin/main

# ============================================================================
# findings
# ============================================================================

findings:
  - id: REVERSAL-CARDINALITY
    severity: resolved
    note: >
      The O-3 idempotency unique on erpnext_posting_status is keyed on the
      ORIGINATING ROW's own (tenant_id, source_system, external_id) — a sale's for
      sale_post, the terminal event's for reversal — mirroring 008's per-table
      dedup. Keying on the parent sale would wrongly permit only ONE reversal per
      sale and permanently block a 2nd partial refund. Verified against 0012
      (sale_voids / sale_refunds are append-only, each with its own per-row unique).
      Guarded explicitly by T052 (US3) + the 015-SCHEMA unique. See data-model §5.
  - id: STATE-TABLE-SIGNOFF
    severity: open-decision
    note: >
      The new erpnext_posting_status table is a recommended-but-not-self-approved
      decision (derive-on-read is infeasible — no source for documentRef / posting
      status; cannot satisfy O-3). Recorded as 015-SIGNOFF-STATE (T001), which must
      be confirmed before 015-SCHEMA dispatches. Mirrors 010-SIGNOFF-READONLY.


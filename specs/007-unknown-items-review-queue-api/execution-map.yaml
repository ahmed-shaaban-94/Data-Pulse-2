        expected: GREEN — reopen on resolved → 409 already-reconciled + details.prior_state; pending-sibling → already-pending no-duplicate; same Idempotency-Key+body → one fresh row same response; changed body → idempotency_key_conflict (FR-043, FR-063, SC-005).

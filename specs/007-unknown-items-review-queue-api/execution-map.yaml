# 007-unknown-items-review-queue-api — Execution Map (Agent OS v1)
#
# Authoritative state of the 007 spec for Maestro dispatch. Mirrors the task
# plan in tasks.md but adds: slice status, agent assignments, allowed files,
# validation contracts, parallel-safety semantics, and the GATED-first
# serialization edge.
#
# 007 is a CODE feature (NestJS api app). Unlike 006 (docs-only), most slices
# carry `type: feat` / `test` and touch application code under
# `apps/api/src/catalog/**` and `apps/api/test/catalog/**`. ONE slice is
# `[GATED]` — 007-CONTRACT touches the forbidden surface
# `packages/contracts/openapi/catalog/unknown-items.yaml` (Constitution
# §IV/§VIII, Standing Rules §3) and carries `approval_required: true`.
#
# 007 is an EXTENSION of the shipped 005 unknown-items surface, NOT a
# greenfield build (tasks.md §0). The genuine delta: inspect (GET /{id}),
# reopen, bulk-dismiss, list-param extensions, the `forbidden` 8th error
# category, and the `ReviewQueueItem` projection (omits `sale_context`).
# US4/US5/US6 are regression guards over shipped ops, not reimplementation.
#
# Schema reference: docs/agent-os/slice-schema.yaml
# Wave summary:     specs/007-unknown-items-review-queue-api/wave-status.md
# Brief source:     specs/007-unknown-items-review-queue-api/tasks.md
#                   (each slice's full RED/GREEN brief, Predecessors, and
#                   Acceptance live in tasks.md; this file provides the
#                   dispatch-time schema fields only.)
#
# Slicing convention (005-style, NOT 006-style 1:1): each capability slice
# folds its RED test task(s) + GREEN implementation task(s) into one
# dispatchable unit, because a worker writes the failing test and makes it
# pass within one worktree. `task_ids` is therefore list-valued. Every
# tasks.md ID T001..T076 (43 distinct) is assigned to exactly one slice's
# `task_ids` — verified at authoring time.
#
# Updated: 2026-05-29 — WAVE 1 IN FLIGHT.
#   - 007-CONTRACT (the [GATED] OpenAPI extension) MERGED to `main` via PR #404
#     (squash f2622ee): ReviewQueueItem schema, 3 new operationIds, `forbidden`
#     code, and list params are all on `main`.
#   - Wave 1 (Phase 2–5, P1 MVP) runtime is IN REVIEW via PR #405 (branch
#     feat/007-wave1-p1-mvp off main @ 9026340): 007-FORBIDDEN-CATEGORY,
#     007-REVIEW-QUEUE-PROJECTION, 007-ISOLATION-HARNESS, 007-US1-LIST-PROJECTION,
#     007-US1-RECONCILIATION-PROJECTION, 007-US2-LIST-EXTENSIONS, 007-US3-INSPECT.
#     These carry `status: in_review` below; the rest stay `proposed` (US7/US8 =
#     Phase 6/7; US4/5/6 = Phase 8 guards; polish + closeout follow).
#   - The planning chain (spec/plan/tasks + analyze + SIGN-OFFs) is on
#     `spec/007-unknown-items-review-queue-api` (aab701d / 45ae621 / 8a97e97).
#   CLOSEOUT (T073) reconciles every slice to its terminal `merged` status with
#   `merged_in_pr` / `merged_at_commit` provenance once the PRs land.

spec: 007-unknown-items-review-queue-api
version: 1
base: origin/main  # da032d2 (PR #398, 005 fully-closed marker, 2026-05-29) — per wave-status "Base"

# ----------------------------------------------------------------------------
# findings
# ----------------------------------------------------------------------------
# 007 has no implementation findings at authoring time (no slice has been
# dispatched). The shipped-code reality deltas (R7.1–R7.5) recorded in
# tasks.md §0 and the two SIGN-OFF verdicts (T002 tighten / T003 isolate)
# in wave-status.md § SIGN-OFF Decisions are PLANNING inputs, not findings —
# they are already absorbed into the relevant slices' briefs and depends_on
# edges below. New findings (e.g. a slice that cannot succeed within its
# allowed_files) get appended here at dispatch time, 005-style.

findings: []

# ----------------------------------------------------------------------------
# slices
# ----------------------------------------------------------------------------
# Slice IDs are descriptive (005-style), each mapping to a tasks.md capability.
# Standard `report_fields` across EVERY slice below (declared once here to
# avoid per-slice repetition, 006-style — Maestro infers this list for any
# slice that omits it):
#   - changed_files
#   - validation_results
#   - forbidden_path_check
#   - confirmation_no_unauthorized_git_ops
#
# `docker_required: true` is set on every Testcontainers-backed integration /
# RLS / cross-tenant validation ([TC] tasks, Constitution §VI). Pure
# build / lint / contract-conformance checks stay `false`.

slices:

  # ===== Phase 1: Setup ======================================================

  - id: 007-SETUP
    task_ids: [T001]
    type: chore
    status: proposed
    approval_required: false
    depends_on: []
    blocks:
      - 007-CONTRACT
      - 007-FORBIDDEN-CATEGORY
      - 007-REVIEW-QUEUE-PROJECTION
      - 007-ISOLATION-HARNESS
    agent: sonnet-api
    allowed_files: []   # T001 is a read-only branch + compile-clean confirmation; no edits expected
    validation:
      - command: pnpm --filter @data-pulse-2/api build
        expected: GREEN — both existing catalog modules (apps/api/src/catalog/unknown-items/, apps/api/src/catalog/reconciliation/) compile clean off latest origin/main.
        docker_required: false
    stop:
      - standing-rules universal stops
      - "stop if the 007 working branch is not off latest origin/main — rebase before proceeding"
      - "stop if either catalog module is missing or does not compile — that is a 005-regression, not a 007 task"
    parallel_safety: safe   # read-only build check, no file overlap

  - id: 007-SIGNOFF-SALE-CONTEXT
    task_ids: [T002]
    type: docs
    # T002 is a [SIGN-OFF] decision gate, DECIDED 2026-05-29 = TIGHTEN (option a, tighten now).
    # slice-schema.yaml has no "decided" status; the verdict is recorded authoritatively in
    # wave-status.md § SIGN-OFF Decisions (and the [x]-marked T002 task line). Status stays
    # `proposed` because nothing is on main; this slice exists to carry the gate edge to the
    # dependent GREEN slices below. No code/doc edit is required from this slice itself.
    status: proposed
    approval_required: false   # decision gate, not a code gate; the verdict is already recorded on-branch
    depends_on: []
    blocks:
      - 007-CONTRACT                       # the version-bump + 005 conformance reconciliation is the tightening mechanism
      - 007-US1-LIST-PROJECTION            # T032 GREEN timing governed by T002
      - 007-US1-RECONCILIATION-PROJECTION  # T038 GREEN timing governed by T002
      - 007-US3-INSPECT                    # T042 inspect projection governed by T002
    agent: opus-maestro
    allowed_files:
      - specs/007-unknown-items-review-queue-api/wave-status.md   # verdict already recorded; re-edit only if the decision changes
    validation:
      - command: 'grep -n "T002 — .sale_context. tightening\|Verdict: TIGHTEN" specs/007-unknown-items-review-queue-api/wave-status.md'
        expected: One match — the TIGHTEN verdict is recorded under the SIGN-OFF Decisions section.
        docker_required: false
    stop:
      - standing-rules universal stops
      - "stop if anyone proposes 'leave sale_context on the shipped list' — that is an FR-007 MUST-NOT violation, only permissible under an explicit (un-granted) FR-007 waiver"
    parallel_safety: safe   # different file from the idempotency SIGN-OFF

  - id: 007-SIGNOFF-IDEMPOTENCY
    task_ids: [T003]
    type: docs
    # T003 is a [SIGN-OFF] decision gate, DECIDED 2026-05-29 = ISOLATE (option b, do not retrofit
    # shipped ops in v1). Only the new reopen + bulk-dismiss carry Idempotency-Key. Consequence:
    # the key-replay clauses in T060–T062 DO NOT apply (regression guards assert monotonic-guard
    # no-duplicate-effect only). Verdict recorded in wave-status.md § SIGN-OFF Decisions.
    status: proposed
    approval_required: false
    depends_on: []
    blocks:
      - 007-US4-LINK-REGRESSION       # T060: no key-replay assertion (isolate)
      - 007-US5-CREATE-REGRESSION     # T061: no key-replay assertion (isolate)
      - 007-US6-DISMISS-REGRESSION    # T062: no key-replay assertion (isolate)
    agent: opus-maestro
    allowed_files:
      - specs/007-unknown-items-review-queue-api/wave-status.md
    validation:
      - command: 'grep -n "T003 — Idempotency-key retrofit\|Verdict: ISOLATE" specs/007-unknown-items-review-queue-api/wave-status.md'
        expected: One match — the ISOLATE verdict is recorded under the SIGN-OFF Decisions section.
        docker_required: false
    stop:
      - standing-rules universal stops
      - "stop if anyone tries to retrofit Idempotency-Key onto shipped link/create/dismiss in v1 — that is an out-of-scope behavior change (recorded as optional future enhancement)"
    parallel_safety: safe

  # ===== Phase 2: Foundational (blocking prerequisites for all user stories) =
  # No user-story slice begins until Phase 2 is complete. The GATED contract
  # (007-CONTRACT) MUST land approved+merged first; every new operation's
  # conformance test asserts against the version-bumped OpenAPI YAML.

  # ----- 2.1 GATED contract extension (the hard serialization point) ---------

  - id: 007-CONTRACT
    task_ids: [T010, T011]
    type: feat
    status: merged   # [GATED] approved + landed on `main` via PR #404 (squash f2622ee)
    merged_in_pr: 404
    merged_at_commit: f2622ee
    approval_required: true   # [GATED] — packages/contracts/openapi/** is a forbidden surface (Constitution §IV/§VIII, Standing Rules §3)
    depends_on:
      - 007-SETUP
      - 007-SIGNOFF-SALE-CONTEXT     # T010 also reconciles 005's sale_context conformance per the TIGHTEN verdict
      - 007-SIGNOFF-IDEMPOTENCY      # T010 declares Idempotency-Key on reopen + bulk-dismiss only per the ISOLATE verdict
    blocks:
      - 007-US1-LIST-PROJECTION
      - 007-US1-RECONCILIATION-PROJECTION
      - 007-US3-INSPECT
      - 007-US7-REOPEN
      - 007-US8-BULK-DISMISS
      - 007-POLISH-AUDIT-SWEEP       # T076 absence-guard checks the post-T010 operationId set
    agent: sonnet-api
    allowed_files:
      - packages/contracts/openapi/catalog/unknown-items.yaml   # [GATED] — version bump (additive MINOR), 3 new ops, ReviewQueueItem schema, `forbidden` code, list params
      - apps/api/test/catalog/unknown-items/contract.spec.ts    # conformance test extension (existing 005 conformance entrypoint; T011 verifies in-place registration)
    forbidden_files:
      - packages/contracts/openapi/catalog/*.yaml   # do not touch other catalog contracts
      - packages/contracts/openapi/*.openapi.yaml   # do not touch any other OpenAPI contract
      - apps/api/src/catalog/**                     # NO runtime code in the contract slice — operations are implemented by the US slices
    validation:
      - command: pnpm --filter @data-pulse-2/api test "catalog/unknown-items/contract"
        expected: GREEN — extended YAML lints clean against the existing OpenAPI validator; the 5 shipped operationIds are unchanged (no rename — renames are breaking); the 3 new operationIds + ReviewQueueItem schema + `forbidden` code are present.
        docker_required: false
      - command: grep -nE "Idempotency-Token|idempotency_token" packages/contracts/openapi/catalog/unknown-items.yaml
        expected: NO output — T564 trap; header is `Idempotency-Key`, wire code `idempotency_key_conflict`, never `Idempotency-Token`.
        docker_required: false
    stop:
      - standing-rules universal stops
      - "stop and request explicit [GATED] approval BEFORE editing the YAML — this slice must not dispatch until the user approves it in-session"
      - "stop if any of the 5 shipped operationIds would be renamed (breaking change) — additive MINOR only"
      - "stop if the version bump is MAJOR — the contract change is additive (new ops) + a narrowing of the list response (sale_context removal), documented in the version note, not a breaking rename"
    parallel_safety: unsafe   # gated OpenAPI change; serialize before every slice that conformance-checks against it
    branch_template: "feat/007-contract"


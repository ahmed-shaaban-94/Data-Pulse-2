# ============================================================================
# findings  (traced, cited — see spec.md §3 / both-sides-review.md)
# ============================================================================

findings:
  - id: WIRE-ANCHOR-MISMATCH        # Question A
    severity: blocker-open
    note: >
      DP2's per-reversal cardinality anchor (source_ref_id) is NEVER placed on the
      wire. buildWorkItem sets the wire top-level externalId from the SALES row
      (the original sale's external_id) for BOTH sale_post and reversal
      (posting-work-item.projection.ts ~L206-224; consumer INSERT ~L98-122 pulls
      s.source_system/s.external_id). The connector keys idempotency on
      (sourceSystem, externalId) with NO kind component (contracts.py ~L198-200;
      idempotency.py) and writes rt_external_id = work_item.external_id
      (reversal_builder.py ~L100-105), ASSUMING per-reversal distinctness. On
      current merged code a reversal shares its own sale_post's anchor -> replay_guard
      short-circuits -> the reversing document is never built. Anchors do NOT
      correspond. RESOLUTION is OPEN (owner at CHECKPOINT-2 / T004). Caveat: S1's
      concrete IdempotencyStore is a deferred [GATED] T020 Frappe adapter
      (bench-unverified) — the runtime short-circuit is code-logic-traced but not
      bench-proven across the boundary.
  - id: REMAINING-QTY-ABSENT        # Question B
    severity: candidate-gap
    note: >
      DP2 has NO remaining-returnable-quantity tracking (zero matches). Concurrent
      partial returns could over-return. RECOMMENDATION (T005): keep POS-local +
      reconciliation detection; do NOT author a DP2 remaining-qty endpoint/state/
      migration in this arc. B is GATED ON A (N partial reversals are
      indistinguishable on the wire until A is resolved). Owner decides.
  - id: E2E-REVERSAL-NOT-PROVEN
    severity: status-honesty
    note: >
      Two INDEPENDENT reasons (do not merge): (a) S1 apply leg merged
      bench-unverified; (b) WIRE-ANCHOR-MISMATCH (code-logic). "015 + S1 merged" does
      NOT mean returns work end-to-end.


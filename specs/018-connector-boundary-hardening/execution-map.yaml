# ============================================================================
# findings
# ============================================================================

findings:
  - id: IDENTITY-SURVIVES-ROTATION
    severity: resolved
    note: >
      Connector identity lives in a new connector_registration table; credentials
      stay in auth_tokens linked by a nullable connector_registration_id FK. Rotation
      swaps the token, not the identity (Approach A; research R1). Rejected: all-on-
      auth_tokens (identity dies with the token) and a full registry subsystem (YAGNI).
  - id: AT-MOST-ONE-ACTIVE-IMMUTABLE-PREDICATE
    severity: resolved
    note: >
      At-most-one-active enforced by UNIQUE (connector_registration_id) WHERE
      scope='connector' AND revoked_at IS NULL — an IMMUTABLE predicate. Expiry is
      NOT in the predicate (now() is STABLE, not IMMUTABLE — a partial-index predicate
      referencing it is rejected by Postgres); expiry is enforced at the guard +
      lifecycle maintenance (research R2; the 009 EXCLUDE-constraint precedent).
  - id: CHECKS-PREFLIGHT-GATED
    severity: open-deferred
    note: >
      The scope-enum + connector-token-consistency CHECKs are added only after a
      preflight of existing rows (T010). Stray/legacy scope values or unlinked
      connector tokens are STOP-and-raise for an owner decision, never silent
      normalization (research R3; spec open questions 4/5). The CHECK becomes a named
      follow-up if the preflight is not clean.
  - id: GUARD-TIGHTENING-IS-BREAKING-FOR-LEGACY-TOKENS
    severity: open-deferred
    note: >
      CRITICAL SEQUENCING: US4 (FR-015) tightens ConnectorAuthGuard to REJECT a
      connector-scoped token with no connector_registration_id. This enforcement is
      INDEPENDENT of the DB CHECK — deferring the CHECK does NOT make US4 safe. The
      connector is already built + its poller activated (connector PR #23), so any
      hand-issued connector token in an environment the connector talks to would be
      cut off the moment US4 ships there. The T010 preflight (whether ANY pre-existing
      connector token exists) therefore GATES US4-GUARD, not just T012's CHECK: if one
      is found, backfill a registration -> link-or-reissue the credential -> reconfigure
      the connector BEFORE US4 reaches that environment. 017-VERIFY records the
      cross-system leg never ran live, so the preflight may well be clean — which is
      exactly why it must be run and must gate US4.


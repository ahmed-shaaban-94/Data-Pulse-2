# 018-connector-boundary-hardening — Execution Map (Agent OS v1)
#
# Authoritative state for Maestro dispatch. Mirrors tasks.md but adds slice status,
# allowed files, validation contracts, parallel-safety, and GATED-first serialization.
#
# 018 is the DP2-OWNED CONNECTOR BOUNDARY HARDENING v1: now that the ERPNext
# connector is real and posting, make it safely OPERABLE for a tenant pilot —
# stable connector-instance identity (connector_registration), operator-safe
# credential lifecycle (issue/rotate/revoke/disable), a tightened ConnectorAuthGuard,
# audit + an unlabeled lifecycle signal, and a boundary-of-record doc. NOT live
# stock read (019), NOT scheduled reconciliation (029), NOT fiscal (016). DP2 makes
# NO outbound ERPNext HTTP; reuses the opaque-bearer auth primitive (no new primitive).
#
# Decisions ratified at spec/clarify/plan time:
#   Approach A (thin connector_registration table + auth_tokens FK; identity survives
#   rotation). Immediate-revoke atomic rotation, at-most-one-active per registration
#   (DB partial-unique on UNREVOKED connector creds; expiry at the guard, not the
#   predicate — now() is not IMMUTABLE). Preflight-gated CHECKs (scope enum +
#   connector-token consistency); stray/legacy rows STOP for owner. Site uniqueness
#   ENFORCED on (tenant, environment, erpnext_site_ref) [clarify Q1]. Credential
#   expiry 90d default + ceiling [clarify Q2]. Unlabeled lifecycle counter [clarify Q3].
#   cookieAuth human-Tenant-Admin admin surface; REST-vs-CLI decided at T021.
#
# TWO slices are `[GATED]` (Constitution §IV/§VIII, Standing Rules §3):
#   - 018-SCHEMA   → packages/db: connector_registration + auth_tokens FK + migration 0021.
#   - 018-CONTRACT → packages/contracts: admin OpenAPI (IFF REST chosen at T021) +
#                    the boundary-of-record doc (always). Disjoint files from SCHEMA.
# BOTH gates are OWNER-APPROVED 2026-06-06 (in-session). They remain explicitly
# marked; the PREFLIGHT stop-on-stray-rows discipline still applies at 018-SCHEMA.
#
# NO new outbox event-type. NO redesign of the 012 posting-feed.yaml (READ-ONLY;
# 018 documents + tightens access to it). The connector posting endpoints stay in
# apps/api/src/catalog/erpnext-posting; 018 only tightens their guard.
#
# Predecessors on main: 012 posting-feed.yaml SHIPPED; 015 CLOSED (auth_tokens
# 'connector' scope, ConnectorAuthGuard); 001 auth (auth_tokens, opaque-bearer,
# DashboardAuthGuard); audit_events. Connector repo is real (specs 001-006, poller #23).
#
# Status: planning chain authored (spec + clarify + plan + research + data-model +
# contracts + this map). Gates pre-approved. No slice dispatched yet.
#
# Updated: 2026-06-06 — initial authoring (post /speckit-plan + /speckit-tasks).

version: 1

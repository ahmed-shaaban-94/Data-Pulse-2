# 014-branch-inventory-reconciliation-and-warehouse-mapping — Execution Map (Agent OS v1)
#
# Authoritative state of the 014 spec for Maestro dispatch. Mirrors the task
# plan in tasks.md but adds: slice status, agent assignments, allowed files,
# validation contracts, parallel-safety, and the GATED-first serialization.
#
# 014 is an api-only mapping module (NO worker — the reconciliation run is 017).
# It links a DP2 stores row to an ERPNext Warehouse reference so ERPNext can
# value the same physical stock, and DEFINES the reconciliation (009 on-hand vs
# ERPNext Bin) — it does NOT run it. The authority question is CLOSED by the
# SIGNED stock-impact decision (011-DR-STOCK-IMPACT): DP2 is the operational
# on-hand authority; ERPNext owns valuation; read-down is REJECTED. 014 builds
# NO Bin mirror (OQ-1). Mapping is manual admin-set (OQ-3), 1:1 for v1 with a
# forward-compatible `purpose` grain (OQ-2).
#
# TWO slices are `[GATED]` (Constitution §IV/§VIII, Standing Rules §3):
#   - 014-CONTRACT → new manual set/list/retire review OpenAPI under
#                    packages/contracts/openapi/** (cookieAuth HUMAN auth — NOT
#                    012 connectorBearer, NOT 010 clerkJwt).
#   - 014-SCHEMA   → new erpnext_warehouse_map Drizzle schema + migration under
#                    packages/db/** (next number, 0018 indicative; paired
#                    *.down.sql, lock-duration review; purpose-grain partial-
#                    unique + fail-closed RLS; NO Bin-quantity column).
# Both carry `approval_required: true` and `status: proposed`. They touch
# DISJOINT surfaces (openapi vs db) so they are parallel_safety: safe with each
# other, even though both block 014-CRUD.
#
# IMPORTANT: authoring this map does NOT authorize the first dispatch. The first
# slice touching packages/db / packages/contracts/openapi / apps/api is a new
# threshold the owner crosses explicitly.
#
# The reconciliation RUN (014-RECON-RUN) belongs to 017, which has NO spec yet.
# It is listed `status: proposed`, depends_on a future 017 slice, and is NOT
# dispatchable from this map.
#
# Schema reference: docs/agent-os/slice-schema.yaml
# Wave summary:     specs/014-branch-inventory-reconciliation-and-warehouse-mapping/wave-status.md
# Brief source:     specs/014-branch-inventory-reconciliation-and-warehouse-mapping/tasks.md
#
# Predecessor docs on main: 012 MERGED (#476/#479/#481/#482); 013 CLOSED (#489);
# 009 CLOSED. gated_by the SIGNED stock-impact decision (011-DR-STOCK-IMPACT).
#
# Status: 014 implementation NOT STARTED — planning chain (spec/plan/data-model)
# + this map authored on branch docs/014-spec (off origin/main). No slice
# dispatched yet. MVP = 014-CRUD (manual set → list → retire) once both [GATED]
# slices land.
#
# Updated: 2026-06-04 — initial authoring (post /speckit-tasks). Owner locked
#          OQ-1 (no mirror) + OQ-2 (1:1 forward-compat purpose) + OQ-3 (manual
#          admin-set) at plan time; OQ-4 (mismatch vocabulary) locked at
#          data-model time. No findings.

version: 1
spec: 014-branch-inventory-reconciliation-and-warehouse-mapping
base: origin/main

# ============================================================================
# findings
# ============================================================================

findings: []   # none — manual admin-set has no missing-candidate-source problem
               # (cf. 013 AUTO_MATCH_NO_SOURCE); OQ-1 removed the Bin-mirror
               # complexity. Deferrals: the `returns` warehouse purpose (reserved
               # in the grain, future widening) + per-tenant tolerance (exact for v1).

# ============================================================================
# slices
# ============================================================================

slices:

  # ===== Phase 1: Setup =======================================================

  - id: 014-SIGNOFF
    task_ids: [T001, T002]
    type: docs
    # [SIGN-OFF] gates: (T001) authority/direction is CLOSED by the signed
    # stock-impact decision (DP2 operational on-hand; ERPNext valuation;
    # read-down REJECTED); 014 builds NO Bin mirror (OQ-1). (T002) 014 adds no
    # worker / no outbox event / no reconciliation run — those are 017 (§8 carve).
    status: ready
    approval_required: false   # decision gates, not code gates
    depends_on: []
    blocks:
      - 014-SETUP
    agent: opus-maestro
    allowed_files:
      - specs/014-branch-inventory-reconciliation-and-warehouse-mapping/wave-status.md
    validation:
      - command: 'grep -niE "read-down|no Bin mirror|no mirror|017|reconciliation run|stock-impact" specs/014-branch-inventory-reconciliation-and-warehouse-mapping/wave-status.md'
        expected: One+ match — the read-down-rejected + no-Bin-mirror (OQ-1) + no-worker/no-run (017 carve) decisions are recorded.
        docker_required: false
    stop:
      - standing-rules universal stops
      - "stop and re-open the SIGNED stock-impact decision if any read-down / ERPNext-as-on-hand-master intent surfaces — do NOT build a Bin-quantity mirror or make ERPNext the operational source (§5.4 STOP-and-raise)"
    report_fields: [changed_files, validation_results, forbidden_path_check, confirmation_no_unauthorized_git_ops]
    parallel_safety: safe

  - id: 014-SETUP
    task_ids: [T003]
    type: chore
    status: ready
    approval_required: false
    depends_on: [014-SIGNOFF]
    blocks:
      - 014-CRUD
    agent: sonnet-api
    allowed_files:
      - apps/api/src/catalog/erpnext-warehouse-map/erpnext-warehouse-map.module.ts
      - apps/api/src/app.module.ts   # register the new module (mirror erpnext-item-map wiring)
    validation:
      - command: pnpm --filter @data-pulse-2/api build
        expected: GREEN — the new empty erpnext-warehouse-map module compiles and is registered in app.module.ts (mirrors erpnext-item-map.module.ts); no routes yet. Existing catalog modules still compile (no regression).
        docker_required: false
    stop:
      - standing-rules universal stops
      - "stop if the 014 branch is not off latest origin/main — rebase first"
      - "stop if any existing catalog module fails to compile — that is a regression, not a 014 task"
    report_fields: [changed_files, validation_results, forbidden_path_check, confirmation_no_unauthorized_git_ops]
    parallel_safety: safe   # single new module file + one registration line

  # ===== Phase 2: Foundational (GATED; block all capability slices) ==========


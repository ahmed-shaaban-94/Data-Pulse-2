    parallel_safety: safe   # disjoint surface from 014-SCHEMA (openapi vs db); both block 014-CRUD

  # ----- 2.2 GATED erpnext_warehouse_map schema + migration -------------------

  - id: 014-SCHEMA
    task_ids: [T012a, T012]

    validation:
      - command: pnpm --filter @data-pulse-2/api test -- catalog/erpnext-warehouse-map/contract contract-conformance
        expected: >
          GREEN — contract spec: set/list/retire operationIds present + globally unique vs shipped ops;
          the cookieAuth (dp2_session) security scheme on every op — NOT connectorBearer, NOT clerkJwt;
          set body carries store_id + erpnext_warehouse_ref ONLY (NO tenant_id/purpose/version/set_by — §XII;
          purpose defaults server-side to 'stock' in v1); retire takes the expected version (optimistic concurrency);
          canonical Error envelope with 409 (version mismatch) + non-disclosing 404 in the closed error set;
          toBody projection (no raw DB entity, §IV); and NO Bin-quantity/valuation/on-hand field anywhere (OQ-1).
        docker_required: false
    stop:
      - standing-rules universal stops
      - "stop — [GATED] forbidden path (packages/contracts/openapi/**); do NOT author until the owner approves THIS slice in-session"
      - "stop if the security scheme is connectorBearer (012 machine) or clerkJwt (010 device) — this is a HUMAN Tenant-Admin surface (cookieAuth / dp2_session)"

          WHERE retired_at IS NULL (OQ-2 forward-compat 1:1 — a 2nd active 'stock' per store rejected, a 'returns'
          row coexists); fail-closed RLS (SELECT + INSERT + UPDATE on app.current_tenant, empty-GUC CASE guard,
          NO DELETE policy, mirror 0017); NO Bin-quantity/valuation/on-hand column; migration applies + rolls back
          clean (UP→DOWN→UP).
        docker_required: true   # Testcontainers — WSL only (reference_007_test_env)
      - command: pnpm --filter @data-pulse-2/api test -- catalog/erpnext-warehouse-map/schema

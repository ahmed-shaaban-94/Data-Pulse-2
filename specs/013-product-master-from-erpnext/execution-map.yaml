      - apps/api/src/catalog/erpnext-item-map/erpnext-item-map.controller.ts
      - apps/api/test/catalog/erpnext-item-map/**
    validation:
      - command: wsl -e bash -lc "pnpm --filter @data-pulse-2/api test -- catalog/erpnext-item-map"
        expected: GREEN — re-point retires the old active row + inserts a NEW row in one transaction (no in-place identity rewrite; history preserved); the 1:1 partial-unique holds across the transition; retiring the underlying tenant_products row does not cascade/orphan (FK restrict); reconciliation surfaces the dangling case.
        docker_required: true
    stop:
      - standing-rules universal stops
      - "stop if a re-point rewrites the identity in place — must be append-only (retire old + new row), mirroring DP2's immutable-history posture"
    report_fields: [changed_files, validation_results, forbidden_path_check, confirmation_no_unauthorized_git_ops]
    parallel_safety: unsafe   # same service/controller files as 013-CRUD — serialize after it

  # ===== Phase 5: Polish =====================================================

  - id: 013-POLISH
    task_ids: [T090, T091]
    type: chore
    status: blocked
    approval_required: false
    depends_on: [013-REPOINT]
    blocks: []
    agent: sonnet-api
    allowed_files:

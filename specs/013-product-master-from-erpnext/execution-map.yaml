    agent: sonnet-api
    allowed_files:
      - apps/api/src/catalog/erpnext-item-map/erpnext-item-map.service.ts
      - apps/api/src/catalog/erpnext-item-map/erpnext-item-map.controller.ts
      - apps/api/src/catalog/erpnext-item-map/dto/*.ts
      - apps/api/test/catalog/erpnext-item-map/**   # US1 RED/GREEN specs
    validation:
      - command: wsl -e bash -lc "pnpm --filter @data-pulse-2/api test -- catalog/erpnext-item-map"
        expected: >
          GREEN — manual suggest lands state='suggested' (confirmed_* NULL); confirm sets state='confirmed' + provenance;
          stale version → 409 (§III optimistic concurrency); a suggested row is NOT resolvable (confirmed-only invariant);
          tenant_id/state/confirmed_by/version NOT body-assignable (strict DTO, §XII); audit-in-transaction; idempotent
          suggest on the active (tenant_id, tenant_product_id).
        docker_required: true
    stop:
      - standing-rules universal stops
      - "stop if confirm does not enforce optimistic concurrency (stale version must 409) — §III, the justified divergence from 003 LWW"
      - "stop if a suggested (unconfirmed) row is treated as resolvable — confirmed-only invariant (no silent auto-trust, OQ-7)"
      - "stop if any security-sensitive field is body-assignable — §XII strict command DTO"
      - "stop if a barcode/item_code auto-match path is added — v1 is manual-only (AUTO_MATCH_NO_SOURCE)"
    report_fields: [changed_files, validation_results, forbidden_path_check, confirmation_no_unauthorized_git_ops]
    parallel_safety: safe

  # ===== Phase 4: US2 (P2) — re-point / retire (append-only) =================

  - id: 013-REPOINT
    task_ids: [T040, T041, T042]
    type: feat
    status: blocked
    approval_required: false
    depends_on: [013-CRUD]
    blocks:
      - 013-POLISH
    agent: sonnet-api
    allowed_files:

      - apps/api/test/catalog/erpnext-item-map/**
      - specs/013-product-master-from-erpnext/execution-map.yaml
      - specs/013-product-master-from-erpnext/wave-status.md
    validation:
      - command: wsl -e bash -lc "pnpm --filter @data-pulse-2/api test -- catalog/erpnext-item-map --coverage"
        expected: GREEN — ≥80% coverage for the new module; structured logs carry tenant_id/correlation_id on suggest/confirm/re-point; no new metric category; map + wave-status reconciled to terminal.

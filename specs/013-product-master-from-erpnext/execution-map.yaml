        expected: RED — sweep fails on missing suggest/confirm operations (NOT on RLS); fixtures seed mappings across tenants A/B; raw-SQL RLS-bypass probe on erpnext_item_map present (wrong app.current_tenant → 0 rows); cross-tenant read/confirm → non-disclosing 404; cross-store assertion is vacuous (table is tenant-only, no store axis).
        docker_required: true
    stop:
      - standing-rules universal stops
      - "stop if a fix tempts modifying the 003-owned isolation-harness.ts — extend via the new seed-item-map.ts only"
    report_fields: [changed_files, validation_results, forbidden_path_check, confirmation_no_unauthorized_git_ops]
    parallel_safety: safe   # new test files + new seed helper

  # ===== Phase 3: US1 (P1) 🎯 MVP — manual map (suggest → confirm) ===========

  - id: 013-CRUD
    task_ids: [T030, T031, T032, T033, T034, T035]
    type: feat
    status: blocked   # waits on both [GATED] slices + harness
    approval_required: false   # the gated surfaces are CONTRACT + SCHEMA; the service/controller is not itself gated
    depends_on: [013-CONTRACT, 013-SCHEMA, 013-ISOLATION-HARNESS]
    blocks:

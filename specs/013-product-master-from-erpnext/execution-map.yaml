  # ===== Consumer (NOT a 013 slice) — belongs to 015 =========================

  - id: 013-RESOLVE
    task_ids: [T050]
    type: feat
    # Posting-time resolution: 015 reads the CONFIRMED erpnext_item_map row
    # lazily when posting a sale line; unmapped/unconfirmed → fails-to-DLQ

findings:
  - id: RLS_CROSS_STORE_READ_LEAK
    summary: >
      store_product_overrides and unknown_items declared two PERMISSIVE
      SELECT policies per table (a tenant_isolation policy checking
      tenant_id only, and a store_read policy checking store_id-or-empty).
      PostgreSQL OR-combines PERMISSIVE policies, so the tenant_isolation
      policy alone returned TRUE for every row of the active tenant
      regardless of store_id. A runtime principal with
      app.current_tenant = Tenant A and app.current_store = Store X could
      SELECT Tenant A / Store Y rows — a cross-store data leak inside a
      tenant. Writes were unaffected (the FOR ALL _tenant_write policies
      already AND tenant_id with store_id). Closed by 0008_catalog_store_
      read_isolation.sql which collapses the two SELECT policies into one
      that AND-gates both scopes.
    affected:
      - store_product_overrides
      - unknown_items
    severity: medium
    proof: 3da993b  # RED Testcontainers spec at packages/db/__tests__/migration/catalog-rls-store-read.spec.ts
    blocks: []     # cleared — all previously blocked slices may proceed (subject to other deps)
    previously_blocked:
      - T336
      - T340
      - T341
      - T342
      - T343
      - T344
    resolved_by: RLS_CROSS_STORE_FIX
    resolved_by_pr: 254
    resolved_by_commit: 483aae4  # merge commit on main
    resolved_at: 2026-05-21

  - id: MISSING_WITHSTORE_HELPER
    summary: >
      The 003 spec (rls-test-matrix.md:464-465 and plan.md:210) claims
      packages/db/src/helpers/with-store.ts ships from feature 001, but
      the file does not exist on main. Only with-tenant.ts and
      audit-insert.ts are present under packages/db/src/helpers/. T336
      (Test the existing withStore helper against store_product_overrides)
      cannot proceed without either (a) a new gated slice that authors
      with-store.ts, or (b) reinterpreting T336 to test the store GUC
      contract directly via runWithTenantContext + manual SET LOCAL
      app.current_store. Resolution is out of scope for the catalog
      foundation; either path needs explicit user authorization because
      it touches the forbidden surface packages/db/src/helpers/**.
    affected:
      - packages/db/src/helpers/with-store.ts  # nonexistent
    severity: low  # documentation/scaffolding mismatch, not a security defect
    proof: >
      `ls packages/db/src/helpers/` returns only audit-insert.ts and
      with-tenant.ts on main @ 483aae4.
    blocks:
      - T336
    resolved_by: null    # awaiting a separate authorized slice

  - id: HARNESS_SEED_BUGS
    summary: >
      Three latent constraint violations in seedCatalogIsolationFixture discovered
      by static inspection of isolation-harness.ts on main @ f6a8075 against the
      0007_catalog.sql schema, and confirmed by Testcontainers run on 2026-05-22:
        1. product_aliases INSERT column list omits `created_by` (NOT NULL per
           0007_catalog.sql:275). INSERT fails immediately with not-null violation.
        2. product_aliases store-scoped rows use `identifier_type = 'external_pos_id'`
           with `store_id` set, violating the CHECK
           `product_aliases_store_scope_consistency` (external_pos_id rows must have
           store_id NULL per 0007_catalog.sql:284-285).
        3. price_history INSERT uses column `created_by` (does not exist on that
           table — correct column is `changed_by`, 0007_catalog.sql:335) and omits
           `correlation_id` which is NOT NULL (0007_catalog.sql:336).
      All three bugs surface on the first real Testcontainers execution before any
      RLS assertion runs. They do not affect production (no runtime path uses this
      seed function).
    affected:
      - apps/api/test/catalog/__support__/isolation-harness.ts
    severity: medium    # T342-T344 validation blocked until fixed; not a production defect
    proof: >
      Static: grep of isolation-harness.ts lines 327-353 vs. 0007_catalog.sql
      lines 275, 284-285, 335-336 on main @ f6a8075.
      Runtime: Testcontainers run (WSL Docker) on 2026-05-22 — 31/31 FAILED with
      "null value in column 'created_by' of relation 'product_aliases' violates
      not-null constraint".
    blocks:
      - T342
      - T343
      - T344
    resolved_by: null   # fix slice needed; no gate required (non-forbidden path)


# ----------------------------------------------------------------------------
# findings
# ----------------------------------------------------------------------------
findings:
  - id: RLS_CROSS_STORE_READ_LEAK
    summary: >
      store_product_overrides and unknown_items declare two PERMISSIVE
      SELECT policies per table (a tenant_isolation policy checking
      tenant_id only, and a store_read policy checking store_id-or-empty).
      PostgreSQL OR-combines PERMISSIVE policies, so the tenant_isolation
      policy alone returns TRUE for every row of the active tenant
      regardless of store_id. A runtime principal with
      app.current_tenant = Tenant A and app.current_store = Store X can
      SELECT Tenant A / Store Y rows — a cross-store data leak inside a
      tenant. Writes are unaffected (the FOR ALL _tenant_write policies
      already AND tenant_id with store_id).
    affected:
      - store_product_overrides
      - unknown_items
    severity: medium
    proof: 3da993b  # RED Testcontainers spec at packages/db/__tests__/migration/catalog-rls-store-read.spec.ts
    blocks:
      - T336
      - T340
      - T341
      - T342
      - T343
      - T344
    resolved_by: RLS_CROSS_STORE_FIX


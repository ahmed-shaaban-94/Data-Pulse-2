# ----------------------------------------------------------------------------
# groups — phase cohorts (NOT flat-dispatchable waves)
# ----------------------------------------------------------------------------
# Groups below are **phase cohorts** for human-readable navigation of slices
# that share a phase boundary. They are **NOT flat-dispatchable bundles**.
# Members may have intra-group `depends_on` edges; Maestro MUST topologically
# sort by the per-slice `depends_on` DAG before dispatching any member.
#
# `parallel_safety: safe` on a group reflects the schema's file/fixture
# disjointness contract (docs/agent-os/slice-schema.yaml §parallel_safety):
# group members do not write to overlapping files and do not share test
# fixture state. It does **NOT** mean the members are dependency-flat.
#
# Where two or more members are dependency-independent of each other AND
# their predecessors are merged, those subsets MAY be dispatched in parallel
# worktrees. Where members have intra-group dependencies (e.g., one member
# blocks another), Maestro serializes them per the DAG.
#
# See tasks.md §10.3 for the source-of-truth parallel-set analysis at the
# RED-authoring level.

groups:

  - id: PHASE_0_1_2_COHORT
    members:
      - 005-WAVE1-METRICS-ALLOWLIST   # [GATED] — must land first
      - 005-WAVE1-SETUP
      - 005-WAVE1-IDEMP-VERIFY
      - 005-WAVE1-HARNESS
    parallel_safety: safe   # file/fixture disjoint per schema
    proposed: true
    # Intra-group DAG (strict serialization for the first two, then fanout):
    #   METRICS-ALLOWLIST  blocks  SETUP  blocks  {IDEMP-VERIFY, HARNESS}
    # METRICS-ALLOWLIST is [GATED] and must merge first (T501's assertion
    # call at module load would otherwise throw on unallowlisted counters).
    # After METRICS-ALLOWLIST merges and SETUP merges, IDEMP-VERIFY and
    # HARNESS may dispatch in parallel worktrees (they touch disjoint test
    # paths). File scope: METRICS-ALLOWLIST edits two 004-owned files only
    # (metrics-labels.ts + signals.md §1.1); SETUP edits the catalog module
    # dir + api.metrics.ts; IDEMP-VERIFY is one new spec file under
    # .../idempotency/; HARNESS adds two new files under .../__support__/
    # and .../isolation/.

  - id: PHASE_3_COHORT
    members:
      - 005-WAVE1-CAPTURE-HAPPY
      - 005-WAVE1-CAPTURE-RESOLVE
      - 005-WAVE1-CAPTURE-STORE-SCOPE
      - 005-WAVE1-CAPTURE-DEDUP
      - 005-WAVE1-VALIDATION
      - 005-WAVE1-NON-DISCLOSING
      - 005-WAVE1-LIST
    parallel_safety: safe   # RED spec files are disjoint per schema
    proposed: true
    # Intra-group DAG: CAPTURE-HAPPY is the root; CAPTURE-RESOLVE,
    # VALIDATION, NON-DISCLOSING, LIST all `depends_on: CAPTURE-HAPPY`.
    # CAPTURE-STORE-SCOPE and CAPTURE-DEDUP both `depends_on: CAPTURE-RESOLVE`.
    # The group is NOT a flat dispatch wave. RED test authoring across
    # members is parallel-safe (each spec file disjoint), but GREEN
    # implementations serialize through unknown-items.service.ts and
    # unknown-items.controller.ts. See tasks.md §10.3.

  - id: PHASE_4_5_COHORT
    members:
      - 005-WAVE1-IDEMP-WIRE
      - 005-WAVE1-IDEMP-MISMATCH
      - 005-WAVE1-IDEMP-EDGES
      - 005-WAVE1-DISMISS
      - 005-WAVE1-FR005
      - 005-WAVE1-AUDIT
      - 005-WAVE1-METRICS
    parallel_safety: safe   # RED spec files are disjoint per schema
    proposed: true
    # Intra-group DAG: IDEMP-WIRE `blocks` IDEMP-MISMATCH + IDEMP-EDGES.
    # IDEMP-MISMATCH `blocks` AUDIT + METRICS. DISMISS `blocks` FR005 + AUDIT.
    # See per-slice depends_on edges above. RED tests within disjoint spec
    # files may dispatch in parallel where predecessors are merged; GREEN
    # implementations serialize through the shared service/controller/filter
    # files.


# ----------------------------------------------------------------------------
# Wave 2 groups
# ----------------------------------------------------------------------------

  - id: WAVE2_PHASE_2_3_COHORT
    members:
      - 005-WAVE2-CONTRACT    # [GATED] — must land first
      - 005-WAVE2-CONFLICT
    parallel_safety: safe
    proposed: true
    # Intra-group DAG: CONTRACT blocks CONFLICT.
    # CONTRACT is [GATED] and must approve + merge before CONFLICT can dispatch.

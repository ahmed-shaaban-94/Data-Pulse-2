    status: merged
    merged_in_pr: 299
    merged_at_commit: 28d1a0d72725ffa93272dd2a2e9b912b11380cc4
    merged_at_date: 2026-05-23
    previously_blocked:
      - 005-WAVE1-SETUP
    approval_required: true   # [GATED] — touches 004-owned observability schema (packages/shared/src/observability/** and docs/observability/**)
    depends_on: []
    blocks:
      - 005-WAVE1-SETUP        # T501 cannot register the counters until this lands
    agent: sonnet-api
    allowed_files:
      - packages/shared/src/observability/metrics-labels.ts                  # [GATED] — closed allowlist extension (source of truth #1)
      - docs/observability/signals.md                                        # [GATED] — signal catalogue extension, new §1.1 (source of truth #2)
      - apps/api/test/observability/cardinality.spec.ts                      # [GATED] — `expectedSignals` drift-contract array (source of truth #3 — discovered via CI failure on PR #299 first push)
      - specs/005-pos-catalog-sync-reconciliation/execution-map.yaml         # self-amending: add this slice + the finding + SETUP depends_on edge
      - specs/005-pos-catalog-sync-reconciliation/wave-status.md             # self-amending: surface the finding + new first dispatch
    forbidden_files:
      - apps/api/src/observability/metrics/api.metrics.ts          # belongs to T501 / 005-WAVE1-SETUP
      - apps/api/src/catalog/**                                    # no instrument creation or emission in this slice
      - .specify/memory/redaction-matrix.md                        # not touched — new counters have no labels that need redaction-matrix entries
      - docs/observability/dashboards/**                           # dashboards extension is out of scope for this slice
      - docs/observability/alerts/**                               # alerts extension is out of scope for this slice
      - specs/005-pos-catalog-sync-reconciliation/spec.md          # product surface — not amended by this slice
      - specs/005-pos-catalog-sync-reconciliation/plan.md          # product surface — not amended by this slice
      - specs/005-pos-catalog-sync-reconciliation/tasks.md         # task list — T501's acceptance text already assumed registration; not amended here
      - specs/005-pos-catalog-sync-reconciliation/research.md      # not amended
      - specs/005-pos-catalog-sync-reconciliation/data-model.md    # not amended
      - specs/005-pos-catalog-sync-reconciliation/quickstart.md    # not amended
      - specs/005-pos-catalog-sync-reconciliation/contracts/**     # not amended
      - specs/003-catalog-foundation/**                            # 003 is read-only for 005
      - specs/004-platform-production-readiness/**                 # 004 spec docs not amended (only its owned observability files in allowed_files above)
    validation:
      - command: pnpm --filter @data-pulse-2/shared test "observability/metrics-labels"
        expected: GREEN — new entries pass the closed-allowlist invariants (snake_case keys, no forbidden labels, no duplicates, every value is an array)
        docker_required: false
      - command: pnpm --filter @data-pulse-2/api test "observability/cardinality"
        expected: GREEN — `apps/api/test/observability/cardinality.spec.ts` (T461) still passes; new entries are disjoint from FORBIDDEN_METRIC_LABELS
        docker_required: false
    stop:
      - if any file outside allowed_files is modified
      - if any existing entry in `ALLOWED_METRIC_LABELS` is altered

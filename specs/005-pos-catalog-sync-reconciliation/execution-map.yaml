    proposed: true
    # Intra-group DAG:
    #   LINK-HAPPY blocks LINK-EDGES + CREATE-HAPPY.
    #   CREATE-HAPPY blocks CREATE-EDGES.
    #   LINK-EDGES and CREATE-HAPPY may dispatch in parallel once LINK-HAPPY merges.

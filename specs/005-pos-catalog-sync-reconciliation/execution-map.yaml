findings:
  - id: 005-METRICS-ALLOWLIST-PRECONDITION
    severity: high
    discovered_in_slice_attempt: 005-WAVE1-SETUP   # first dispatch attempt, 2026-05-23
    summary: |
      T501 (register three Wave 1 catalog counters in api.metrics.ts) cannot
      succeed within its declared `allowed_files`. The closed allowlist
      `ALLOWED_METRIC_LABELS` in packages/shared/src/observability/metrics-labels.ts
      gates every counter registration via `assertMetricLabels()` at module
      load. None of `unknown_item_captured_total`,
      `unknown_item_resolved_total`, or `idempotency_token_mismatch_total`
      were allowlisted at tasks.md authoring time. Adding them requires
      editing 004-owned observability schema files — outside T501's
      `allowed_files` and forbidden to 005 by Standing Rules §3.
    evidence:
      - packages/shared/src/observability/metrics-labels.ts:111-150 (closed allowlist contents — source of truth #1)
      - apps/api/src/observability/metrics/api.metrics.ts:75-86 (load-time assertMetricLabels calls)
      - packages/shared/src/observability/metrics-labels.ts:177-211 (unregistered-metric throw path)
      - apps/api/test/observability/cardinality.spec.ts:162-194 (drift-contract `expectedSignals` array — source of truth #3, discovered via CI failure on PR #299 first push 2026-05-23 when CI ran with a fresh `@data-pulse-2/shared` build while local jest had a stale dist symlink)
    resolution_path: |
      Path (b) chosen by owner: add a new `[GATED]` prerequisite slice
      `005-WAVE1-METRICS-ALLOWLIST` that touches only the 004-owned files
      (`packages/shared/src/observability/metrics-labels.ts` and
      `docs/observability/signals.md`). 005-WAVE1-SETUP gains a
      `depends_on: [005-WAVE1-METRICS-ALLOWLIST]` edge so T501 cannot
      dispatch until the allowlist lands on `main`.
    resolved_by_slice: 005-WAVE1-METRICS-ALLOWLIST
    resolved_by_pr: 299
    resolved_at_commit: 28d1a0d72725ffa93272dd2a2e9b912b11380cc4
    resolved_at: 2026-05-23
    notes: |
      Planning fix only — no Wave 1 task IDs change. tasks.md T501's
      acceptance criteria already assumed the counters would be registered;
      the gap was that tasks.md didn't enumerate the upstream allowlist
      precondition. The new slice is a planning correction, not a new
      product requirement.


slices:

  # ===== Phase 0: Cross-spec prerequisite (gated) ===========================
  # The three Wave 1 catalog metrics (`unknown_item_captured_total`,
  # `unknown_item_resolved_total{action}`, `idempotency_token_mismatch_total`)
  # cannot be registered in `apps/api/src/observability/metrics/api.metrics.ts`
  # (T501) without first allowlisting them in 004's closed metric-label
  # registry. The registry's `assertMetricLabels` throws at module load on
  # any unallowlisted metric name, which would fail the entire API test
  # suite. This slice does the schema-only allowlist extension first.
  #
  # Discovered: 2026-05-23 during the first 005-WAVE1-SETUP dispatch
  # attempt. See wave-status.md "Active findings" for the audit trail.


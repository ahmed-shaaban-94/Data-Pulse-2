# 017-erpnext-reconciliation-and-repair — Execution Map (Agent OS v1)
#
# Authoritative state of the 017 spec for Maestro dispatch. Mirrors the task plan
# in tasks.md but adds: slice status, agent assignments, allowed files, validation
# contracts, parallel-safety, and the GATED-first serialization.
#
# 017 is the ARC'S OPERATIONAL RECONCILIATION SURFACE (011→017): run -> report ->
# repair. It is the home the 015 `015-DLQ-DRAIN` traceability stub and the 014 §8
# carve pointed to. It makes the 015 posting dead-letter backlog VISIBLE (US1 MVP),
# exposes an IDEMPOTENT repair that re-uses the 015 O-3 state machine (re-head a
# `permanently_rejected` row to `pending`; the connector re-posts via the EXISTING
# 012 feed/ack — exactly one document_ref, never a 2nd, never a silent rewrite)
# (US2), and runs STOCK reconciliation comparing DP2 on-hand (009) against the
# connector's ERPNext-Bin view per the 014 mapping, persisting mismatch reports in
# 014's vocabulary (US3). Human Tenant Admin (cookieAuth) only; DP2 makes NO
# outbound ERPNext HTTP; the 008 sale fact + 009 ledger are NEVER mutated.
#
# Decisions ratified at spec/plan time (research.md R1-R7):
#   R1 repair = 015 state-machine re-use (no new idempotency primitive; bounded by
#      POSTING_RETRY_BUDGET). R2 own runs/results/repair-attempts; READ (never
#      mirror) the 015 dead-letters. R3 stock ERPNext-Bin read = connector seam
#      (012 boundary), v1 stub-tolerant so the DP2 side ships independently.
#      R4 consume 014's stock vocab + 015's posting categories; 017 owns only the
#      orthogonal result_state enum. R5 on-demand runs v1; scheduled = later wiring.
#      R6 human-operator-only (cookieAuth/DashboardAuthGuard). R7 signals extend the
#      SHARED erpnext_posting_reconciliation_total family; no per-feature file.
#
# TWO slices are `[GATED]` (Constitution §IV/§VIII, Standing Rules §3):
#   - 017-CONTRACT → new operator OpenAPI under packages/contracts/openapi/
#                    erpnext-reconciliation/reconciliation.yaml (cookieAuth; the 6
#                    operationIds; 014 `erpnext-warehouse-map` /api/v1/catalog/...
#                    namespace, NOT /api/admin/...).
#   - 017-SCHEMA   → new erpnext_reconciliation_* Drizzle schema + migration under
#                    packages/db/** (next number after 0019, 0020 indicative; paired
#                    *.down.sql, lock review; fail-closed RLS; append-only repair
#                    audit; NO money/PII column).
# Both carry `approval_required: true` and `status: proposed`. They touch DISJOINT
# files (packages/contracts vs packages/db) so they are parallel_safety: safe with
# each other, even though both block the capability slices.
#
# NO new outbox event-type, NO 012 contract change: 017 reads the 015
# erpnext_posting_status state + transitions it via the EXISTING 015 mechanism; the
# connector re-posts via the EXISTING 012 feed/ack. Any connector->DP2 ERPNext-view
# contract (for the live stock-run read) is a separate FUTURE [GATED] 012-style
# slice — out of 017 v1 (R3).
#
# IMPORTANT: authoring this map does NOT authorize the first dispatch. The first
# slice touching packages/db / packages/contracts / apps/api is a new threshold the
# owner crosses explicitly. 017-SIGNOFF (T001-T003) — the state-table + repair-reuse
# + v1-carve decisions — must be recorded before 017-SCHEMA / 017-CONTRACT dispatch
# (mirrors 010-SIGNOFF-READONLY / 015-SIGNOFF-STATE).
#
# Predecessor docs on main: 015 CLOSED (#501-#505 — erpnext_posting_status/0019 +
# the connectorAckOutcome state machine + erpnext_posting_reconciliation_total);
# 014-CRUD MERGED (#495 — erpnext_warehouse_map/0018 + the mismatch vocabulary);
# 009 CLOSED (stock_movements/0014); 012 SHIPPED (posting-feed.yaml, read-only).
# gated_by the SIGNED 011-DR-STOCK-IMPACT (§5 assigns run/report/repair to 017) +
# 011-DR-POSTING (+ rider). /speckit-analyze: 0 critical / 0 high; 2 medium
# (I1 namespace, C1 audit) + 4 low (C2/U1/A1/X1) all REMEDIATED ("fix all").
#
# Status: 017 implementation NOT STARTED — planning chain (spec/plan/research/
# data-model/contracts/tasks) + this map authored. No slice dispatched yet.
# MVP = 017-US1-BACKLOG (the visible posting dead-letter backlog) once the two
# [GATED] foundational slices + the isolation harness land.
#
# Updated: 2026-06-06 — initial authoring (post /speckit-tasks + /speckit-analyze +
#          "fix all"). All OQs resolved at spec/plan time (FR-018 human-only;
#          R1-R7). Schema/CONTRACT [GATED] proposed; RECON-RUN connector-view live
#          read deferred to a future 012-style slice.
#
# RECONCILED 2026-06-06 (implementation complete) — owner authorized BOTH [GATED]
# slices in-session; all 8 capability slices BUILT + GREEN on feat/017-impl (WSL
# Testcontainers), built in an isolated worktree off fresh main. Per-slice status

# ============================================================================
# findings
# ============================================================================

findings:
  - id: REPAIR-REUSES-015-O3
    severity: resolved
    note: >
      A posting repair is a STATE TRANSITION on the existing 015
      erpnext_posting_status row (re-evaluate 015-RESOLVE -> re-head
      permanently_rejected to pending), NOT a new posting/idempotency primitive
      and NOT DP2 calling ERPNext. The 015 O-3 unique (tenant_id, source_ref_id)
      + the connectorAckOutcome echo already guarantee exactly-one document_ref
      across re-offer + ack, so a repaired posting that succeeds resolves to the
      same document (research R1). Bounded by POSTING_RETRY_BUDGET (FR-019).
      Guarded by T040/T043/T044.
  - id: READ-NOT-MIRROR-015
    severity: resolved
    note: >
      017 OWNS its runs/results/repair-attempts (0020) but READS the 015
      dead-letters (0019) — it never mirrors them. Mirroring a derived projection
      is the 010 RESTRICT-vs-CASCADE trap (drift). The backlog list is a
      read-projection over erpnext_posting_status WHERE status='permanently_rejected'
      (research R2; data-model §1).
  - id: STOCK-VIEW-CONNECTOR-SEAM
    severity: open-deferred
    note: >
      The live ERPNext-Bin read (US3 stock compare) is the connector's machinery
      behind the fixed 012 boundary; the connector repo is not built yet. v1 is
      STUB-TOLERANT (the ERPNext-Bin view is an injected seam; an absent view ->
      reported erpnext_only/unavailable, never a run failure) so 017's DP2-side
      run + report + repair ship independently. The live read activates via a
      FUTURE [GATED] connector->DP2 view contract (research R3) — NOT a 017 v1
      slice.


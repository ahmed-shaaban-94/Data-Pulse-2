# ledger remains the human-readable authority. SETUP/SCHEMA/CONTRACT/ISOLATION/US1/
# US2/US3/POLISH all MERGED via PR #509.
#
# CLOSED 2026-06-06 — 017 v1 is functionally complete on main (PR #509). The live
# trigger->queue->processor WIRING deferral is now ALSO RESOLVED: 017-RECON-WIRING
# (PR #511) registered erpnext.reconciliation.requested in the [GATED] outbox
# registry, made triggerRun emit it in-transaction, and registered the

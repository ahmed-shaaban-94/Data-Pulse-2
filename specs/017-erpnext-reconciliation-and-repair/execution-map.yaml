# now advances running->completed DP2-internally (over EMPTY_BIN_VIEW, stub-tolerant;
# no connector/ERPNext call). 017-VERIFY (PR #510) recorded the DP2-side
# verification (75/75 in-repo). The two REMAINING items are NOT 017 v1 and stay
# non-dispatchable: 017-STOCK-VIEW-CONTRACT (live ERPNext-Bin read — future [GATED],
# needs the connector repo) + 017-SCHEDULED-RUNS (later wiring over the same
# processor). 017 is CLOSED as far as anything buildable in this repo.


# ============================================================================
# groups — optional parallel groupings (proposed; awaiting endorsement)
# ============================================================================
# The two [GATED] foundational slices (008-CONTRACT, 008-SCHEMA) are NOT a
# parallel group with each other in the strict sense, but they are independent
# (contract YAML vs db schema) and MAY be approved + landed in either order;
# both must merge before any implementing GREEN slice. 008-SCHEMA additionally
# depends on the money-lib SIGN-OFF.
#
# CAUTION on the US slices: US1, US2, US3, US4, US5, US6 all write the SAME
# files (sales.controller.ts / sales.service.ts — US2-DELAYED-SYNC also edits
# sales.service.ts), so despite being conceptually independent paths they are
# NOT file-parallel-safe. They must be SERIALIZED through the shared module
# (US1 first as MVP, then the rest). The genuinely parallel-safe work is the
# worker (distinct apps/worker/** tree) and the lifecycle guard (test-only).

groups:

  - id: GATED-FOUNDATIONAL
    members:
      - 008-CONTRACT
      - 008-SCHEMA
    parallel_safety: safe   # distinct surfaces (OpenAPI YAML vs db schema); both [GATED], both block all GREEN; order-independent between themselves
    proposed: true

  - id: POST-CAPTURE-PARALLEL
    members:
      - 008-WORKER        # apps/worker/** — distinct tree
      - 008-LIFECYCLE     # test-only + doc note
    parallel_safety: safe   # no overlap with each other or with the api sales module once US1 capture exists
    proposed: true

# 008-sales-transaction-capture — Execution Map (Agent OS v1)
#
# Authoritative state of the 008 spec for Maestro dispatch. Mirrors the task
# plan in tasks.md but adds: slice status, agent assignments, allowed files,
# validation contracts, parallel-safety semantics, and the GATED-first
# serialization edges.
#
# 008 is a CODE feature (NestJS api + worker). It introduces the FIRST sale
# fact (`sales` + `sale_lines` + void/refund terminal events) and builds
# ALONGSIDE the shipped 005 POS ingestion seam — reusing the Idempotency-Key
# interceptor, sourceSystem+externalId dedup, tenant-context/RLS helpers, the
# audit insert, and the outbox producer (tasks.md §0, plan §4). It does NOT
# re-invent ingestion.
#
# TWO slices are `[GATED]` (Constitution §IV/§VIII, Standing Rules §3):
#   - 008-CONTRACT  → new OpenAPI sale contract under packages/contracts/openapi/**
#   - 008-SCHEMA    → new Drizzle schema + 0012_sales SQL migration under
#                     packages/db/** (paired *.down.sql, lock-duration review)
# Both carry `approval_required: true` and are the hard serialization points:
# no implementing GREEN slice dispatches until both are merged.
#
# ONE slice is `[SIGN-OFF]` (008-SIGNOFF-MONEY-LIB / T001): confirm the
# string-backed money value object adds NO package.json dependency (gate A.6).
# If a big-decimal library becomes necessary, that is a SEPARATE [GATED]
# package.json decision — stop and request approval.
#
# Schema reference: docs/agent-os/slice-schema.yaml
# Wave summary:     specs/008-sales-transaction-capture/wave-status.md
# Brief source:     specs/008-sales-transaction-capture/tasks.md
#                   (each slice's full RED/GREEN brief, Predecessors, and
#                   Acceptance live in tasks.md; this file provides the
#                   dispatch-time schema fields only.)
#
# Slicing convention (005/007-style, NOT 006-style 1:1): each capability slice
# folds its RED test task(s) + GREEN implementation task(s) into one
# dispatchable unit, because a worker writes the failing test and makes it
# pass within one worktree. `task_ids` is therefore list-valued. Every
# tasks.md ID T001..T094 (45 distinct) is assigned to exactly one slice's
# `task_ids` — verified at authoring time.
#
# Status: 008 CLOSED — every slice MERGED to main:
#     - 008-SETUP            → PR #420 (6d01512) — empty SalesModule skeleton
#     - 008-SCHEMA           → PR #421 (560d16c) — 0012 migration + Drizzle schema
#     - 008-CONTRACT         → PR #422 (7459ea5) — OpenAPI sale contract
#     - 008-ISOLATION-HARNESS → PR #425 (7a1885e) — sale-fact seed + RLS/sweep
#     - 008-US1-CAPTURE      → PR #426 (d1748aa) — first runtime GREEN (capture)
#     - 008-US3/US4/US5/US6  → PR #427 (2f76ac6) — void/refund/idempotency/safety (bundled)
#     - 008-US2-DELAYED-SYNC → PR #428 (bc2248b) — store-tz business_date + delayed sync
#     - 008-LIFECYCLE        → PR #430 (ead7b5a) — SI-012 data-class + retention guard
#     - 008-WORKER           → PR #431 (8039a22) — off-request processedAt + mismatch
#     - 008-POLISH (split)   → PR #433 (381b717) — k6 perf (report-only) + coverage/suite + repoRoot repair
#     - 008-WIRING           → PR #434 (e412e7a) — register SaleProcessingProcessor + no-unbounded-path guard
#     - 008-CLOSEOUT         → this doc PR — terminal reconciliation
#   008-SIGNOFF-MONEY-LIB resolved (PR #419). Money + Temporal Gate RESOLVED.
#
#   DOCUMENTED DEFERRALS (see wave-status Active findings — NOT blockers, the
#   merged work is correct + tested, but the live loop is not yet exercised):
#     1. Live capture→process loop is GATED: needs producer binding in
#        SalesModule + `sale.captured` added to OUTBOX_EVENT_TYPES (gated
#        packages/db, T541-style approval) + imperative SaleWorker.start() in
#        main.ts. WIRING registered the consumer only; processed_at stays NULL
#        until that slice ships (inert today — nothing reads it yet).
#     2. reconciliation-mismatch-rate signal emit — FR-031 MAY (optional). The
#        §VII counter is unregistered in api/worker metrics; emitting is the
#        remaining T092 work. NOT a new event type (§6.9).
#     3. SC-010 perf — report-only (no perf env; 005 T560 precedent).
#
# Updated: 2026-05-31 — POLISH (#433) + WIRING (#434) merged; 008 CLOSED via this CLOSEOUT. All slices terminal.


# 010-pos-catalog-read-down-sync — Execution Map (Agent OS v1)
#
# Authoritative state of the 010 spec for Maestro dispatch. Mirrors the task
# plan in tasks.md but adds: slice status, agent assignments, allowed files,
# validation contracts, parallel-safety semantics, and the GATED-first
# serialization edges.
#
# 010 is a READ-ONLY CODE feature (NestJS api only — NO worker). It publishes
# the Resolved Sellable Store Catalogue (003 §6.4) to device-authenticated POS
# terminals as snapshot + delta, scoped to (tenant_id, store_id) (wire term
# branch_id). It REUSES unchanged the POS device-principal auth seam
# (PosOperatorAuthGuard — the same guard posCaptureItem + the 008 sales POS
# routes use) and the 003 catalog read path. It adds a new read-only
# apps/api/src/catalog/read-down/ module mirroring the reconciliation/ triad.
# The platform stays the catalogue authority (§IX); there is NO write surface.
#
# TWO slices are `[GATED]` (Constitution §IV/§VIII, Standing Rules §3):
#   - 010-CONTRACT  → new OpenAPI read-down contract under
#                     packages/contracts/openapi/catalog/read-down.yaml
#   - 010-SCHEMA    → new catalogue change-log Drizzle schema + the
#                     0015_pos_catalog_read_down SQL migration under
#                     packages/db/** (paired *.down.sql, lock-duration review),
#                     INCLUDING the population triggers on tenant_products /
#                     store_product_overrides / product_aliases.
# Both carry `approval_required: true`. 010-SCHEMA is the HARD serialization
# point for BOTH user stories: the snapshot's opaque cursor (FR-011) IS the
# change-log sequence value (data-model §2/§3, research R1), so US1 cannot
# satisfy FR-011 without the change-log. The migration is therefore
# FOUNDATIONAL, not US2-only.
#
# TWO slices are `[SIGN-OFF]` (decision gates, not code gates):
#   - 010-SIGNOFF-READONLY (T001): the change-log is populated by DB TRIGGERS
#     inside the 0015 migration — NOT by instrumenting 003/005 app write paths
#     (owner decision 2026-06-03). The app-level outbox-mirror is the REJECTED
#     alternative. If triggers cannot capture a required transition, STOP and
#     raise a separate gate — do NOT silently instrument write paths.
#   - 010-SIGNOFF-NODEP (T011, folded into 010-CONTRACT): no package.json
#     dependency is added (cursor codec + DecimalAmount string money use
#     existing primitives). A new dependency is a SEPARATE [GATED] decision.
#
# Schema reference: docs/agent-os/slice-schema.yaml
# Wave summary:     specs/010-pos-catalog-read-down-sync/wave-status.md
# Brief source:     specs/010-pos-catalog-read-down-sync/tasks.md
#                   (each slice's full RED/GREEN brief, Predecessors, and
#                   Acceptance live in tasks.md; this file provides the
#                   dispatch-time schema fields only.)
#
# Slicing convention (008/009-style, NOT 006-style 1:1): each capability slice
# folds its RED test task(s) + GREEN implementation task(s) into one
# dispatchable unit, because a worker writes the failing test and makes it
# pass within one worktree. `task_ids` is therefore list-valued. Every
# tasks.md ID (T001..T093) is assigned to exactly one slice's `task_ids`.
#
# Status: 010 NOT STARTED — planning chain (spec/plan/research/data-model/
# contracts) on main; tasks.md + this map + wave-status authored on branch
# 010-pos-catalog-read-down-sync (off origin/main). No slice dispatched yet.
# MVP = 010-US1-SNAPSHOT + foundational = the POS-Pulse 010 unblock (spec §10).
#
# Updated: 2026-06-03 — initial authoring (post /speckit-tasks + /speckit-analyze);
#          external review + /speckit-clarify resolved R-1 (FR-050 payload revised
#          to real-schema-backed fields only — Option B). R-3 RESOLVED via research R9:
#          single per-tenant sequence + tenant-wide (store_id IS NULL) sentinel rows,
#          dumb one-row-per-change trigger, override-masking handled read-side as an
#          idempotent re-upsert. Both [GATED] slices unblocked (pending in-session approval).

version: 1
spec: 010-pos-catalog-read-down-sync


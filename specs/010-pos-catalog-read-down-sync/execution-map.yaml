# ============================================================================
# parallel-safe groups (proposed)
# ============================================================================
#
#   GATED-FOUNDATIONAL  : 010-CONTRACT ∥ 010-SCHEMA — distinct surfaces
#                         (OpenAPI YAML vs packages/db schema+migration+triggers);
#                         both [GATED], order-independent between themselves;
#                         010-SCHEMA also waits on 010-SIGNOFF-READONLY.
#
#   NOT parallel-safe (serialize): 010-US1-SNAPSHOT → 010-US2-DELTA →
#                         010-US3-ISOLATION all touch the SAME shared module
#                         (read-down.controller.ts + read-down.service.ts), so
#                         they serialize through it — exactly like 008 US1–US6.
#                         US3 + POLISH are test/metrics-only and land after.
#
# No worker slice (010 is read-only — no off-request processing).

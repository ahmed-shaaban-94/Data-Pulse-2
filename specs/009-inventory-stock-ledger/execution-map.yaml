# 009-inventory-stock-ledger — Execution Map (Agent OS v1)
#
# Authoritative state of the 009 spec for Maestro dispatch. Mirrors the task
# plan in tasks.md but adds: slice status, agent assignments, allowed files,
# validation contracts, parallel-safety semantics, and the GATED-first
# serialization edges.
#
# 009 is a CODE feature (NestJS api + worker). It introduces the Inventory
# source-of-truth domain: an append-only `stock_movements` ledger + a derived
# (compute-on-read) on-hand balance, and builds ALONGSIDE the shipped 001/005/
# 008 seams — reusing the Idempotency-Key interceptor, sourceSystem+externalId
# dedup, tenant-context/RLS helpers, the audit insert, and the outbox/worker
# (tasks.md §0, plan §4). It does NOT re-invent ingestion.
#
# CRITICAL DECOUPLING: v1 does NOT subscribe to `sale.captured`. The 008 live
# capture->process loop is gated (processed_at stays NULL). The sale-linked
# backfill reads the CAPTURED (immutable) 008 sales/sale_lines rows directly,
# never processed_at-stamped ones. Automatic decrement + automatic restock-on-
# void are MODELED but DEFERRED to a future "008-live-loop / 009-sale-consumer"
# slice — addable without redesigning the ledger (tasks.md §0, plan §4.3, R8).
#
# TWO slices are `[GATED]` (Constitution §IV/§VIII, Standing Rules §3):
#   - 009-CONTRACT  → new OpenAPI inventory contract under
#                     packages/contracts/openapi/inventory/**
#   - 009-SCHEMA    → new Drizzle schema + 0014_inventory SQL migration under
#                     packages/db/** (paired *.down.sql, lock-duration review)
# Both carry `approval_required: true` and are the hard serialization points:
# no implementing GREEN slice dispatches until both are merged.
#
# ONE slice is `[SIGN-OFF]` (009-SIGNOFF-QTY-LIB / T001): confirm the string-
# backed exact-decimal quantity value object adds NO package.json dependency
# (R3, mirrors 008 gate A.6). If a big-decimal library becomes necessary, that
# is a SEPARATE [GATED] package.json decision — stop and request approval.
#
# ONE new observability signal: the negative-balance signal (flag + Prometheus
# counter) — NOT in the constitution §VII named list, consciously introduced
# (plan §3.3, T045). Registered with the negative-balance-handling slice.
#
# Schema reference: docs/agent-os/slice-schema.yaml
# Wave summary:     specs/009-inventory-stock-ledger/wave-status.md
# Brief source:     specs/009-inventory-stock-ledger/tasks.md
#                   (each slice's full RED/GREEN brief, Predecessors, and
#                   Acceptance live in tasks.md; this file provides the
#                   dispatch-time schema fields only.)
#
# Slicing convention (005/007/008-style, NOT 006-style 1:1): each capability
# slice folds its RED test task(s) + GREEN implementation task(s) into one
# dispatchable unit, because a worker writes the failing test and makes it
# pass within one worktree. `task_ids` is therefore list-valued. Every
# tasks.md ID T001..T104 (45 distinct, incl. T063b) is assigned to exactly one slice's
# `task_ids` — verified at authoring time.
#
# Status: 009 NOT STARTED — planning chain complete (spec + clarify + plan +
#   tasks). No slice dispatched. All slices `status: pending`. The two [GATED]
#   slices (009-CONTRACT, 009-SCHEMA) require explicit in-session approval
#   before they dispatch.
#
#   DEFERRED (modeled, not v1 — see spec FR-060/FR-025/FR-040..042):
#     1. Automatic sale-event decrement — future 008-live-loop / 009-sale-
#        consumer slice (depends on producer binding + sale.captured outbox
#        event type + SaleWorker.start()). NOT in 009 v1.
#     2. Automatic restock-on-void — deferred with #1; v1 ships only the
#        manual/backfill restock (T090/T091).
#     3. Pharmacy lot/batch/serial/expiry/FEFO — designed-for seam, gated
#        future decision (FR-040..042); v1 implements none of it.
#
# Created: 2026-05-31 — /speckit-tasks output; planning-only, authorizes no implementation.


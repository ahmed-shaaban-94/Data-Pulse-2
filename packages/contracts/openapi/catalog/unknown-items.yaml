openapi: 3.1.0
info:
  title: Data-Pulse-2 Catalog — Unknown Items API
  version: "1.2.0-draft"
  description: >
    Spec 005 Wave 1 + Wave 2 + Spec 007 review-queue contract surface.
    Version 1.2.0-draft (additive MINOR per Constitution §IV) extends the
    005 surface with three new tenant-admin operations
    (`tenantAdminInspectUnknownItem`, `tenantAdminReopenUnknownItem`,
    `tenantAdminBulkDismissUnknownItems`), the `ReviewQueueItem` projection
    (= `UnknownItem` minus `sale_context`, FR-007 / 006 FR-021a), the
    `forbidden` 8th error category, and list query-param extensions
    (`source_system`, `sort`, `group_by`). The five 005 operationIds are
    unchanged. NOTE: the review-read responses narrow to `ReviewQueueItem`
    (no `sale_context`); the shipped `UnknownItem` schema is retained
    unchanged for the POS capture round-trip (R7.3).

    Defines eight operations for the POS-Pulse catalog-sync /
    unknown-item-reconciliation + review-queue workflow:

      1. `posCaptureItem`            — POS submits an item reference; when
         it cannot be resolved against the tenant's active alias set, a
         pending `unknown_items` row is created scoped to (tenant, store)
         per FR-001, FR-010, FR-030, FR-031, FR-032.
      2. `tenantAdminListUnknownItems` — tenant admins (and store-scoped
         operators per RLS) read the pending review queue per FR-014.
      3. `tenantAdminDismissUnknownItem` — tenant admins terminate a
         pending item as invalid per FR-003, FR-004 (monotonic lifecycle).
      4. `tenantAdminLinkUnknownItem` (Wave 2) — tenant admin links a
         pending unknown item to an existing tenant product, creating or
         reactivating the appropriate alias in a single atomic transaction
         per FR-050, FR-051, FR-052, FR-053.
      5. `tenantAdminCreateProductFromUnknownItem` (Wave 2) — tenant admin
         creates a new tenant product directly from a pending unknown item,
         producing product + alias + lifecycle transition atomically per
         FR-060, FR-061, FR-062, FR-063.
      6. `tenantAdminInspectUnknownItem` (007) — tenant admin inspects a
         single item as a `ReviewQueueItem` (no `sale_context`); cross-tenant
         / out-of-scope ids are non-disclosing 404s per FR-009 / SI-004.
      7. `tenantAdminReopenUnknownItem` (007) — tenant-wide principals only;
         reopens a `dismissed` item by creating a fresh `pending` row (005
         FR-005), preserving the original; in-scope store-scoped actors get
         `403 forbidden` per FR-042. Idempotent (FR-063).
      8. `tenantAdminBulkDismissUnknownItems` (007) — dismiss a bounded
         selection (≤200) by decomposing into the shipped per-item dismiss
         (006 FR-070a); over-ceiling batches are rejected whole per FR-044.
         Idempotent (FR-063).

    Wave 2 operationIds added by 005-WAVE2-CONTRACT (T600/T601); the three
    007 review-queue operationIds (6-8) by slice 007-CONTRACT (T010/T011).

    Schemas align with `specs/005-pos-catalog-sync-reconciliation/data-model.md`
    §2.1 (lifecycle) and §2.2 (tenant + store scoping). Failure-response
    `error.code` values follow `research.md` §R2 taxonomy. The contract is
    consumed by `apps/api/test/catalog/unknown-items/contract.spec.ts` plus
    the umbrella conformance suite once the loader is taught to discover
    nested YAML directories (currently a no-op — see T504 verdict in the
    slice closeout report).

    Authentication boundary:

      * `posCaptureItem` is POS-authenticated via the same Clerk JWT
        bearer scheme used by `pos-shifts.openapi.yaml` and
        `pos-audit-events.openapi.yaml` (component `clerkJwt`).
        The principal's resolved store binding (per spec 002) supplies
        `store_id`; rejected with 400 `store_context_required` if absent
        (FR-011).
      * `tenantAdminListUnknownItems` and `tenantAdminDismissUnknownItem`
        are dashboard-session-authenticated via `cookieAuth` (component
        matches `outbox.openapi.yaml` / `memberships.openapi.yaml`).
        Cross-tenant + out-of-scope requests are non-disclosing 404s per
        SI-001 / SI-004 / FR-013 / FR-092.

    Idempotency:

      * `posCaptureItem` REQUIRES the `Idempotency-Key` header following
        the existing `IdempotencyInterceptor` convention (header name +
        shape mirror `memberships.openapi.yaml` `createInvitation`).
        `Idempotency-Token` is NOT used here — the spec.md/quickstart.md
        drift to `Idempotency-Token` was recorded as a known issue under
        `tasks.md` T564 (closeout fixup).

servers:
  - url: https://api.example.com

tags:
  - name: catalog-unknown-items
    description: >
      POS catalog sync — unknown-item capture and tenant-admin review
      queue. Spec 005 Wave 1.

paths:
  /api/pos/v1/catalog/unknown-items:
    post:
      summary: POS captures (or resolves) a catalog item reference.
      operationId: posCaptureItem
      x-idempotency: required
      tags: [catalog-unknown-items]
      security:
        - clerkJwt: []
      description: >
        Look up the submitted identifier against the tenant's active
        alias set. On a hit, return the resolved product reference; on a
        miss, create a `pending` `unknown_items` row scoped to (tenant,
        store) and return its stable id. The submitting POS device's
        authenticated principal supplies both `tenant_id` and `store_id`
        (per spec 002); body-supplied tenant / store fields are NOT
        accepted (Constitution §III).

        Idempotency: the `Idempotency-Key` header is REQUIRED. The
        existing `IdempotencyInterceptor` keys on `(method, route,
        clientId = POS device principal id, key)` per FR-021a and honors
        a default 72-hour TTL (≥ FR-021b's 24h minimum). Identical retry
        replays the stored response with `Idempotent-Replayed: true`;
        key-reuse with a different logical payload returns 409
        `idempotency_key_conflict` per FR-021c.

        Failure-response error codes follow research.md §R2 taxonomy:
        `validation_failure`, `store_context_required`,
        `idempotency_key_required`, `idempotency_key_malformed`,
        `idempotency_key_conflict`.
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
            minLength: 16
            maxLength: 128
            pattern: "^[\\x21-\\x7E]{16,128}$"
          description: >
            Client-generated opaque token (UUIDv7 recommended) that
            enables safe retries. Same key + same body replays the
            original response; same key + different body returns 409.
            Missing header returns 400 (policy: required). Shape and
            convention match `memberships.openapi.yaml#createInvitation`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PosCaptureItemRequest"
      responses:
        "200":
          description: >
            Identifier resolved to an existing tenant product (FR-022,
            FR-030, FR-031). No `unknown_items` row was created.
          headers:
            Idempotent-Replayed:
              schema:
                type: string
                enum: ["true"]
              description: >
                Present with value "true" when this response is an
                idempotent replay of an earlier successful capture.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PosCaptureResolvedResponse"
        "201":
          description: >
            Identifier did not resolve; a new `pending` `unknown_items`
            row was created (or, on natural dedup, an existing pending
            row's reference was returned per FR-032).
          headers:
            Idempotent-Replayed:
              schema:
                type: string
                enum: ["true"]
              description: >
                Present with value "true" when this response is an
                idempotent replay.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PosCaptureUnknownResponse"
        "400":
          description: >
            Bad request. Possible `error.code` values:
            `validation_failure` (FR-070 / FR-071 — missing or malformed
            field), `store_context_required` (FR-011 — POS principal
            lacks resolved store), `idempotency_key_required`,
            `idempotency_key_malformed`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: POS principal is missing or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: >
            Idempotency-Key reuse with a different logical payload
            (FR-021c). `error.code = "idempotency_key_conflict"`.
            Audit subject: `unknown_item.idempotency_mismatch_rejected`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "425":
          description: >
            Too Early. The original request with this Idempotency-Key is
            still being processed. Retry after `Retry-After` seconds with
            the same key and body.
          headers:
            Retry-After:
              schema:
                type: integer
              description: Seconds to wait before retrying.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/catalog/unknown-items:
    get:
      summary: List pending unknown items for the active tenant.
      operationId: tenantAdminListUnknownItems
      tags: [catalog-unknown-items]
      description: >
        Returns pending `unknown_items` visible to the authenticated
        dashboard principal under the active tenant context. Tenant-wide
        actors (tenant admin / tenant owner) see all stores in the
        tenant; store-scoped operators see only items captured at stores
        they have access to (RLS-enforced per 003 §8 / FR-014). Ordered
        by `encountered_at DESC, id DESC`. Cursor pagination matches the
        `outbox.openapi.yaml` precedent: opaque base64url token encoding
        the next-page boundary.

        Cross-tenant probes are non-disclosing — the page is filtered to
        the active tenant by RLS, never by an authorization error
        (SI-001 / SI-004 / FR-013).
      parameters:
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [pending, resolved, dismissed]
            default: pending
          description: >
            Lifecycle filter. Wave 1 supports `pending`; the `resolved`
            and `dismissed` values are reserved for forward-compatibility
            with the Wave 2 reconciliation review surfaces.
        - in: query
          name: store_id
          required: false
          schema:
            type: string
            format: uuid
          description: >
            Optional explicit store filter. RLS still applies; supplying
            a store the principal cannot see returns the same empty
            page a non-disclosing probe would. Tenant-wide actors may
            omit this to see all stores.
        - in: query
          name: cursor
          required: false
          schema:
            type: string
            minLength: 1
          description: >
            Opaque pagination token returned in the previous page's
            `next_cursor`. Clients MUST treat as opaque.
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - in: query
          name: source_system
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 64
          description: >
            007 (US2 / FR-002). Optional filter by the originating POS
            source system. Scope-safe: facets/counts reflect only in-scope
            rows (SC-007). RLS still applies.
        - in: query
          name: sort
          required: false
          schema:
            type: string
            enum: [age_asc, age_desc, store]
            default: age_desc
          description: >
            007 (US2 / FR-003). Sort order. `age_*` sorts by
            `encountered_at`; `store` groups by store binding. Default
            preserves the shipped `encountered_at DESC` ordering.
        - in: query
          name: group_by
          required: false
          schema:
            type: string
            enum: [store, source_system]
          description: >
            007 (US2 / FR-004, MAY-grouping). Optional grouping dimension.
            Grouping does NOT change the response shape: the response stays
            the flat `ListUnknownItemsResponse.items` array. `group_by`
            orders items so members of the same group are contiguous (the
            grouping is a presentation/ordering concern, not a distinct
            grouped envelope). Buckets are scope-safe — items belonging only
            to out-of-scope groups never appear, and no out-of-scope group
            is revealed via ordering, count, or any field (FR-032 / SC-007).
            A richer grouped response variant is out of v1 scope.
      responses:
        "200":
          description: OK — page of unknown items (possibly empty).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListUnknownItemsResponse"
        "400":
          description: >
            Invalid query parameter (bad UUID, bad cursor encoding,
            limit out of range).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Caller is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Caller lacks the tenant-admin / store-operator role.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/catalog/unknown-items/{id}/dismiss:
    post:
      summary: Dismiss a pending unknown item as invalid.
      operationId: tenantAdminDismissUnknownItem
      tags: [catalog-unknown-items]
      description: >
        Transition the addressed `unknown_items` row from `pending` to
        `dismissed` (FR-003 / resolution_action = `dismissed`). The
        UPDATE is constrained `WHERE resolution_status = 'pending'` to
        enforce monotonic lifecycle (FR-004). Re-dismissing a
        `dismissed` or `resolved` row returns 409 `already_reconciled`
        (research.md §R2). A subsequent POS submission of the same
        logical identifier creates a fresh `pending` row per FR-005;
        the dismissed row is preserved unchanged as audit history.

        Cross-tenant or out-of-scope addresses receive a non-disclosing
        404 (SI-001 / SI-004 / FR-013 / FR-092).
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: UUIDv7 primary key of the unknown-item row.
      responses:
        "200":
          description: >
            Item transitioned to `dismissed`. The response carries the
            updated lifecycle fields so the client can refresh its view
            without a follow-up GET.
          content:
            application/json:
              schema:
                # 007 (R7.2 / FR-007): dashboard response narrows to the
                # sale_context-free ReviewQueueItem projection. Runtime
                # swap follows in T032 (US1-LIST-PROJECTION).
                $ref: "#/components/schemas/ReviewQueueItem"
        "400":
          description: Bad request (invalid path UUID).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Caller is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Caller lacks the role to dismiss in this scope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: >
            Not found OR not in scope. The two cases share one
            non-disclosing response per SI-004.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: >
            Already reconciled. The item is already `resolved` or
            `dismissed`. `error.code = "already_reconciled"` (research
            §R2). The lifecycle UPDATE is monotonic per FR-004.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/catalog/unknown-items/{id}/link:
    post:
      summary: Link a pending unknown item to an existing tenant product.
      operationId: tenantAdminLinkUnknownItem
      tags: [catalog-unknown-items]
      description: >
        Atomically: (1) verify the target product is active in the same
        tenant; (2) create or reactivate a `product_aliases` row binding
        the unknown item's identifier to the target product; (3) transition
        the unknown item from `pending` to `resolved` with
        `resolution_action = linked`. All three effects commit together or
        none do (FR-053).

        Failure-response error codes follow research.md §R2 taxonomy:
        `alias_conflict` (FR-052 — identifier already bound to a different
        product), `target_unavailable` (FR-051 — product is retired or
        deleted), `already_reconciled` (race-loser per US3 #3 — item was
        concurrently resolved before this request committed),
        `validation_failure` (malformed request body).

        Cross-tenant or out-of-scope addresses receive a non-disclosing
        404 (SI-001 / SI-004 / FR-013 / FR-092). The conflict response
        MUST NOT disclose the conflicting product to an actor without
        authority to see it (FR-042).
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: UUIDv7 primary key of the unknown-item row.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkUnknownItemRequest"
      responses:
        "200":
          description: >
            Item linked. Unknown item transitioned to `resolved` with
            `resolution_action = linked`. The response carries the updated
            lifecycle fields so the client can refresh its view without a
            follow-up GET.
          content:
            application/json:
              schema:
                # 007 (R7.2 / FR-007): dashboard response narrows to the
                # sale_context-free ReviewQueueItem projection. Runtime
                # swap follows in T038 (US1-RECONCILIATION-PROJECTION).
                $ref: "#/components/schemas/ReviewQueueItem"
        "400":
          description: >
            Bad request. `error.code = "validation_failure"` (malformed
            path UUID or invalid request body).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Caller is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Caller lacks the tenant-admin / store-operator role.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: >
            Not found OR not in scope. Non-disclosing per SI-004.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: >
            Conflict. Possible `error.code` values: `alias_conflict`
            (FR-052 — identifier already bound to a different active
            product; conflicting product NOT disclosed per FR-042),
            `target_unavailable` (FR-051 — target product is retired or
            deleted), `already_reconciled` (US3 #3 race — item was
            concurrently resolved).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/catalog/unknown-items/{id}/create-product:
    post:
      summary: Create a new tenant product from a pending unknown item.
      operationId: tenantAdminCreateProductFromUnknownItem
      tags: [catalog-unknown-items]
      description: >
        Atomically: (1) INSERT a new `tenant_products` row in the
        authenticated tenant (body-supplied `tenant_id` is discarded per
        Constitution §III — backend authority); (2) INSERT a
        `product_aliases` row binding the unknown item's identifier to the
        new product; (3) transition the unknown item from `pending` to
        `resolved` with `resolution_action = created`. All three effects
        commit together or none do (FR-063).

        Failure-response error codes follow research.md §R2 taxonomy:
        `alias_conflict` (FR-062 — identifier already bound to a different
        product; neither the product nor the alias is created),
        `already_reconciled` (race-loser — item was concurrently resolved),
        `validation_failure` (missing or malformed required fields).

        Cross-tenant or out-of-scope addresses receive a non-disclosing
        404 (SI-001 / SI-004 / FR-013 / FR-092).
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: UUIDv7 primary key of the unknown-item row.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductFromUnknownItemRequest"
      responses:
        "201":
          description: >
            New product created and unknown item resolved. Returns the
            updated row (now `resolved` with `resolution_action = created`)
            so the client can refresh its view. The `resolved_product_id`
            field references the newly created product.
          content:
            application/json:
              schema:
                # 007 (R7.2 / FR-007): dashboard response narrows to the
                # sale_context-free ReviewQueueItem projection. Runtime
                # swap follows in T038 (US1-RECONCILIATION-PROJECTION).
                $ref: "#/components/schemas/ReviewQueueItem"
        "400":
          description: >
            Bad request. `error.code = "validation_failure"` (malformed
            path UUID, missing `name`, or missing `tax_category`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Caller is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Caller lacks the tenant-admin / store-operator role.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: >
            Not found OR not in scope. Non-disclosing per SI-004.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: >
            Conflict. Possible `error.code` values: `alias_conflict`
            (FR-062 — identifier already bound to a different active
            product; neither the new product nor the alias is created; the
            conflicting product is NOT disclosed per FR-042),
            `already_reconciled` (US3 #3 race — item was concurrently
            resolved before this request committed).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/catalog/unknown-items/{id}:
    get:
      summary: Inspect a single unknown item (review surface).
      operationId: tenantAdminInspectUnknownItem
      tags: [catalog-unknown-items]
      description: >
        007 US3 / FR-009. Returns the addressed `unknown_items` row as a
        `ReviewQueueItem` (no `sale_context`, FR-007; no candidate-match
        hint in v1, FR-070). RLS-scoped: cross-tenant or out-of-scope ids
        receive a non-disclosing 404 (SI-004 / FR-062). Inherits the
        document-level `cookieAuth`.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: UUIDv7 primary key of the unknown-item row.
      responses:
        "200":
          description: OK — the item as a ReviewQueueItem projection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewQueueItem"
        "400":
          description: >
            Bad request — malformed path UUID. `error.code = "validation"`.
            Parity with the other `{id}` operations in this contract.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Caller is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: >
            Caller lacks the role to read the review queue in this scope.
            `error.code = "forbidden"` (007 FR-051 / FR-052).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: >
            Not found OR not in scope — one non-disclosing response per
            SI-004 / FR-062.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/catalog/unknown-items/{id}/reopen:
    post:
      summary: Reopen a dismissed unknown item (tenant-wide only).
      operationId: tenantAdminReopenUnknownItem
      tags: [catalog-unknown-items]
      description: >
        007 US7. Reopen a `dismissed` item by creating a fresh `pending`
        row for the same logical identifier (005 FR-005); the original
        `dismissed` row is preserved unchanged. Tenant-wide actors only:
        an in-scope store-scoped actor receives `403 forbidden`
        ("tenant-wide authority required", FR-042); an out-of-scope actor
        receives a non-disclosing `404` (FR-062). The authority split is
        decided in the service layer, not the route guard (R7.4).

        Reopening a `resolved` item returns `409 already_reconciled` with
        `details.prior_state` (FR-043). Both the reopen action and the
        fresh capture are audited (FR-041 / FR-110, R7.5). Carries the
        `Idempotency-Key` header (identical-replay-response): replaying the
        same key + body yields the same fresh row + response; a changed
        body returns `409 idempotency_key_conflict`.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: UUIDv7 primary key of the dismissed unknown-item row.
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
            minLength: 16
            maxLength: 128
            pattern: "^[\\x21-\\x7E]{16,128}$"
          description: >
            Idempotency key for identical-replay-response (007 FR-063,
            ISOLATE verdict T003). Bounds match the runtime
            `IdempotencyInterceptor` (apps/api/src/idempotency/
            idempotency.interceptor.ts: 16–128 printable ASCII, no
            whitespace) and the `posCaptureItem` declaration above — NOT
            `Idempotency-Token` (T564).
      x-idempotency: required
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReopenUnknownItemRequest"
      responses:
        "201":
          description: >
            Reopened — a fresh `pending` row was created for the same
            logical identifier (005 FR-005). Body is the new row as a
            ReviewQueueItem.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewQueueItem"
        "400":
          description: Bad request (invalid path UUID or body shape).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Caller is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: >
            In-scope but insufficient authority. `error.code = "forbidden"`
            — reopen requires tenant-wide authority (FR-042). Distinct from
            404: the item exists in the caller's scope, but the caller may
            not reopen it.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: >
            Not found OR not in scope — one non-disclosing response per
            SI-004 / FR-062.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: >
            Conflict. `error.code` is `already_reconciled` (the item is
            already `resolved`; `details.prior_state` is set, FR-043) or
            `idempotency_key_conflict` (same key replayed with a different
            body).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "425":
          description: >
            Too Early. The original request with this Idempotency-Key is
            still being processed (the IdempotencyInterceptor in-progress
            marker is set). Retry after `Retry-After` seconds with the same
            key and body. Body shape mirrors `posCaptureItem`'s 425.
          headers:
            Retry-After:
              schema:
                type: integer
              description: Seconds to wait before retrying.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/catalog/unknown-items/bulk-dismiss:
    post:
      summary: Dismiss a bounded selection of unknown items.
      operationId: tenantAdminBulkDismissUnknownItems
      tags: [catalog-unknown-items]
      description: >
        007 US8. Dismiss up to 200 unknown items in one request. The batch
        is rejected whole with `400 validation` when more than 200 ids are
        supplied (FR-044) — nothing is dismissed. Within a valid batch each
        id is decomposed into the shipped per-item dismiss path (006
        FR-070a, no new lifecycle write); the response carries one outcome
        per id (FR-070a). Each successful dismiss is audited. Carries the
        `Idempotency-Key` header (identical-replay-response, FR-063).
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
            minLength: 16
            maxLength: 128
            pattern: "^[\\x21-\\x7E]{16,128}$"
          description: >
            Idempotency key for identical-replay-response (007 FR-063,
            ISOLATE verdict T003). Bounds match the runtime
            `IdempotencyInterceptor` (apps/api/src/idempotency/
            idempotency.interceptor.ts: 16–128 printable ASCII, no
            whitespace) and the `posCaptureItem` declaration — NOT
            `Idempotency-Token` (T564).
      x-idempotency: required
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkDismissUnknownItemsRequest"
      responses:
        "200":
          description: >
            Batch processed. Body is the per-item outcome list (a mixed
            batch can contain successes and per-item failures; the request
            itself succeeds).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkDismissUnknownItemsResponse"
        "400":
          description: >
            Whole-batch reject — more than 200 ids, or an invalid body.
            `error.code = "validation"`. Nothing is dismissed (FR-044).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Caller is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: >
            Caller lacks the role to dismiss in this scope.
            `error.code = "forbidden"`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: >
            Conflict. `error.code = "idempotency_key_conflict"` — the same
            Idempotency-Key was replayed with a different body. (Per-item
            terminal states like `already_reconciled` surface in the 200
            outcome list, NOT here.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "425":
          description: >
            Too Early. The original request with this Idempotency-Key is
            still being processed. Retry after `Retry-After` seconds with
            the same key and body. Body shape mirrors `posCaptureItem`'s 425.
          headers:
            Retry-After:
              schema:
                type: integer
              description: Seconds to wait before retrying.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: dp2_session
    clerkJwt:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    PosCaptureItemRequest:
      type: object
      additionalProperties: false
      required:
        - identifier_type
        - identifier_value
      properties:
        identifier_type:
          type: string
          enum: [barcode, sku, plu, supplier_code, external_pos_id]
          description: >
            Identifier kind, matching 003's
            `unknown_items_identifier_type_valid` CHECK. `external_pos_id`
            REQUIRES `source_system`.
        identifier_value:
          type: string
          minLength: 1
          maxLength: 200
          description: >
            Identifier string (barcode, SKU, etc.). Length matches
            003's `unknown_items_value_length` CHECK. Catalog reference
            data per Constitution §XIV — not PII.
        source_system:
          type: string
          minLength: 1
          maxLength: 64
          nullable: true
          description: >
            Required when `identifier_type = external_pos_id`; MUST be
            null/absent otherwise. Mirrors 003's
            `unknown_items_source_system_required` CHECK.
        sale_context:
          type: object
          additionalProperties: true
          nullable: true
          description: >
            Opaque advisory metadata (POS cashier label, vendor hint,
            etc.) flowed into the existing 003
            `unknown_items.sale_context jsonb` column. NON-IDENTITY,
            NON-MATCHING, NON-AUTHORITATIVE per FR-006. Redaction applies
            at all logger boundaries per 003 §8 + Constitution §14.

    PosCaptureResolvedResponse:
      type: object
      additionalProperties: false
      required:
        - kind
        - product_id
      properties:
        kind:
          type: string
          enum: [resolved]
          description: Discriminator literal — alias resolution succeeded.
        product_id:
          type: string
          format: uuid
          description: Tenant-product UUID the identifier resolved to.
        alias_id:
          type: string
          format: uuid
          description: >
            Optional alias row id that produced the resolution.
            Convenience for auditing; clients SHOULD NOT depend on it.

    PosCaptureUnknownResponse:
      type: object
      additionalProperties: false
      required:
        - kind
        - unknown_item
      properties:
        kind:
          type: string
          enum: [unknown]
          description: >
            Discriminator literal — identifier did not resolve; a
            `pending` `unknown_items` row is the result.
        unknown_item:
          $ref: "#/components/schemas/UnknownItem"

    UnknownItem:
      type: object
      additionalProperties: false
      description: >
        Redacted projection of an `unknown_items` row. Schema mirrors
        003 `data-model.md` §8 + 005 `data-model.md` §2.1 / §2.2. The
        `sale_context` field is opaque advisory metadata (FR-006).
      required:
        - id
        - tenant_id
        - store_id
        - identifier_type
        - identifier_value
        - source_system
        - resolution_status
        - resolution_action
        - resolved_at
        - resolved_by
        - resolved_product_id
        - encountered_at
      properties:
        id:
          type: string
          format: uuid
          description: UUIDv7 primary key.
        tenant_id:
          type: string
          format: uuid
        store_id:
          type: string
          format: uuid
          description: >
            Non-null per FR-010; capture always carries the POS
            principal's resolved store binding.
        identifier_type:
          type: string
          enum: [barcode, sku, plu, supplier_code, external_pos_id]
        identifier_value:
          type: string
          minLength: 1
          maxLength: 200
        source_system:
          type: string
          minLength: 1
          maxLength: 64
          nullable: true
          description: >
            Non-null when `identifier_type = external_pos_id`; null
            otherwise. Matches 003 CHECK
            `unknown_items_source_system_required`.
        resolution_status:
          type: string
          enum: [pending, resolved, dismissed]
          description: Lifecycle state per FR-001 / FR-004.
        resolution_action:
          type: string
          enum: [linked, created, dismissed]
          nullable: true
          description: >
            Populated only when `resolution_status != 'pending'`.
            Wave 1 only emits `dismissed`; `linked` and `created` are
            reserved for Wave 2 reconciliation.
        resolved_at:
          type: string
          format: date-time
          nullable: true
        resolved_by:
          type: string
          format: uuid
          nullable: true
          description: Acting principal's id when not pending.
        resolved_product_id:
          type: string
          format: uuid
          nullable: true
          description: >
            Set only when `resolution_action = linked` or `created`
            (Wave 2). Always null for Wave 1 dismiss outcomes.
        encountered_at:
          type: string
          format: date-time
          description: When the capture first happened.
        sale_context:
          type: object
          additionalProperties: true
          nullable: true
          description: >
            Opaque advisory metadata per FR-006 / FR-006a. Carries
            POS-supplied hints inside the existing 003 `sale_context
            jsonb` field. Non-identity, non-authoritative.

    ListUnknownItemsResponse:
      type: object
      additionalProperties: false
      required:
        - items
        - next_cursor
      properties:
        items:
          type: array
          maxItems: 200
          items:
            # 007 (T002 TIGHTEN / FR-007): the list IS the review queue, so
            # its items are the `ReviewQueueItem` projection — `UnknownItem`
            # minus `sale_context`. The shipped `UnknownItem` schema is
            # retained unchanged for the POS capture round-trip (R7.3).
            $ref: "#/components/schemas/ReviewQueueItem"
        next_cursor:
          type: string
          nullable: true
          description: >
            Opaque cursor for the next page; null on the last page.
            Clients MUST treat as opaque.

    LinkUnknownItemRequest:
      type: object
      additionalProperties: false
      description: >
        Wave 2 (005-WAVE2-CONTRACT T600). Request body for
        `tenantAdminLinkUnknownItem`. Carries the target product reference
        only; all tenant / store scoping is resolved from the
        authenticated principal (Constitution §III — backend authority).
        Snake_case on the wire per Wave 1 conventions.
      required:
        - product_id
      properties:
        product_id:
          type: string
          format: uuid
          description: >
            UUID of the existing `tenant_products` row to link to. Must
            be active (not retired / deleted) in the authenticated
            tenant (FR-051).

    CreateProductFromUnknownItemRequest:
      type: object
      additionalProperties: false
      description: >
        Wave 2 (005-WAVE2-CONTRACT T600). Request body for
        `tenantAdminCreateProductFromUnknownItem`. Carries the minimal
        fields required by 003 §5 for `tenant_products` (FR-060). The
        persisted `tenant_id` is always taken from the authenticated
        principal (Constitution §III — body-supplied `tenant_id` is
        silently discarded). Snake_case on the wire per Wave 1 conventions.
      required:
        - name
        - tax_category
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
          description: >
            Human-readable product name. Non-empty after trim.
            Mirrors the `tenant_products.name` NOT NULL constraint
            in 003 §5.
        tax_category:
          type: string
          minLength: 1
          maxLength: 64
          description: >
            Tax category identifier for the new product. Non-empty
            after trim. Mirrors `tenant_products.tax_category` in
            003 §5.
        category_id:
          type: string
          format: uuid
          nullable: true
          description: >
            Optional tenant-product category UUID. Null if the product
            is uncategorized. Mirrors `tenant_products.category_id`
            in 003 §5.

    ReviewQueueItem:
      type: object
      additionalProperties: false
      description: >
        007 (data-model §2.1, FR-007 / 006 FR-021a). The review-surface
        projection of an `unknown_items` row: the shipped `UnknownItem`
        field set MINUS `sale_context`. Used by every 007 dashboard-review
        response (list, inspect, FR-001a terminal detail). `sale_context`
        is descriptive metadata that MUST NOT appear on the review surface;
        the shipped `UnknownItem` schema retains it for the POS capture
        round-trip (R7.3).
      required:
        - id
        - tenant_id
        - store_id
        - identifier_type
        - identifier_value
        - source_system
        - resolution_status
        - resolution_action
        - resolved_at
        - resolved_by
        - encountered_at
      properties:
        id:
          type: string
          format: uuid
          description: UUIDv7 primary key.
        tenant_id:
          type: string
          format: uuid
        store_id:
          type: string
          format: uuid
          description: Non-null per 005 FR-010.
        identifier_type:
          type: string
          enum: [barcode, sku, plu, supplier_code, external_pos_id]
        identifier_value:
          type: string
          minLength: 1
          maxLength: 200
        source_system:
          type: string
          minLength: 1
          maxLength: 64
          nullable: true
          description: Non-null when `identifier_type = external_pos_id`; null otherwise.
        resolution_status:
          type: string
          enum: [pending, resolved, dismissed]
          description: Lifecycle state per FR-001 / FR-004.
        resolution_action:
          type: string
          enum: [linked, created, dismissed]
          nullable: true
          description: Populated only when `resolution_status != 'pending'`.
        resolved_at:
          type: string
          format: date-time
          nullable: true
        resolved_by:
          type: string
          format: uuid
          nullable: true
          description: Acting principal's id when not pending.
        resolved_product_id:
          type: string
          format: uuid
          nullable: true
          description: >
            FR-001a conditional: present only when the caller has authority
            to see the linked/created product; OMITTED otherwise while the
            item row remains visible. Hence not in `required`.
        encountered_at:
          type: string
          format: date-time
          description: Capture timestamp; age basis for sort/filter.

    ReopenUnknownItemRequest:
      type: object
      additionalProperties: false
      description: >
        007 US7. Request body for `tenantAdminReopenUnknownItem`. Empty by
        design — tenant / store scope and authority are resolved from the
        authenticated principal (Constitution §III). No body-supplied
        tenant_id / store_id is honoured. The `{}` (or absent) body is the
        normal case; the schema exists to enforce `additionalProperties:
        false` (no smuggled fields).
      properties: {}

    BulkDismissUnknownItemsRequest:
      type: object
      additionalProperties: false
      description: >
        007 US8. Request body for `tenantAdminBulkDismissUnknownItems`. A
        bounded selection of unknown-item ids to dismiss. More than
        `maxItems` ids → whole-batch `400 validation` (FR-044).
      required:
        - ids
      properties:
        ids:
          type: array
          minItems: 1
          maxItems: 200
          uniqueItems: true
          items:
            type: string
            format: uuid
          description: >
            The unknown-item ids to dismiss (≤200, FR-044). Each is
            decomposed into the shipped per-item dismiss path (006 FR-070a).

    BulkDismissUnknownItemsResponse:
      type: object
      additionalProperties: false
      description: >
        007 US8 (data-model §2.3). One outcome per submitted id; no
        cross-item coupling — one item's failure does not affect siblings.
      required:
        - outcomes
      properties:
        outcomes:
          type: array
          maxItems: 200
          items:
            $ref: "#/components/schemas/BulkDismissOutcome"

    BulkDismissOutcome:
      type: object
      additionalProperties: false
      description: >
        007 US8. The outcome of dismissing a single id within a bulk batch.
      required:
        - id
        - outcome
      properties:
        id:
          type: string
          format: uuid
        outcome:
          type: string
          enum: [dismissed, already_reconciled, not_found]
          description: >
            Per-item result. `dismissed` on success; `already_reconciled`
            when the item was already terminal (`details.prior_state` may
            accompany it); `not_found` when out-of-scope / absent
            (non-disclosing, SI-004).
        details:
          type: object
          additionalProperties: true
          nullable: true
          description: >
            Optional per-item detail (e.g. `prior_state` for
            `already_reconciled`). Null for plain `dismissed`.

    Error:
      type: object
      additionalProperties: false
      required:
        - error
      description: >
        Canonical error envelope shared with `auth.openapi.yaml`,
        `outbox.openapi.yaml`, and others. The `error.code` enum is
        documented in `research.md` §R2 (FR-091 taxonomy).
      properties:
        error:
          type: object
          additionalProperties: false
          required:
            - code
            - message
          properties:
            code:
              type: string
              description: >
                Stable machine-readable error code (FR-091 / 007 FR-100
                taxonomy). The closed 8-category review-queue vocabulary is:
                `validation`, `target_unavailable`, `alias_conflict`,
                `idempotency_key_conflict`, `already_reconciled`,
                `not_found`, `forbidden` (007's 8th category — in-scope
                insufficient authority, distinct from `not_found`), and
                `system_failure`. NOTE: some shipped-005 operation prose
                uses the legacy spelling `validation_failure`; the canonical
                007 wire code is `validation` (research §R4). Shipped ops are
                not retrofitted (ISOLATE, T003); the runtime already emits
                `validation` (the prose is documented drift, not a live
                second code).
            message:
              type: string
              description: Human-readable summary; no sensitive data.
            request_id:
              type: string
              format: uuid
              nullable: true
              description: Server-assigned correlation id.

security:
  - cookieAuth: []

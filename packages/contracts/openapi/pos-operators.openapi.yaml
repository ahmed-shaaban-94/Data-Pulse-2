openapi: 3.1.0
info:
  title: Data-Pulse-2 POS Operators API
  version: "1.1.0-draft"
  description: >
    POS-Pulse 004 Backend operator identity surface. Wave 1 (sign-in /
    sign-out) + Wave 3 (roster, takeover confirm, active-session).


    All endpoints authenticate the caller via the role-named `operator-identity`
    security scheme — a provider-identity JWT in `Authorization: Bearer <jwt>`
    (spec 030 / 028 DOC-1; previously named `clerkJwt`), paired with the platform
    device-token header (per the existing 001/002 baseline). The JWT is identity
    proof only — NOT business authorization (028 §6 CM-1). Both endpoints fail
    closed: every refusal returns the same generic
    `{ error: { code, message, request_id } }` envelope and does not
    enumerate causes.


    Wave 3 minimum-disclosure principles (FR-013):
    - `GET /roster` returns cashier identity only (no PIN, no credentials).
    - `POST /takeover/confirm` is idempotent via `event_id`; returns the
      same signed-in envelope as sign-in on success.
    - `GET /active-session` returns ONLY `{kind}` — no terminal id, no
      operator identity, no timestamps.


    Cross-cutting conventions live in
    `specs/001-foundation-auth-tenant-store/contracts/README.md`.
servers:
  - url: https://api.example.com
paths:
  /api/pos/v1/operators/sign-in:
    post:
      summary: Sign a POS operator in to a terminal.
      description: >
        Verifies the Clerk JWT, resolves the device-token claim to
        `tenant_id` + `branch_id` (mapped internally to `store_id`),
        validates membership / role eligibility, validates the terminal
        attestation, and — on success — creates a backend operator
        session row and returns its `id` and `issued_at` in
        `operator_session`. The backend operator session is server-side
        state only in Wave 1 — it is not returned as a POS-facing bearer
        token and is not used to authenticate subsequent calls. The
        Clerk JWT is **not** propagated past the verifier and never
        appears in the response.
      operationId: posOperatorSignIn
      tags: [pos-operators]
      security:
        - operator-identity: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PosOperatorSignInRequest"
      responses:
        "200":
          description: >
            Either a successful sign-in (`kind: signed_in`) or a
            minimum-disclosure takeover-required signal
            (`kind: takeover_required`). The response is a tagged union
            discriminated by `kind`. Clients MUST switch on `kind` and
            MUST NOT assume any other field is present until the variant
            is confirmed.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/PosOperatorSignInSucceeded"
                  - $ref: "#/components/schemas/PosOperatorTakeoverRequired"
                discriminator:
                  propertyName: kind
                  mapping:
                    signed_in: "#/components/schemas/PosOperatorSignInSucceeded"
                    takeover_required: "#/components/schemas/PosOperatorTakeoverRequired"
        "401":
          description: >
            Generic refusal. The body does not distinguish between invalid
            Clerk JWT, missing user mapping, disabled or deleted user,
            absent / non-permitting membership, branch / tenant mismatch,
            invalid or revoked device token, or rate-limit exhaustion. The
            actual cause is recorded server-side with `request_id` and is
            never returned to the client.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/pos/v1/operators/sign-out:
    post:
      summary: Sign the current POS operator out of a terminal.
      description: >
        Revokes the backend POS operator session identified by the
        `session_id` body field, on behalf of the Clerk-authenticated
        caller paired with the platform device-token header. Idempotent
        in effect: a session id that is already revoked, expired, or
        unknown returns the same generic refusal envelope as any other
        invalid sign-out attempt. The Clerk session lifecycle is Clerk's;
        Data-Pulse-2 does not attempt to revoke the Clerk session here.
      operationId: posOperatorSignOut
      tags: [pos-operators]
      security:
        - operator-identity: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PosOperatorSignOutRequest"
      responses:
        "200":
          description: Session revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PosOperatorSignOutResponse"
        "401":
          description: >
            Generic refusal. The body does not distinguish between an
            invalid Clerk JWT, an unknown / already-revoked / expired
            session id, a session id that does not belong to the
            authenticated operator, a tenant / branch mismatch against
            the device-token claim, or rate-limit exhaustion.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/pos/v1/operators/roster:
    get:
      summary: Return the cashier roster for a branch.
      description: >
        Returns all cashier-role members of the branch resolved from the
        device-token claim. The optional `branch_id` query parameter
        allows POS-Pulse to confirm the branch scope it expects — the
        server validates it against the device token's resolved scope and
        returns a 401 on mismatch.


        Minimum-disclosure (FR-013): the response carries only the fields
        POS-Pulse needs to render the cashier picker — id (Clerk subject),
        display_name, and role. No email, no phone, no PIN, no credential
        fragments appear in this response at any time.
      operationId: posOperatorRoster
      tags: [pos-operators]
      security:
        - operator-identity: []
      parameters:
        - name: branch_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: >
            Branch id to scope the roster. When provided, the server
            validates it against the device token's resolved branch scope;
            a mismatch returns a generic 401. When omitted, the server
            uses the device token's branch scope directly. POS callers
            SHOULD always pass this to catch stale token / branch
            drift early.
      responses:
        "200":
          description: Cashier roster for the resolved branch.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PosRosterResponse"
        "401":
          description: >
            Generic refusal. The body does not distinguish between an
            invalid Clerk JWT, an invalid device token, a
            `branch_id` mismatch, or rate-limit exhaustion.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/pos/v1/operators/takeover/confirm:
    post:
      summary: Confirm a POS operator takeover.
      description: >
        Confirms the takeover of an active operator session by a new
        operator who has already received the `kind: takeover_required`
        signal at sign-in. Supersedes the existing session, creates a new
        operator session row for the incoming operator, and emits a
        `operator.session.takeover` audit event.


        Idempotency: the `event_id` field acts as the client-side
        dedup key. Re-submitting the same `event_id` with the same
        `operator_id` returns the same signed-in envelope without
        creating a second session row. Re-submitting with a different
        `operator_id` returns a generic 401 (prevents probing).


        On success the response shape is identical to sign-in success
        (`kind: signed_in`) — POS-Pulse can reuse the same reducer
        path.
      operationId: posOperatorTakeoverConfirm
      tags: [pos-operators]
      security:
        - operator-identity: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PosTakeoverConfirmRequest"
      responses:
        "200":
          description: Takeover confirmed; new operator session created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PosOperatorSignInSucceeded"
        "401":
          description: >
            Generic refusal. The body does not distinguish between an
            invalid Clerk JWT, an `operator_id` mismatch against a prior
            submission of the same `event_id`, no active session to
            supersede, an invalid device token, a branch / tenant
            mismatch, or rate-limit exhaustion.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/pos/v1/operators/active-session:
    get:
      summary: Check whether the caller has an active POS operator session.
      description: >
        Returns a minimum-disclosure signal indicating whether the
        operator identified by `operator_id` currently holds an active
        (non-revoked, non-expired) POS operator session on any terminal
        within the specified `branch_id`. The caller must have an active
        membership for that branch; the check is refused otherwise.


        Minimum-disclosure (FR-013): the response MUST contain ONLY the
        `kind` discriminator. No terminal id, no session id, no timestamps,
        no operator identity, no branch metadata. Clients MUST switch on
        `kind` and MUST NOT assume any other field is present.


        This endpoint exists so POS-Pulse can detect mid-session
        account-disable (FR-016) and surface the appropriate UX without
        having to poll sign-in. It is NOT a session-token verification
        endpoint — it does not assert that a Clerk session is valid or
        that the caller is currently authenticated for a transaction.
      operationId: posOperatorActiveSession
      tags: [pos-operators]
      security:
        - operator-identity: []
      parameters:
        - name: branch_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: >
            UUID of the branch (store) to scope the session check to.
            Required because GET endpoints carry no device-token
            attestation — the branch cannot be resolved implicitly.
            The caller must have an active membership for this branch.
        - name: operator_id
          in: query
          required: true
          schema:
            type: string
            minLength: 1
          description: >
            Clerk subject (`clerk_user_id`) of the operator to query.
            The server resolves this to the internal `users.id` and
            looks up active operator-session rows scoped to the
            specified branch.
      responses:
        "200":
          description: >
            Minimum-disclosure active-session signal. The body is ONLY
            `{kind}` — no additional fields are present or implied.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PosActiveSessionResponse"
        "401":
          description: >
            Generic refusal. The body does not distinguish between an
            invalid Clerk JWT, an invalid device token, or rate-limit
            exhaustion.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  securitySchemes:
    # `operator-identity` is the role-named provider-identity scheme
    # (spec 030 / 028 DOC-1). It replaces the provider-named `clerkJwt` key: the
    # credential is the operator's identity-proof JWT presented at sign-in /
    # subsequent calls. Identity proof ONLY — NOT business authorization
    # (028 §6 CM-1). The provider (Clerk, today) is named only in prose, never
    # in the scheme key. Doc<->runtime-honest: the runtime already verifies this
    # provider-identity JWT; only the contract name changes.
    operator-identity:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Provider-identity JWT (spec 030 / 028 §6 CM-1), presented as
        `Authorization: Bearer <jwt>`. Identity proof / sign-in evidence ONLY —
        it is NOT business authorization. Verified at the API edge against the
        identity provider's JWKS (signature, `iss`, `aud`, `exp`, `nbf`, `iat`).
        Fail-closed on JWKS fetch error or signature mismatch — no allow-list
        shortcut, no cached last-known-good. The provider is Clerk today, named
        only as the current implementation; the scheme name is provider-neutral.
        The token is not propagated past the verifier.
  schemas:
    # -------------------------------------------------------------------
    # Sign-in request
    # -------------------------------------------------------------------
    PosOperatorSignInRequest:
      type: object
      required: [kind, device_token_attestation]
      additionalProperties: false
      description: >
        `branch_id` is intentionally **not** in the request body —
        Data-Pulse-2 resolves it server-side from the platform
        device-token claim (terminal scope) and maps it internally to
        `store_id` / `active_store_id` at the DTO/service boundary.
        `branch_id` remains the only POS-facing vocabulary on response
        payloads (FR-POS-AUTH-7).
      properties:
        kind:
          type: string
          enum: [manager_admin]
          description: >
            Discriminates the sign-in surface. `manager_admin` is the
            only Wave 1 kind. Future surfaces would extend the enum
            without breaking the sign-in operation contract.
        device_token_attestation:
          type: string
          minLength: 1
          description: >
            Terminal-side proof of possession of the paired device
            token. The backend validates the device token (resolving
            its `tenant_id` + `branch_id` scope) per the existing
            001/002 platform baseline. The plaintext device token /
            attestation never appears in logs, audit rows, or worker
            payloads.
    # -------------------------------------------------------------------
    # Sign-in 200 — discriminated union over `kind`
    # -------------------------------------------------------------------
    PosOperatorSignInSucceeded:
      type: object
      required: [kind, operator, operator_session]
      additionalProperties: false
      properties:
        kind:
          type: string
          enum: [signed_in]
        operator:
          $ref: "#/components/schemas/PosOperatorSummary"
        operator_session:
          $ref: "#/components/schemas/PosOperatorSessionSummary"
    PosOperatorTakeoverRequired:
      type: object
      required: [kind]
      additionalProperties: false
      description: >
        Minimum-disclosure signal that an active operator session already
        exists on the resolved terminal. The response intentionally
        contains no operator identity, no session id, no timestamps, and
        no tenant or branch metadata — clients receive only the signal.
        The takeover confirmation flow itself is **out of scope for
        Wave 1** and ships in a later wave; this `kind` exists in the
        contract so POS-Pulse can branch its UX without a contract bump
        when the confirmation endpoint lands.
      properties:
        kind:
          type: string
          enum: [takeover_required]
    # -------------------------------------------------------------------
    # Sign-out request + 200
    # -------------------------------------------------------------------
    PosOperatorSignOutRequest:
      type: object
      required: [session_id]
      additionalProperties: false
      properties:
        session_id:
          type: string
          format: uuid
          description: >
            Backend POS operator session id to revoke. Matches the `id`
            returned in `PosOperatorSessionSummary.id` at sign-in (or
            in the takeover-confirm response, when that endpoint ships
            in a later wave).
    PosOperatorSignOutResponse:
      type: object
      required: [kind]
      additionalProperties: false
      properties:
        kind:
          type: string
          enum: [signed_out]
    # -------------------------------------------------------------------
    # Operator + session summaries — Wave 1 minimum payloads
    # -------------------------------------------------------------------
    PosOperatorSummary:
      type: object
      required: [id, display_name, role, tenant_id, branch_id]
      additionalProperties: false
      description: >
        Wave 1 operator payload. Carries only what POS-Pulse needs to
        render the operator in-shift: id (Clerk subject), display_name,
        role, tenant_id, and branch_id. No email, no platform-admin
        flag, no membership detail.
      properties:
        id:
          type: string
          description: >
            Clerk subject of the operator (`users.clerk_user_id`). This
            is the same identifier POS-Pulse sees in roster, takeover,
            and active-session endpoints — preserving identity
            continuity across the POS surface. Not the local `users.id`
            (which is a UUID and is server-internal).
        display_name:
          type: string
          description: Operator display name (already resolved server-side).
        role:
          type: string
          enum: [manager, admin]
          description: >
            Operator role at sign-in time. Wave 1 admits two values —
            `manager` and `admin`. Future POS roles would extend this
            enum.
        tenant_id:
          type: string
          format: uuid
        branch_id:
          type: string
          format: uuid
          description: Internal `store_id`, surfaced as `branch_id` to POS callers.
    PosOperatorSessionSummary:
      type: object
      required: [id, issued_at]
      additionalProperties: false
      description: >
        Wave 1 operator-session payload. The backend operator session is
        server-side state in Wave 1 — POS-Pulse does **not** receive a
        bearer token to authenticate subsequent calls. Instead, the
        `id` returned here is the handle POS-Pulse passes back as
        `session_id` on the sign-out body when the operator signs out.
        Subsequent authenticated calls continue to carry the Clerk JWT
        + the platform device-token header per the existing baseline.
      properties:
        id:
          type: string
          format: uuid
          description: >
            Backend POS operator session id. POS-Pulse passes this back
            verbatim as `session_id` on sign-out.
        issued_at:
          type: string
          format: date-time
    # -------------------------------------------------------------------
    # Wave 3 — Roster
    # -------------------------------------------------------------------
    PosRosterResponse:
      type: object
      required: [cashiers]
      additionalProperties: false
      description: >
        Wave 3 roster payload. Contains only cashier-role members of the
        resolved branch. Manager / admin users are excluded — POS-Pulse
        does not need them in the cashier picker (FR-015 visibility matrix).
      properties:
        cashiers:
          type: array
          items:
            $ref: "#/components/schemas/PosRosterCashierEntry"
          description: >
            Ordered list of cashiers for the branch. May be empty if the
            branch has no active cashier-role members.
    PosRosterCashierEntry:
      type: object
      required: [id, display_name, role]
      additionalProperties: false
      description: >
        Minimum-disclosure cashier record. Carries only what POS-Pulse
        needs to render the cashier picker — no email, no phone number,
        no PIN, no credential fragment. The `id` is the Clerk subject
        (`users.clerk_user_id`) for identity continuity across POS
        endpoints.
      properties:
        id:
          type: string
          minLength: 1
          description: >
            Clerk subject of the cashier (`users.clerk_user_id`). Same
            identifier used in `active-session` and audit-event
            `acting_operator_id` fields — preserves identity continuity.
        display_name:
          type: string
          description: Cashier display name (resolved server-side).
        role:
          type: string
          enum: [cashier]
          description: >
            Always `cashier` for roster entries. A distinct schema from
            `PosOperatorSummary` to enforce the role separation at the
            contract level — roster entries are never manager or admin.
    # -------------------------------------------------------------------
    # Wave 3 — Takeover confirm request
    # -------------------------------------------------------------------
    PosTakeoverConfirmRequest:
      type: object
      required: [event_id, operator_id, device_token_attestation]
      additionalProperties: false
      description: >
        Takeover confirmation request. `event_id` is the client-generated
        dedup key for idempotency — the same `event_id` with the same
        `operator_id` re-returns the existing signed-in envelope without
        a second session row. `device_token_attestation` authenticates
        the terminal (matching the Wave 1 body-based pattern).
      properties:
        event_id:
          type: string
          format: uuid
          description: >
            Client-generated UUIDv4. Dedup key for idempotency: the backend
            stores it in the `operator_sessions.takeover_event_id` column
            and returns the existing session row on collision. POS-Pulse
            MUST generate a fresh UUIDv4 per takeover attempt, not re-use
            session ids.
        operator_id:
          type: string
          minLength: 1
          description: >
            Clerk subject of the incoming operator requesting the takeover.
            MUST match the Clerk JWT sub claim. The backend cross-references
            the two to prevent identity substitution.
        device_token_attestation:
          type: string
          minLength: 1
          description: >
            Terminal-side proof of possession of the paired device token.
            Resolves the terminal's `tenant_id` + `branch_id` scope for
            the new session row. The plaintext device token / attestation
            MUST NOT appear in logs, audit rows, or worker payloads.
    # -------------------------------------------------------------------
    # Wave 3 — Active-session response (minimum-disclosure)
    # -------------------------------------------------------------------
    PosActiveSessionResponse:
      type: object
      required: [kind]
      additionalProperties: false
      description: >
        Minimum-disclosure active-session signal (FR-013). The response
        MUST contain ONLY `kind`. No terminal id, no session id, no
        timestamps, no operator identity, no branch metadata. Clients
        MUST switch on `kind` and MUST NOT assume any other field is
        present — `additionalProperties: false` is enforced at both the
        schema and AJV conformance levels.
      properties:
        kind:
          type: string
          enum: [none, active]
          description: >
            `none` — no active operator session exists for this operator
            on the device token's resolved branch.
            `active` — at least one non-revoked, non-expired operator
            session row exists. POS-Pulse MUST treat both values as the
            complete signal and MUST NOT infer any further state.
    # -------------------------------------------------------------------
    # Generic error envelope (mirrors auth.openapi.yaml)
    # -------------------------------------------------------------------
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: >
                Stable error code. Wave 1 sign-in / sign-out refusals
                share a single generic code so the response body cannot
                distinguish causes.
            message:
              type: string
              description: Generic human-readable string. Never enumerates causes.
            request_id:
              type: string
              format: uuid
              description: >
                Server-side correlation id. The actual refusal cause is
                recorded server-side keyed by this id and is never
                returned in the response body.

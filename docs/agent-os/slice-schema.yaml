# Agent OS v1 — Slice Schema for Data-Pulse-2
#
# Every entry under `slices:` in an execution-map.yaml MUST conform to this
# schema. Maestro composes per-slice dispatch prompts directly from these
# fields; missing or malformed fields are a hard stop.

version: 1

# ----------------------------------------------------------------------------
# Slice schema — every field's type, allowed values, and meaning.
# ----------------------------------------------------------------------------

schema:
  id:
    type: string
    required: true
    description: >
      Unique slice identifier within a spec. ALL_CAPS_SNAKE_CASE. Either a
      task ID (e.g. "T340"), a descriptive name ("RLS_CROSS_STORE_FIX"), or
      a hybrid ("T350_TENANT_CATALOG_CREATE_RED").

  task_ids:
    type: list[string]
    required: false
    description: >
      Task IDs from the spec's tasks.md that this slice covers. May be empty
      for slices that exist outside the planned task list (e.g. discovered
      defect fixes). Used for cross-reference, not for dispatch.

  type:
    type: enum
    required: true
    values: [feat, fix, test, refactor, docs, chore, perf, ci]
    description: >
      Matches the git commit type. Determines branch prefix and commit
      subject prefix.

  status:
    type: enum
    required: true
    values:
      - proposed           # listed in the map, not approved for execution
      - blocked            # depends_on is incomplete OR a finding blocks it
      - ready              # all predecessors complete, no approval needed beyond standing rules
      - approved           # gated slice that the user has explicitly approved
      - in_progress        # actively being worked
      - local_uncommitted  # work exists on disk in a worktree, not yet staged or committed
      - committed          # local commits exist, not pushed
      - pushed             # remote branch exists, no PR
      - in_review          # PR open
      - merged             # landed on main
      - closed             # abandoned / superseded
    description: >
      Authoritative status. Maestro updates this as the slice progresses.
      The user reviews status transitions before they take effect on the
      map.

  approval_required:
    type: boolean
    required: true
    description: >
      `true` when the slice touches any gated surface (package.json,
      pnpm-lock.yaml, SQL migrations, OpenAPI, CI files), or when the user
      has marked it gated for any other reason. Maestro will not dispatch
      until the user has approved this specific slice in the current
      session.

  depends_on:
    type: list[string]
    required: true
    description: >
      Slice IDs (within this spec or cross-referenced) that must reach a
      terminal state (merged / committed depending on context) before this
      slice can move from blocked to ready. May be empty.

  blocks:
    type: list[string]
    required: false
    description: >
      Slice IDs that cannot proceed until this slice completes. Inverse of
      depends_on. Maintained for legibility — Maestro should also be able
      to derive it from `depends_on` edges across the map.

  agent:
    type: string
    required: true
    description: >
      Profile key from docs/agent-os/agent-profiles.yaml. Examples:
      "sonnet-test", "sonnet-sql", "sonnet-api", "reviewer". For meta or
      planning slices, "opus-maestro".

  allowed_files:
    type: list[string]
    required: true
    description: >
      Explicit list of files (or glob patterns) the worker may create or
      modify. Anything outside this list is forbidden for this slice, even
      if it is not in the global forbidden list. Use exact paths whenever
      possible; reserve globs for genuinely bulk slices.

  forbidden_files:
    type: list[string]
    required: false
    description: >
      Optional additional forbidden patterns beyond the global standing
      rules. Use when a slice should be even more restricted than the
      defaults (e.g. a fix slice that should NOT touch its own test file).

  validation:
    type: list[validation_entry]
    required: true
    description: >
      Test commands and other checks that constitute empirical verification
      for this slice. Maestro runs each, captures full output, and reports.

  validation_entry:
    fields:
      command:
        type: string
        description: Exact command to run.
      expected:
        type: string
        description: >
          Human-readable description of the expected outcome. For tests:
          "GREEN N/N" or "RED — proves leak on store_product_overrides".
          For static checks: "no output" or "empty list".
      docker_required:
        type: boolean
        default: false
        description: >
          When true, Maestro routes the command through WSL Docker. When
          Docker is unavailable, the slice cannot validate — report and
          stop rather than weakening the test.

  stop:
    type: list[string]
    required: true
    description: >
      Conditions under which the worker stops and reports without
      proceeding. In addition to the standing rules' universal stop
      conditions, this lists slice-specific stops (e.g. "stop if
      tenant_products RLS policy is not present after migration apply").

  report_fields:
    type: list[string]
    required: true
    description: >
      Items the worker MUST include in its end-of-slice report. Standard
      set: ["changed_files", "validation_results", "forbidden_path_check",
      "confirmation_no_unauthorized_git_ops"]. Slice may extend this.

  parallel_safety:
    type: enum
    required: true
    values: [safe, unsafe, unknown]
    description: >
      "safe" — no file overlap with other ready slices AND no shared
      database/test fixture state.
      "unsafe" — file overlap OR shared fixture writes that would conflict.
      "unknown" — Maestro asks before scheduling alongside other slices.

  branch_template:
    type: string
    required: false
    default: "<type>/<spec_id_short>-<short_name>"
    description: >
      Branch name template. Variables: <type>, <spec_id_short> (e.g.
      "003-catalog"), <short_name> (lowercase-kebab from id). Override
      when the convention does not fit.

  worktree_template:
    type: string
    required: false
    default: "C:\\Users\\user\\Documents\\GitHub\\dp2-<short_name>"
    description: >
      Worktree path template.

  predecessors_must_be_merged:
    type: boolean
    required: false
    default: false
    description: >
      When true, depends_on slices must be `merged` (on `main`), not just
      `committed` or `pushed`. Use for slices that need their predecessors
      to be in the canonical branch (e.g. follow-up specs that should not
      rebase against unmerged work).

  # --------------------------------------------------------------------------
  # Audit fields — populated by the post-merge closeout workflow
  # (see docs/agent-os/maestro-playbook.md "Workflow — post-merge closeout").
  # All optional. Required fields above are unchanged.
  # --------------------------------------------------------------------------

  merged_in_pr:
    type: integer
    required: false
    description: >
      GitHub PR number that landed this slice. Populated when `status`
      transitions to `merged`. Read-only audit; never used for dispatch.

  merged_at_commit:
    type: string
    required: false
    description: >
      Short SHA of the merge commit on `main` (e.g. `5801369`). Populated
      together with `merged_in_pr`. Lets readers cross-reference the map
      to `git log` without resolving PR numbers.

  merged_at_date:
    type: string
    required: false
    description: >
      Calendar date of the merge in ISO YYYY-MM-DD form. Convenience
      audit field; the authoritative timestamp is the merge commit
      itself.

  previously_blocked:
    type: list[string]
    required: false
    description: >
      Slice IDs that were in this slice's `blocks:` list before the
      closeout cleared them. Preserves the historical block record once
      `blocks:` is emptied at merge time. Audit-only — does not affect
      scheduling.

# ----------------------------------------------------------------------------
# Map-level fields — top-level of execution-map.yaml
# ----------------------------------------------------------------------------

map_schema:
  spec:
    type: string
    required: true
    description: Spec ID, e.g. "003-catalog-foundation".

  version:
    type: integer
    required: true
    description: Schema version of the map itself.

  base:
    type: string
    required: false
    default: origin/main
    description: Branch all slices in this map are cut from.

  findings:
    type: list[finding_entry]
    required: false
    description: >
      Discoveries made during slice execution that affect other slices.
      Each finding can `blocks:` slices and may have a `proof:` (test path
      or commit SHA).

  finding_entry:
    fields:
      id:
        type: string
        description: ALL_CAPS_SNAKE_CASE identifier.
      summary:
        type: string
      affected:
        type: list[string]
        description: Component / table / module names.
      severity:
        type: enum
        values: [critical, high, medium, low]
      proof:
        type: string
        description: Commit SHA, test path, or other verifiable artifact.
      blocks:
        type: list[string]
        description: Slice IDs that cannot proceed until this finding is resolved.
      resolved_by:
        type: string
        description: Slice ID that closes the finding once merged.

      # ----------------------------------------------------------------------
      # Finding-level audit fields — populated by the post-merge closeout
      # workflow when the resolving slice is merged. All optional. Required
      # fields above are unchanged.
      # ----------------------------------------------------------------------
      resolved_by_pr:
        type: integer
        required: false
        description: >
          GitHub PR number whose merge resolved the finding. Same value as
          the resolving slice's `merged_in_pr`. Populated together with
          `resolved_by_commit` and `resolved_at`.
      resolved_by_commit:
        type: string
        required: false
        description: >
          Short SHA of the merge commit on `main` that resolved this
          finding. Same value as the resolving slice's `merged_at_commit`.
      resolved_at:
        type: string
        required: false
        description: >
          Calendar date the finding was resolved (ISO YYYY-MM-DD).
      previously_blocked:
        type: list[string]
        required: false
        description: >
          Slice IDs that were in this finding's `blocks:` list before the
          closeout cleared them. Preserves the historical block record
          once `blocks:` is emptied at resolution time.

  slices:
    type: list[slice]
    required: true
    description: >
      The slice list. Order is informational — actual execution order is
      derived from `depends_on` + `status`.

  groups:
    type: list[group_entry]
    required: false
    description: >
      Optional named parallel groups. A group lists slice IDs that may run
      together when their `depends_on` is satisfied.

  group_entry:
    fields:
      id:
        type: string
      members:
        type: list[string]
      parallel_safety:
        type: enum
        values: [safe, unsafe, unknown]
      proposed:
        type: boolean
        default: true
        description: >
          When `true`, this is a future proposal awaiting approval. When
          `false`, the user has explicitly endorsed running this group.

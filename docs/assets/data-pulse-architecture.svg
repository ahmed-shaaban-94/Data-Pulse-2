<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="620" viewBox="0 0 1160 620" role="img" aria-labelledby="title desc">
  <title id="title">Data-Pulse-2 architecture</title>
  <desc id="desc">Isometric architecture view showing clients, API, worker, shared packages, PostgreSQL, Redis, and OpenAPI contracts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.45" stop-color="#eef6f4"/>
      <stop offset="1" stop-color="#f7f3ea"/>
    </linearGradient>
    <linearGradient id="api" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="worker" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#65a30d"/>
    </linearGradient>
    <linearGradient id="package" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#475569"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="store" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <style>
      .label { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 15px Arial, sans-serif; fill: #475569; }
      .white { font: 700 18px Arial, sans-serif; fill: #ffffff; }
      .whiteSmall { font: 500 13px Arial, sans-serif; fill: #e2e8f0; }
      .darkSmall { font: 600 13px Arial, sans-serif; fill: #334155; }
      .line { stroke: #64748b; stroke-width: 3; stroke-linecap: round; stroke-dasharray: 8 10; fill: none; }
      .solidLine { stroke: #334155; stroke-width: 4; stroke-linecap: round; fill: none; }
    </style>
  </defs>

  <rect width="1160" height="620" rx="0" fill="url(#bg)"/>
  <text x="64" y="72" class="label">Data-Pulse-2 Backend Foundation</text>
  <text x="64" y="102" class="small">NestJS API, BullMQ workers, contract-first packages, PostgreSQL truth, Redis coordination.</text>

  <g filter="url(#shadow)">
    <polygon points="118,220 238,160 358,220 238,280" fill="#dbeafe"/>
    <polygon points="118,220 238,280 238,342 118,282" fill="#bfdbfe"/>
    <polygon points="238,280 358,220 358,282 238,342" fill="#93c5fd"/>
    <text x="193" y="226" class="darkSmall">Clients</text>
    <text x="154" y="254" class="darkSmall">Dashboard / API</text>
  </g>

  <g filter="url(#shadow)">
    <polygon points="430,200 580,125 730,200 580,275" fill="url(#api)"/>
    <polygon points="430,200 580,275 580,380 430,305" fill="#1d4ed8"/>
    <polygon points="580,275 730,200 730,305 580,380" fill="#0e7490"/>
    <text x="541" y="199" class="white">apps/api</text>
    <text x="511" y="228" class="whiteSmall">NestJS HTTP service</text>
    <text x="461" y="302" class="whiteSmall">Auth</text>
    <text x="461" y="326" class="whiteSmall">Context</text>
    <text x="604" y="302" class="whiteSmall">Validation</text>
    <text x="604" y="326" class="whiteSmall">Logging</text>
  </g>

  <g filter="url(#shadow)">
    <polygon points="812,246 930,187 1048,246 930,305" fill="url(#worker)"/>
    <polygon points="812,246 930,305 930,385 812,326" fill="#0f766e"/>
    <polygon points="930,305 1048,246 1048,326 930,385" fill="#4d7c0f"/>
    <text x="877" y="249" class="white">apps/worker</text>
    <text x="869" y="277" class="whiteSmall">BullMQ jobs</text>
  </g>

  <path d="M350 232 C390 220, 398 213, 428 204" class="solidLine"/>
  <path d="M730 247 C760 254, 780 260, 812 267" class="solidLine"/>

  <g filter="url(#shadow)">
    <rect x="148" y="432" width="864" height="94" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="180" y="466" class="darkSmall">Workspace packages</text>
    <g>
      <rect x="180" y="486" width="150" height="26" rx="5" fill="url(#package)"/>
      <text x="204" y="504" class="whiteSmall">contracts</text>
    </g>
    <g>
      <rect x="352" y="486" width="150" height="26" rx="5" fill="url(#package)"/>
      <text x="398" y="504" class="whiteSmall">auth</text>
    </g>
    <g>
      <rect x="524" y="486" width="150" height="26" rx="5" fill="url(#package)"/>
      <text x="574" y="504" class="whiteSmall">db</text>
    </g>
    <g>
      <rect x="696" y="486" width="150" height="26" rx="5" fill="url(#package)"/>
      <text x="741" y="504" class="whiteSmall">shared</text>
    </g>
  </g>

  <path d="M540 380 C506 410, 420 432, 255 486" class="line"/>
  <path d="M570 380 C558 408, 494 448, 427 486" class="line"/>
  <path d="M600 380 C600 410, 596 454, 599 486" class="line"/>
  <path d="M635 380 C668 418, 716 450, 771 486" class="line"/>
  <path d="M900 385 C858 421, 810 455, 771 486" class="line"/>

  <g filter="url(#shadow)">
    <ellipse cx="486" cy="567" rx="92" ry="24" fill="#fef3c7"/>
    <rect x="394" y="522" width="184" height="46" fill="url(#store)"/>
    <ellipse cx="486" cy="522" rx="92" ry="24" fill="#fbbf24"/>
    <text x="430" y="546" class="whiteSmall">PostgreSQL 16</text>
    <text x="426" y="566" class="whiteSmall">system of record</text>
  </g>

  <g filter="url(#shadow)">
    <ellipse cx="718" cy="567" rx="76" ry="21" fill="#fecaca"/>
    <rect x="642" y="528" width="152" height="39" fill="#dc2626"/>
    <ellipse cx="718" cy="528" rx="76" ry="21" fill="#ef4444"/>
    <text x="692" y="549" class="whiteSmall">Redis 7</text>
    <text x="673" y="568" class="whiteSmall">queues</text>
  </g>

  <path d="M555 381 C536 428, 511 480, 492 522" class="solidLine"/>
  <path d="M690 336 C698 389, 710 475, 716 528" class="solidLine"/>
  <path d="M922 386 C868 429, 785 489, 732 528" class="solidLine"/>
</svg>

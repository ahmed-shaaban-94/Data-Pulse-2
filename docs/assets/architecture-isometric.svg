<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" aria-labelledby="title desc" role="img" viewBox="0 0 1280 720"><title id="title">Data Pulse isometric architecture</title><desc id="desc">Isometric architecture view showing clients, API, worker, packages, PostgreSQL, Redis, OpenAPI contracts, and observability.</desc><defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset=".55" stop-color="#eef7f7"/><stop offset="1" stop-color="#f8f5ed"/></linearGradient><linearGradient id="blue" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#2563eb"/><stop offset="1" stop-color="#0891b2"/></linearGradient><linearGradient id="teal" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#0f766e"/><stop offset="1" stop-color="#14b8a6"/></linearGradient><linearGradient id="amber" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#f59e0b"/><stop offset="1" stop-color="#d97706"/></linearGradient><linearGradient id="slate" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#475569"/><stop offset="1" stop-color="#1e293b"/></linearGradient><filter id="shadow" width="140%" height="160%" x="-20%" y="-20%"><feDropShadow dx="0" dy="18" flood-color="#0f172a" flood-opacity=".18" stdDeviation="16"/></filter><style>.title{font:800 30px Arial,sans-serif;fill:#0f172a}.subtitle{font:500 16px Arial,sans-serif;fill:#475569}.white{font:800 18px Arial,sans-serif;fill:#fff}.whiteSmall{font:600 13px Arial,sans-serif;fill:#e2e8f0}.dark{font:800 15px Arial,sans-serif;fill:#0f172a}.small{font:600 12px Arial,sans-serif;fill:#475569}.dash,.line{stroke-linecap:round;fill:none}.line{stroke:#334155;stroke-width:4}.dash{stroke:#64748b;stroke-width:3;stroke-dasharray:8 10}</style></defs><rect width="1280" height="720" fill="url(#bg)"/><text x="72" y="72" class="title">Data Pulse Backend Foundation</text><text x="72" y="100" class="subtitle">Tenant-safe API, worker runtime, contracts, durable PostgreSQL state, and Redis coordination.</text><path d="M244 248 C348 190 426 192 520 238" class="line"/><path d="M742 256 C805 246 866 260 932 304" class="line"/><path d="M602 420 C604 478 566 520 498 548" class="dash"/><path d="M704 420 C764 500 850 534 950 514" class="dash"/><g filter="url(#shadow)"><polygon fill="#dbeafe" points="96 248 224 184 352 248 224 312"/><polygon fill="#bfdbfe" points="96 248 224 312 224 382 96 318"/><polygon fill="#93c5fd" points="224 312 352 248 352 318 224 382"/><text x="180" y="252" class="dark">Clients</text><text x="152" y="282" class="small">Dashboard / API</text></g><g filter="url(#shadow)"><polygon fill="url(#blue)" points="472 232 640 148 808 232 640 316"/><polygon fill="#1d4ed8" points="472 232 640 316 640 442 472 358"/><polygon fill="#0e7490" points="640 316 808 232 808 358 640 442"/><text x="600" y="232" class="white">apps/api</text><text x="552" y="262" class="whiteSmall">Auth, context, validation</text><text x="522" y="342" class="whiteSmall">OpenAPI loading</text><text x="664" y="342" class="whiteSmall">Tenant-safe DB access</text></g><g filter="url(#shadow)"><polygon fill="url(#teal)" points="932 304 1050 245 1168 304 1050 363"/><polygon fill="#0f766e" points="932 304 1050 363 1050 450 932 391"/><polygon fill="#115e59" points="1050 363 1168 304 1168 391 1050 450"/><text x="997" y="307" class="white">apps/worker</text><text x="1001" y="337" class="whiteSmall">BullMQ jobs</text></g><g filter="url(#shadow)"><polygon fill="#fff" points="338 548 498 468 658 548 498 628"/><polygon fill="#e2e8f0" points="338 548 498 628 498 662 338 582"/><polygon fill="#cbd5e1" points="498 628 658 548 658 582 498 662"/><text x="436" y="548" class="dark">Packages</text><text x="388" y="576" class="small">contracts auth db shared</text></g><g filter="url(#shadow)"><polygon fill="url(#amber)" points="806 540 948 469 1090 540 948 611"/><polygon fill="#d97706" points="806 540 948 611 948 652 806 581"/><polygon fill="#b45309" points="948 611 1090 540 1090 581 948 652"/><text x="9
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" fill="none" aria-labelledby="t d" font-family="system-ui, ui-sans-serif, sans-serif" font-size="12" role="img" viewBox="0 0 1200 720"><title id="t">Retail Tower OS — Animated System Map</title><desc id="d">Platform topology showing clients, API gateway, packages, PostgreSQL, Redis, and worker runtime — with animated data flow tokens travelling along authenticated paths.</desc><defs><linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#0B1220"/><stop offset="1" stop-color="#0D1117"/></linearGradient><linearGradient id="zone-gold" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#1A1F2A"/><stop offset="1" stop-color="#101620"/></linearGradient><linearGradient id="gold" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#F0CB6B"/><stop offset=".55" stop-color="#C8A24A"/><stop offset="1" stop-color="#7A5A14"/></linearGradient><linearGradient id="cyan" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#A8F4FB"/><stop offset="1" stop-color="#22D6F6"/></linearGradient><linearGradient id="hi" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#fff" stop-opacity=".32"/><stop offset=".4" stop-color="#fff" stop-opacity="0"/></linearGradient><filter id="drop" width="160%" height="160%" x="-30%" y="-30%"><feDropShadow dx="0" dy="4" flood-color="#000" flood-opacity=".6" stdDeviation="4"/></filter><filter id="glow" width="300%" height="300%" x="-100%" y="-100%"><feGaussianBlur stdDeviation="4"/></filter><marker id="arrow-cyan" markerHeight="10" markerWidth="10" orient="auto" refX="8" refY="3.5"><path fill="#22D6F6" d="M0 0 L8 3.5 L0 7 z"/></marker><marker id="arrow-gold" markerHeight="10" markerWidth="10" orient="auto" refX="8" refY="3.5"><path fill="#C8A24A" d="M0 0 L8 3.5 L0 7 z"/></marker><marker id="arrow-dim" markerHeight="10" markerWidth="10" orient="auto" refX="8" refY="3.5"><path fill="#8B949E" d="M0 0 L8 3.5 L0 7 z"/></marker><style>.zone-label{font-siz
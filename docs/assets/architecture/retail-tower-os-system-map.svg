<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-labelledby="t d" fill="none" font-family="system-ui, ui-sans-serif, sans-serif" font-size="12">
  <title id="t">Retail Tower OS — Animated System Map</title>
  <desc id="d">Platform topology showing clients, API gateway, packages, PostgreSQL, Redis, and worker runtime — with animated data flow tokens travelling along authenticated paths.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="zone-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1A1F2A"/>
      <stop offset="1" stop-color="#101620"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F0CB6B"/>
      <stop offset="0.55" stop-color="#C8A24A"/>
      <stop offset="1" stop-color="#7A5A14"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A8F4FB"/>
      <stop offset="1" stop-color="#22D6F6"/>
    </linearGradient>
    <linearGradient id="hi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.32"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="drop" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto">
      <path d="M0 0 L8 3.5 L0 7 z" fill="#22D6F6"/>
    </marker>
    <marker id="arrow-gold" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto">
      <path d="M0 0 L8 3.5 L0 7 z" fill="#C8A24A"/>
    </marker>
    <marker id="arrow-dim" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto">
      <path d="M0 0 L8 3.5 L0 7 z" fill="#8B949E"/>
    </marker>
    <style>
      .zone-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; fill: #C8A24A; }
      .heading { font-size: 13px; font-weight: 700; fill: #E6EDF3; }
      .sub { font-size: 10.5px; fill: #8B949E; }
      .sub2 { font-size: 9.5px; fill: #8B949E; }
      .flow-label { font-size: 9.5px; fill: #22D6F6; font-weight: 600; }
      .flow-dim { font-size: 9.5px; fill: #8B949E; }
    </style>
    <!-- Hidden motion paths -->
    <path id="m1" d="M150 130 V210" />
    <path id="m2" d="M380 130 V210" />
    <path id="m3" d="M960 145 C870 170 730 180 600 230" />
    <path id="m4" d="M170 340 V450" />
    <path id="m5" d="M380 370 L520 490" />
    <path id="m6" d="M740 490 L890 490" />
    <path id="m7" d="M1010 450 V340" />
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#1F2A37" stroke-width="0.5" opacity="0.4">
    <path d="M0 200 H1200 M0 400 H1200 M0 600 H1200"/>
    <path d="M300 0 V720 M600 0 V720 M900 0 V720"/>
  </g>

  <!-- Title -->
  <text x="40" y="44" font-size="22" font-weight="800" fill="#F0CB6B">Retail Tower OS — System Map</text>
  <text x="40" y="68" font-size="12.5" fill="#8B949E">The command tower platform: clients · gateway · packages · system of record · queue · async runtime.</text>

  <!-- CLIENTS zone -->
  <g filter="url(#drop)">
    <rect x="40" y="100" width="540" height="110" rx="8" fill="url(#zone-gold)" stroke="#C8A24A" stroke-width="1.5"/>
  </g>
  <text x="60" y="124" class="zone-label">CLIENTS</text>
  <g filter="url(#drop)">
    <rect x="60" y="138" width="180" height="58" rx="6" fill="#1C2128" stroke="#C8A24A" stroke-width="1"/>
    <rect x="60" y="138" width="180" height="58" rx="6" fill="url(#hi)"/>
  </g>
  <text x="150" y="162" text-anchor="middle" class="heading">Dashboard clients</text>
  <text x="150" y="180" text-anchor="middle" class="sub" font-style="italic">future feature</text>

  <g filter="url(#drop)">
    <rect x="290" y="138" width="180" height="58" rx="6" fill="#1C2128" stroke="#C8A24A" stroke-width="1"/>
    <rect x="290" y="138" width="180" height="58" rx="6" fill="url(#hi)"/>
  </g>
  <text x="380" y="162" text-anchor="middle" class="heading">API consumers</text>
  <text x="380" y="180" text-anchor="middle" class="sub">direct API callers</text>

  <!-- POS CLIENTS (external) -->
  <g filter="url(#drop)">
    <rect x="640" y="100" width="320" height="110" rx="8" fill="url(#zone-gold)" stroke="#C8A24A" stroke-width="1.5" stroke-dasharray="6 4"/>
  </g>
  <text x="660" y="124" class="zone-label">POS CLIENTS</text>
  <g filter="url(#drop)">
    <rect x="660" y="138" width="280" height="58" rx="6" fill="#1C2128" stroke="#8B949E" stroke-width="1" stroke-dasharray="4 3"/>
    <rect x="660" y="138" width="280" height="58" rx="6" fill="url(#hi)"/>
  </g>
  <text x="800" y="162" text-anchor="middle" class="heading">POS applications</text>
  <text x="800" y="180" text-anchor="middle" class="sub" font-style="italic">external repository · authenticated contracts</text>
  <circle cx="920" cy="153" r="3.5" fill="#22D6F6">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>

  <!-- Arrows clients → api -->
  <path d="M150 196 V230" stroke="#22D6F6" stroke-width="1.5" marker-end="url(#arrow-cyan)" fill="none"/>
  <path d="M380 196 V230" stroke="#22D6F6" stroke-width="1.5" marker-end="url(#arrow-cyan)" fill="none"/>
  <path d="M800 196 C800 215 650 220 540 245" stroke="#8B949E" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#arrow-dim)" fill="none"/>
  <text x="680" y="218" class="flow-dim">authenticated contracts</text>

  <!-- COMMAND GATEWAY zone -->
  <g filter="url(#drop)">
    <rect x="40" y="230" width="1120" height="150" rx="8" fill="url(#zone-gold)" stroke="#C8A24A" stroke-width="1.7"/>
  </g>
  <text x="60" y="254" class="zone-label">COMMAND GATEWAY — apps/api</text>

  <g filter="url(#drop)">
    <rect x="60" y="270" width="220" height="98" rx="6" fill="#1C2128" stroke="#C8A24A" stroke-width="1"/>
    <rect x="60" y="270" width="220" height="98" rx="6" fill="url(#hi)"/>
  </g>
  <text x="170" y="294" text-anchor="middle" class="heading">apps/api</text>
  <text x="170" y="312" text-anchor="middle" class="sub">NestJS HTTP API</text>
  <text x="170" y="328" text-anchor="middle" class="sub2">auth · context · validation</text>
  <text x="170" y="344" text-anchor="middle" class="sub2">logging · exception envelopes</text>
  <text x="170" y="360" text-anchor="middle" class="sub2">OpenAPI loading · idempotency</text>

  <!-- Packages -->
  <g filter="url(#drop)">
    <rect x="310" y="270" width="200" height="46" rx="5" fill="#1C2128" stroke="#C8A24A" stroke-width="1"/>
    <rect x="310" y="270" width="200" height="46" rx="5" fill="url(#hi)"/>
  </g>
  <text x="410" y="290" text-anchor="middle" class="heading">packages/contracts</text>
  <text x="410" y="305" text-anchor="middle" class="sub">OpenAPI 3.1 source</text>

  <g filter="url(#drop)">
    <rect x="540" y="270" width="200" height="46" rx="5" fill="#1C2128" stroke="#C8A24A" stroke-width="1"/>
    <rect x="540" y="270" width="200" height="46" rx="5" fill="url(#hi)"/>
  </g>
  <text x="640" y="290" text-anchor="middle" class="heading">packages/auth</text>
  <text x="640" y="305" text-anchor="middle" class="sub">argon2id · opaque tokens</text>

  <g filter="url(#drop)">
    <rect x="310" y="324" width="200" height="46" rx="5" fill="#1C2128" stroke="#C8A24A" stroke-width="1"/>
    <rect x="310" y="324" width="200" height="46" rx="5" fill="url(#hi)"/>
  </g>
  <text x="410" y="344" text-anchor="middle" class="heading">packages/db</text>
  <text x="410" y="359" text-anchor="middle" class="sub">Drizzle schema · explicit migrations</text>

  <g filter="url(#drop)">
    <rect x="540" y="324" width="200" height="46" rx="5" fill="#1C2128" stroke="#C8A24A" stroke-width="1"/>
    <rect x="540" y="324" width="200" height="46" rx="5" fill="url(#hi)"/>
  </g>
  <text x="640" y="344" text-anchor="middle" class="heading">packages/shared</text>
  <text x="640" y="359" text-anchor="middle" class="sub">errors · logs · ids · queues</text>

  <!-- Observability column inside gateway -->
  <g filter="url(#drop)">
    <rect x="780" y="270" width="170" height="46" rx="5" fill="#1C2128" stroke="#22D6F6" stroke-width="1"/>
    <rect x="780" y="270" width="170" height="46" rx="5" fill="url(#hi)"/>
  </g>
  <text x="865" y="290" text-anchor="middle" class="heading">pino + OTel</text>
  <text x="865" y="305" text-anchor="middle" class="sub">request-id · tracing</text>

  <g filter="url(#drop)">
    <rect x="780" y="324" width="170" height="46" rx="5" fill="#1C2128" stroke="#22D6F6" stroke-width="1"/>
    <rect x="780" y="324" width="170" height="46" rx="5" fill="url(#hi)"/>
  </g>
  <text x="865" y="344" text-anchor="middle" class="heading">Prometheus :9464</text>
  <text x="865" y="359" text-anchor="middle" class="sub">live signal catalogue</text>

  <g filter="url(#drop)">
    <rect x="980" y="270" width="170" height="100" rx="5" fill="#1C2128" stroke="#C8A24A" stroke-width="1"/>
    <rect x="980" y="270" width="170" height="100" rx="5" fill="url(#hi)"/>
  </g>
  <text x="1065" y="294" text-anchor="middle" class="heading">outbox + idempotency</text>
  <text x="1065" y="312" text-anchor="middle" class="sub">guaranteed delivery</text>
  <text x="1065" y="328" text-anchor="middle" class="sub">replay-safe writes</text>
  <text x="1065" y="354" text-anchor="middle" class="sub2">drainer · DLQ · retries</text>

  <!-- api → packages -->
  <g stroke="#C8A24A" stroke-width="1" marker-end="url(#arrow-gold)" fill="none" opacity="0.9">
    <path d="M280 293 H310"/>
    <path d="M280 305 L310 345"/>
    <path d="M510 293 H540"/>
    <path d="M510 345 H540"/>
    <path d="M740 293 H780"/>
    <path d="M740 345 H780"/>
    <path d="M950 293 H980"/>
  </g>

  <!-- SYSTEM OF RECORD zone -->
  <g filter="url(#drop)">
    <rect x="40" y="450" width="320" height="130" rx="8" fill="url(#zone-gold)" stroke="#C8A24A" stroke-width="1.5"/>
  </g>
  <text x="60" y="474" class="zone-label">SYSTEM OF RECORD</text>
  <g filter="url(#drop)">
    <ellipse cx="200" cy="540" rx="100" ry="14" fill="#1C2128" stroke="#C8A24A" stroke-width="1"/>
    <rect x="100" y="500" width="200" height="40" fill="#1C2128" stroke="none"/>
    <path d="M100 500 V540" stroke="#C8A24A" stroke-width="1"/>
    <path d="M300 500 V540" stroke="#C8A24A" stroke-width="1"/>
    <ellipse cx="200" cy="500" rx="100" ry="14" fill="url(#gold)"/>
    <ellipse cx="200" cy="500" rx="100" ry="14" fill="url(#hi)"/>
  </g>
  <text x="200" y="503" text-anchor="middle" font-size="12" font-weight="700" fill="#0B0F18">PostgreSQL 16</text>
  <text x="200" y="528" text-anchor="middle" class="sub">system of record · RLS</text>
  <text x="200" y="544" text-anchor="middle" class="sub2" font-style="italic">durable domain truth</text>
  <text x="200" y="562" text-anchor="middle" class="sub2">tenantId NOT NULL · RLS-enforced</text>

  <!-- QUEUE COORDINATION -->
  <g filter="url(#drop)">
    <rect x="390" y="450" width="320" height="130" rx="8" fill="url(#zone-gold)" stroke="#C8A24A" stroke-width="1.5"/>
  </g>
  <text x="410" y="474" class="zone-label">QUEUE COORDINATION</text>
  <g filter="url(#drop)">
    <ellipse cx="550" cy="540" rx="90" ry="12" fill="#1C2128" stroke="#C8A24A" stroke-width="1"/>
    <rect x="460" y="504" width="180" height="36" fill="#1C2128" stroke="none"/>
    <path d="M460 504 V540" stroke="#C8A24A" stroke-width="1"/>
    <path d="M640 504 V540" stroke="#C8A24A" stroke-width="1"/>
    <ellipse cx="550" cy="504" rx="90" ry="12" fill="url(#cyan)"/>
    <ellipse cx="550" cy="504" rx="90" ry="12" fill="url(#hi)"/>
  </g>
  <text x="550" y="507" text-anchor="middle" font-size="12" font-weight="700" fill="#0B0F18">Redis 7 · BullMQ</text>
  <text x="550" y="528" text-anchor="middle" class="sub">runtime coordination only</text>
  <text x="550" y="544" text-anchor="middle" class="sub2" font-style="italic">not durable domain truth</text>
  <text x="550" y="562" text-anchor="middle" class="sub2">job payload carries tenantId</text>

  <!-- ASYNC RUNTIME -->
  <g filter="url(#drop)">
    <rect x="740" y="450" width="420" height="130" rx="8" fill="url(#zone-gold)" stroke="#C8A24A" stroke-width="1.5"/>
  </g>
  <text x="760" y="474" class="zone-label">ASYNC RUNTIME</text>
  <g filter="url(#drop)">
    <rect x="760" y="490" width="380" height="76" rx="6" fill="#1C2128" stroke="#C8A24A" stroke-width="1"/>
    <rect x="760" y="490" width="380" height="76" rx="6" fill="url(#hi)"/>
  </g>
  <text x="950" y="514" text-anchor="middle" class="heading">apps/worker</text>
  <text x="950" y="532" text-anchor="middle" class="sub">NestJS standalone · BullMQ consumer</text>
  <text x="950" y="548" text-anchor="middle" class="sub2">tenantId in every job payload</text>
  <text x="950" y="562" text-anchor="middle" class="sub2">Prometheus 127.0.0.1:9091</text>

  <!-- Connection lines -->
  <path d="M170 368 V450" stroke="#22D6F6" stroke-width="1.6" fill="none" marker-end="url(#arrow-cyan)"/>
  <text x="178" y="416" class="flow-label">tenant-scoped reads/writes</text>

  <path d="M280 370 L460 490" stroke="#22D6F6" stroke-width="1.6" fill="none" stroke-dasharray="6 4" marker-end="url(#arrow-cyan)"/>
  <text x="316" y="448" class="flow-label">enqueue jobs</text>

  <path d="M640 504 H760" stroke="#22D6F6" stroke-width="1.6" fill="none" marker-end="url(#arrow-cyan)"/>
  <text x="685" y="498" text-anchor="middle" class="flow-label">consume</text>

  <path d="M950 490 L740 380" stroke="#C8A24A" stroke-width="1" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow-gold)"/>
  <text x="820" y="430" class="flow-dim" fill="#C8A24A">uses shared</text>

  <!-- Animated data tokens -->
  <g>
    <circle r="4.5" fill="#22D6F6" filter="url(#glow)">
      <animateMotion dur="3s" repeatCount="indefinite"><mpath href="#m1"/></animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle r="4.5" fill="#22D6F6" filter="url(#glow)">
      <animateMotion dur="3s" begin="1.5s" repeatCount="indefinite"><mpath href="#m2"/></animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="4.5" fill="#8B949E" filter="url(#glow)">
      <animateMotion dur="4s" repeatCount="indefinite"><mpath href="#m3"/></animateMotion>
      <animate attributeName="opacity" values="0;0.9;0.9;0" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle r="5" fill="#22D6F6" filter="url(#glow)">
      <animateMotion dur="3.4s" repeatCount="indefinite"><mpath href="#m4"/></animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" dur="3.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="5" fill="#22D6F6" filter="url(#glow)">
      <animateMotion dur="3.4s" begin="1.7s" repeatCount="indefinite"><mpath href="#m5"/></animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" dur="3.4s" begin="1.7s" repeatCount="indefinite"/>
    </circle>
    <circle r="5" fill="#22D6F6" filter="url(#glow)">
      <animateMotion dur="2.8s" repeatCount="indefinite"><mpath href="#m6"/></animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle r="4" fill="#C8A24A" filter="url(#glow)">
      <animateMotion dur="3.6s" begin="2s" repeatCount="indefinite"><mpath href="#m7"/></animateMotion>
      <animate attributeName="opacity" values="0;0.9;0.9;0" dur="3.6s" begin="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Pulse rings on data stores -->
  <circle cx="200" cy="500" r="50" fill="none" stroke="#C8A24A" stroke-width="0.8" opacity="0">
    <animate attributeName="r" values="20;110;20" dur="4.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.45;0;0.45" dur="4.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="550" cy="504" r="40" fill="none" stroke="#22D6F6" stroke-width="0.8" opacity="0">
    <animate attributeName="r" values="20;100;20" dur="4.4s" begin="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.45;0;0.45" dur="4.4s" begin="2.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Legend -->
  <g transform="translate(40 620)">
    <rect width="1120" height="80" rx="8" fill="#0F1620" stroke="#30363D" stroke-width="1"/>
    <text x="20" y="22" font-size="10" font-weight="700" letter-spacing="1.2" fill="#8B949E">LEGEND</text>
    <line x1="20" y1="42" x2="60" y2="42" stroke="#22D6F6" stroke-width="1.6" marker-end="url(#arrow-cyan)"/>
    <text x="68" y="46" font-size="10.5" fill="#E6EDF3">Data / request flow</text>
    <line x1="220" y1="42" x2="260" y2="42" stroke="#C8A24A" stroke-width="1.4" marker-end="url(#arrow-gold)"/>
    <text x="268" y="46" font-size="10.5" fill="#E6EDF3">Package dependency</text>
    <line x1="420" y1="42" x2="460" y2="42" stroke="#8B949E" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#arrow-dim)"/>
    <text x="468" y="46" font-size="10.5" fill="#E6EDF3">External / authenticated contract</text>
    <circle cx="700" cy="42" r="4" fill="#22D6F6" filter="url(#glow)"/>
    <text x="712" y="46" font-size="10.5" fill="#E6EDF3">Live data token</text>
    <text x="20" y="66" font-size="9.5" fill="#8B949E">POS applications live in an external repository and integrate exclusively through authenticated OpenAPI contracts. Dashboard clients are a future feature.</text>
  </g>
</svg>

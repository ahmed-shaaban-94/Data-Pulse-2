xt><g filter="url(#drop)"><rect width="200" height="46" x="310" y="270" fill="#1C2128" stroke="#C8A24A" stroke-width="1" rx="5"/><rect width="200" height="46" x="310" y="270" fill="url(#hi)" rx="5"/></g><text x="410" y="290" class="heading" text-anchor="middle">packages/contracts</text><text x="410" y="305" class="sub" text-anchor="middle">OpenAPI 3.1 source</text><g filter="url(#drop)"><rect width="200" height="46" x="540" y="270" fill="#1C2128" stroke="#C8A24A" stroke-width="1" rx="5"/><rect width="200" height="46" x="540" y="270" fill="url(#hi)" rx="5"/></g><text x="640" y="290" class="heading" text-anchor="middle">packages/auth</text><text x="640" y="305" class="sub" text-anchor="middle">argon2id · opaque tokens</text><g filter="url(#drop)"><rect width="200" height="46" x="310" y="324" fill="#1C2128" stroke="#C8A24A" stroke-width="1" rx="5"/><rect width="200" height="46" x="310" y="324" fill="url(#hi)" rx="5"/></g><text x="410" y="344" class="heading" text-anchor="middle">packages/db</text><text x="410" y="359" class="sub" text-anchor="middle">Drizzle schema · explicit migrations</text><g filter="url(#drop)"><rect width="200" height="46" x="540" y="324" fill="#1C2128" stroke="#C8A24A" stroke-width="1" rx="5"/><rect width="200" height="46" x="540" y="324" fill="url(#hi)" rx="5"/></g><text x="640" y="344" class="heading" text-anchor="middle">packages/shared</text><text x="640" y="359" class="sub" text-anchor="middle">errors · logs · ids · queues</text><g filter="url(#drop)"><rect width="170" height="46" x="780" y="270" fill="#1C2128" stroke="#22D6F6" stroke-width="1" rx="5"/><rect width="170" height="46" x="780" y="270" fill="url(#hi)" rx="5"/></g><text x="865" y="290" class="heading" text-anchor="middle">pino + OTel</text><text x="865" y="305" class="sub" text-anchor="middle">request-id · tracing</text><g filter="url(#drop)"><rect width="170" height="46" x="780" y="324" fill="#1C2128" stroke="#22D6F6" stroke-width="1" rx="5"/><rect width="170" height="46" x="780" y="324" fill="url(#hi)" rx="5"/></g><text x="865" y="344" class="heading" text-anchor="middle">Prometheus :9464</text><text x="865" y="359" class="sub" text-anchor="middle">live signal catalogue</text><g filter="url(#drop)"><rect width="170" height="100" x="980" y="270" fill="#1C2128" stroke="#C8A24A" stroke-width="1" rx="5"/><rect width="170" height="100" x="980" y="270" fill="url(#hi)" rx="5"/></g><text x="1065" y="294" class="heading" text-anchor="middle">outbox + idempotency</text><text x="1065" y="312" class="sub" text-anchor="middle">guaranteed delivery</text><text x="1065" y="328" class="sub" text-anchor="middle">replay-safe writes</text><text x="1065" y="354" class="sub2" text-anchor="middle">drainer · DLQ · retries</text><g fill="none" stroke="#C8A24A" stroke-width="1" marker-end="url(#arrow-gold)" opacity=".9"><path d="M280 293 H310"/><path d="M280 305 L310 345"/><path d="M510 293 H540"/><path d="M510 345 H540"/><path d="M740 293 H780"/><path d="M740 345 H780"/><path d="M950 293 H980"/></g><g filter="url(#drop)"><rect width="320" height="130" x="40" y="450" fill="url(#zone-gold)" stroke="#C8A24A" stroke-width="1.5" rx="8"/></g><text x="60" y="474" class="zone-label">SYSTEM OF RECORD</text><g filter="url(#drop)"><ellipse cx="200" cy="540" fill="#1C2128" stroke="#C8A24A" stroke-width="1" rx="100" ry="14"/><rect width="200" height="40" x="100" y="500" fill="#1C2128" stroke="none"/><path stroke="#C8A24A" stroke-width="1" d="M100 500 V540"/><path stroke="#C8A24A" stroke-width="1" d="M300 500 V540"/><ellipse cx="200" cy="500" fill="url(#gold)" rx="100" ry="14"/><ellipse cx="200" cy="500" fill="url(#hi)" rx="100" ry="14"/></g><text x="200" y="503" fill="#0B0F18" font-size="12" font-weight="700" text-anchor="middle">PostgreSQL 16</text><text x="200" y="528" class="sub" text-anchor="middle">system of record · RLS</text><text x="200" y="544" class="sub2" font-style="italic" text-anchor="middle">durable domain truth</text><text x="200" y="562" class="sub2" text-anchor="middle">tenantId NOT NULL · RLS-enforced</text><g filter="url(#drop)"><rect width="320" height="130" x="390" y="450" fill="url(#zone-gold)" stroke="#C8A24A" stroke-width="1.5" rx="8"/></g><text x="410" y="474" class="zone-label">QUEUE COORDINATION</text><g filter="url(#drop)"><ellipse cx="550" cy="540" fill="#1C2128" stroke="#C8A24A" stroke-width="1" rx="90" ry="12"/><rect width="180" height="36" x="460" y="504" fill="#1C2128" stroke="none"/><path stroke="#C8A24A" stroke-width="1" d="M460 504 V540"/><path stroke="#C8A24A" stroke-width="1" d="M640 504 V540"/><ellipse cx="550" cy="504" fill="url(#cyan)" rx="90" ry="12"/><ellipse cx="550" cy="504" fill="url(#hi)" rx="90" ry="12"/></g><text x="550" y="507" fill="#0B0F18" font-size="12" font-weight="700" text-anchor="middle">Redis 7 · BullMQ</text><text x="550" y="528" class="sub" text-anchor="middle">runtime coordination only</text><text x="550" y="544" class="sub2" font-style="italic" text-anchor="middle">not durable domain truth</text><text x="550" y="562" class="sub2" text-anchor="middle">job payload carries tenantId</text><g filter="url(#drop)"><rect width="420" height="130" x="740" y="450" fill="url(#zone-gold)" stroke="#C8A24A" stroke-width="1.5" rx="8"/></g><text x="760" y="474" class="zone-label">ASYNC RUNTIME</text><g filter="url(#drop)"><rect width="380" height="76" x="760" y="490" fill="#1C2128" stroke="#C8A24A" stroke-width="1" rx="6"/><rect width="380" height="76" x="760" y="490" fill="url(#hi)" rx="6"/></g><text x="950" y="514" class="heading" text-anchor="middle">apps/worker</text><text x="950" y="532" class="sub" text-anchor="middle">NestJS standalone · BullMQ consumer</text><text x="950" y="548" class="sub2" text-anchor="middle">tenantId in every job payload</text><text x="950" y="562" class="sub2" text-anchor="middle">Prometheus 127.0.0.1:9091</text><path fill="none" stroke="#22D6F6" stroke-width="1.6" marker-end="url(#arrow-cyan)" d="M170 368 V450"/><text x="178" y="416" class="flow-label">tenant-
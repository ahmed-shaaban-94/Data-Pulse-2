inite" values="0;1;1;0"/></circle><circle r="4" fill="#C8A24A" filter="url(#glow)"><animateMotion begin="2s" dur="3.6s" repeatCount="indefinite"><mpath href="#m7"/></animateMotion><animate attributeName="opacity" begin="2s" dur="3.6s" repeatCount="indefinite" values="0;0.9;0.9;0"/></circle></g><circle cx="200" cy="500" r="50" fill="none" stroke="#C8A24A" stroke-width=".8" opacity="0"><animate attributeName="r" dur="4.4s" repeatCount="indefinite" values="20;110;20"/><animate attributeName="opacity" dur="4.4s" repeatCount="indefinite" values="0.45;0;0.45"/></circle><circle cx="550" cy="504" r="40" fill="none" stroke="#22D6F6" stroke-width=".8" opacity="0"><animate attributeName="r" begin="2.2s" dur="4.4s" repeatCount="indefinite" values="20;100;20"/><animate attributeName="opacity" begin="2.2s" dur="4.4s" repeatCount="indefinite" values="0.45;0;0.45"/></circle><g transform="translate(40 620)"><rect width="1120" height="80" fill="#0F1620" stroke="#30363D" stroke-width="1" rx="8"/><text x="20" y="22" fill="#8B949E" font-size="10" font-weight="700" letter-spacing="1.2">LEGEND</text><line x1="20" x2="60" y1="42" y2="42" stroke="#22D6F6" stroke-width="1.6" marker-end="url(#arrow-cyan)"/><text x="68" y="46" fill="#E6EDF3" font-size="10.5">Data / request flow</text><line x1="220" x2="260" y1="42" y2="42" stroke="#C8A24A" stroke-width="1.4" marker-end="url(#arrow-gold)"/><text x="268" y="46" fill="#E6EDF3" font-size="10.5">Package dependency</text><line x1="420" x2="460" y1="42" y2="42" stroke="#8B949E" stroke-dasharray="5 3" stroke-width="1.4" marker-end="url(#arrow-dim)"/><text x="468" y="46" fill="#E6EDF3" font-size="10.5">External / authenticated contract</text><circle cx="700" cy="42" r="4" fill="#22D6F6" filter="url(#glow)"/><text x="712" y="46" fill="#E6EDF3" font-size="10.5">Live data token</text><text x="20" y="66" fill="#8B949E" font-size="9.5">POS applications live in an external repository and integrate exclusively through authenticated OpenAPI contracts. Dashboar
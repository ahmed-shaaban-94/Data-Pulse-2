<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 620" width="440" height="620" fill="none" font-family="system-ui, ui-sans-serif, sans-serif" font-size="12">
  <title>Retail Tower OS — API Request Flow</title>
  <desc>Request pipeline through AuthGuard, TenantContextGuard, RolesGuard, service layer, DB with RLS, audit log, and response with request id.</desc>

  <!-- background -->
  <rect width="440" height="620" fill="#0D1117"/>

  <!-- title -->
  <text x="220" y="30" fill="#C8A24A" font-size="13" font-weight="700" text-anchor="middle" letter-spacing="0.5">API Request Pipeline</text>
  <text x="220" y="48" fill="#8B949E" font-size="10" text-anchor="middle">apps/api · NestJS guard chain</text>

  <!-- step boxes -->
  <!-- 1: incoming request -->
  <rect x="60" y="68" width="320" height="52" rx="5" fill="#161B22" stroke="#22D6F6" stroke-width="1.5"/>
  <text x="220" y="90" fill="#22D6F6" font-size="11" font-weight="600" text-anchor="middle">Incoming HTTP Request</text>
  <text x="220" y="107" fill="#8B949E" font-size="9.5" text-anchor="middle">assign request id · helmet · cookies · body parse</text>

  <!-- arrow 1→2 -->
  <line x1="220" y1="120" x2="220" y2="140" stroke="#22D6F6" stroke-width="1.5" marker-end="url(#rf-arrow-cyan)"/>

  <!-- 2: exception / validation envelope -->
  <rect x="60" y="140" width="320" height="44" rx="5" fill="#161B22" stroke="#C8A24A" stroke-width="1.25"/>
  <text x="220" y="159" fill="#E6EDF3" font-size="11" font-weight="600" text-anchor="middle">Validation + Exception Envelope</text>
  <text x="220" y="175" fill="#8B949E" font-size="9.5" text-anchor="middle">Zod body validation · normalize error shape</text>

  <!-- arrow 2→3 -->
  <line x1="220" y1="184" x2="220" y2="204" stroke="#22D6F6" stroke-width="1.5" marker-end="url(#rf-arrow-cyan)"/>

  <!-- 3: AuthGuard -->
  <rect x="60" y="204" width="320" height="50" rx="5" fill="#161B22" stroke="#C8A24A" stroke-width="1.25"/>
  <text x="220" y="224" fill="#E6EDF3" font-size="11" font-weight="600" text-anchor="middle">AuthGuard</text>
  <text x="220" y="240" fill="#8B949E" font-size="9.5" text-anchor="middle">validate session token or bearer token</text>
  <!-- DB lookup side note -->
  <rect x="390" y="210" width="42" height="28" rx="3" fill="#1C2128" stroke="#30363D" stroke-width="1"/>
  <text x="411" y="222" fill="#8B949E" font-size="8.5" text-anchor="middle">PG</text>
  <text x="411" y="233" fill="#8B949E" font-size="8" text-anchor="middle">lookup</text>
  <line x1="380" y1="224" x2="390" y2="224" stroke="#8B949E" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- arrow 3→4 -->
  <line x1="220" y1="254" x2="220" y2="274" stroke="#22D6F6" stroke-width="1.5" marker-end="url(#rf-arrow-cyan)"/>

  <!-- 4: TenantContextGuard -->
  <rect x="60" y="274" width="320" height="52" rx="5" fill="#161B22" stroke="#C8A24A" stroke-width="1.25"/>
  <text x="220" y="294" fill="#E6EDF3" font-size="11" font-weight="600" text-anchor="middle">TenantContextGuard</text>
  <text x="220" y="310" fill="#8B949E" font-size="9.5" text-anchor="middle">resolve tenant + store from membership</text>
  <text x="220" y="322" fill="#8B949E" font-size="9" text-anchor="middle" font-style="italic">cross-tenant access → safe 404</text>
  <rect x="390" y="280" width="42" height="28" rx="3" fill="#1C2128" stroke="#30363D" stroke-width="1"/>
  <text x="411" y="292" fill="#8B949E" font-size="8.5" text-anchor="middle">PG</text>
  <text x="411" y="303" fill="#8B949E" font-size="8" text-anchor="middle">lookup</text>
  <line x1="380" y1="294" x2="390" y2="294" stroke="#8B949E" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- arrow 4→5 -->
  <line x1="220" y1="326" x2="220" y2="346" stroke="#22D6F6" stroke-width="1.5" marker-end="url(#rf-arrow-cyan)"/>

  <!-- 5: RolesGuard -->
  <rect x="60" y="346" width="320" height="44" rx="5" fill="#161B22" stroke="#C8A24A" stroke-width="1.25"/>
  <text x="220" y="366" fill="#E6EDF3" font-size="11" font-weight="600" text-anchor="middle">RolesGuard</text>
  <text x="220" y="382" fill="#8B949E" font-size="9.5" text-anchor="middle">check role · permission · default deny</text>

  <!-- arrow 5→6 -->
  <line x1="220" y1="390" x2="220" y2="410" stroke="#22D6F6" stroke-width="1.5" marker-end="url(#rf-arrow-cyan)"/>

  <!-- 6: service layer -->
  <rect x="60" y="410" width="320" height="52" rx="5" fill="#161B22" stroke="#C8A24A" stroke-width="1.5"/>
  <text x="220" y="430" fill="#E6EDF3" font-size="11" font-weight="600" text-anchor="middle">Service Layer</text>
  <text x="220" y="446" fill="#8B949E" font-size="9.5" text-anchor="middle">business logic · tenant-scoped DB access</text>
  <text x="220" y="458" fill="#8B949E" font-size="9.5" text-anchor="middle">RLS enforced · PostgreSQL system of record</text>

  <!-- arrow 6→7 -->
  <line x1="220" y1="462" x2="220" y2="482" stroke="#22D6F6" stroke-width="1.5" marker-end="url(#rf-arrow-cyan)"/>

  <!-- 7: audit log -->
  <rect x="60" y="482" width="320" height="44" rx="5" fill="#161B22" stroke="#C8A24A" stroke-width="1.25"/>
  <text x="220" y="501" fill="#E6EDF3" font-size="11" font-weight="600" text-anchor="middle">Audit Log</text>
  <text x="220" y="517" fill="#8B949E" font-size="9.5" text-anchor="middle">actor · tenant · store · op · outcome · correlationId</text>

  <!-- arrow 7→8 -->
  <line x1="220" y1="526" x2="220" y2="546" stroke="#22D6F6" stroke-width="1.5" marker-end="url(#rf-arrow-cyan)"/>

  <!-- 8: response -->
  <rect x="60" y="546" width="320" height="48" rx="5" fill="#161B22" stroke="#22D6F6" stroke-width="1.5"/>
  <text x="220" y="567" fill="#22D6F6" font-size="11" font-weight="600" text-anchor="middle">Response</text>
  <text x="220" y="583" fill="#8B949E" font-size="9.5" text-anchor="middle">uniform envelope · includes request id</text>

  <!-- left rail label -->
  <text x="18" y="350" fill="#C8A24A" font-size="9" text-anchor="middle" transform="rotate(-90,18,350)">GUARD CHAIN</text>

  <defs>
    <marker id="rf-arrow-cyan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22D6F6"/>
    </marker>
  </defs>
</svg>

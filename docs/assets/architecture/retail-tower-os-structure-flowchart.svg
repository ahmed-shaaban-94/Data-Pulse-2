oe UI', sans-serif"><text x="40" y="56" fill="#f8fafc" font-size="26" font-weight="800">Retail Tower OS · structure &amp; request flow</text><text x="40" y="84" fill="#94a3b8" font-size="14">Clients ➜ API ingress ➜ guard chain ➜ service layer + RLS ➜ PostgreSQL · outbox ➜ Redis ➜ worker — governed by contracts, shared, and observability.</text><g opacity=".95"><rect width="190" height="600" x="40" y="120" fill="url(#rail)" rx="22"/><rect width="190" height="600" x="40" y="120" fill="none" stroke="#1e293b" rx="22"/><text x="135" y="148" fill="#cbd5e1" font-size="13" font-weight="700" text-anchor="middle">CONTRACTS · GOVERNANCE</text><text x="135" y="166" fill="#64748b" font-size="11" text-anchor="middle">.specify / packages/contracts</text><g fill="#cbd5e1" font-size="12" text-anchor="middle"><text x="135" y="220">OpenAPI 3.1 of record</text><text x="135" y="242" fill="#94a3b8" font-size="11">packages/contracts/openapi</text><text x="135" y="288">Zod runtime validation</text><text x="135" y="310" fill="#94a3b8" font-size="11">packages/contracts/src</text><text x="135" y="358">Constitution v3.0.0</text><text x="135" y="380" fill="#94a3b8" font-size="11">14 core principles</text><text x="135" y="430">Agent OS · Maestro</text><text x="135" y="452" fill="#94a3b8" font-size="11">slice-governed flow</text><text x="135" y="500">specs/001 ▸ 010</text><text x="135" y="522" fill="#94a3b8" font-size="11">auth → inventory ledger</text><text x="135" y="580">Hard rules</text><text x="135" y="600" fill="#94a3b8" font-size="11">RLS · contract-first</text><text x="135" y="618" fill="#94a3b8" font-size="11">audit · provenance</text><text x="135" y="636" fill="#94a3b8" font-size="11">PII discipline</text></g></g><g opacity=".95"><rect width="190" height="600" x="1050" y="120" fill="url(#rail)" rx="22"/><rect width="190" height="600" x="1050" y="120" fill="none" stroke="#1e293b" rx="22"/><text x="1145" y="148" fill="#cbd5e1" font-size="13" font-weight="700" text-anchor="middle">OBSERVAB
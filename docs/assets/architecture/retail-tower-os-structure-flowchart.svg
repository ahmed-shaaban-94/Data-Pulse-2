<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="780" aria-labelledby="title desc" role="img" viewBox="0 0 1280 780"><title id="title">Retail Tower OS · platform structure &amp; request flow</title><desc id="desc">Animated structure diagram showing dashboard and POS clients travelling through the NestJS API, guard chain (auth → tenant → roles), service layer with RLS-enforced PostgreSQL, BullMQ outbox into Redis, and the worker app. Side rails surface contracts, shared packages, and observability.</desc><defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#020617"/><stop offset=".55" stop-color="#0b1325"/><stop offset="1" stop-color="#020617"/></linearGradient><radialGradient id="bg-glow" cx=".55" cy=".45" r=".6"><stop offset="0" stop-color="#0f766e" stop-opacity=".35"/><stop offset="1" stop-color="#020617" stop-opacity="0"/></radialGradient><linearGradient id="rail" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#1e293b" stop-opacity=".5"/><stop offset="1" stop-color="#1e293b" stop-opacity=".2"/></linearGradient><linearGradient id="n-teal" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#5eead4"/><stop offset=".55" stop-color="#0d9488"/><stop offset="1" stop-color="#134e4a"/></linearGradient><linearGradient id="n-blue" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#60a5fa"/><stop offset=".55" stop-color="#2563eb"/><stop offset="1" stop-color="#1e3a8a"/></linearGradient><linearGradient id="n-violet" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#c4b5fd"/><stop offset=".55" stop-color="#7c3aed"/><stop offset="1" stop-color="#4c1d95"/></linearGradient><linearGradient id="n-amber" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#fcd34d"/><stop offset=".55" stop-color="#d97706"/><stop offset="1" stop-color="#7c2d12"/></linearGradient><linearGradient id="n-rose" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#fda4af"/><stop offset=".55" stop-color="#e11d48"/><stop of
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 480" width="740" height="480" fill="none" font-family="system-ui, ui-sans-serif, sans-serif" font-size="12">
  <title>Retail Tower OS — Tenant Boundary and Data Ownership</title>
  <desc>Tenant isolation: Tenant A and Tenant B with stores, PostgreSQL RLS boundary, API resolving tenant context, and worker carrying tenantId.</desc>

  <!-- background -->
  <rect width="740" height="480" fill="#0D1117"/>

  <!-- title -->
  <text x="370" y="28" fill="#C8A24A" font-size="13" font-weight="700" text-anchor="middle" letter-spacing="0.5">Tenant Boundary &amp; Data Ownership</text>
  <text x="370" y="46" fill="#8B949E" font-size="10" text-anchor="middle">RLS-enforced isolation · worker tenantId propagation</text>

  <!-- ── Tenant A ──────────────────────────────── -->
  <rect x="20" y="62" width="310" height="170" rx="6" fill="#161B22" stroke="#C8A24A" stroke-width="1.5"/>
  <text x="36" y="82" fill="#C8A24A" font-size="10" font-weight="700" letter-spacing="1">TENANT A</text>
  <text x="36" y="96" fill="#8B949E" font-size="9" font-style="italic">ownership group · fully isolated context</text>

  <!-- Store A-1 -->
  <rect x="36" y="106" width="124" height="48" rx="4" fill="#1C2128" stroke="#C8A24A" stroke-width="1"/>
  <text x="98" y="127" fill="#E6EDF3" font-size="11" text-anchor="middle">Store A-1</text>
  <text x="98" y="142" fill="#8B949E" font-size="9.5" text-anchor="middle">branch · storeId scoped</text>

  <!-- Store A-2 -->
  <rect x="176" y="106" width="124" height="48" rx="4" fill="#1C2128" stroke="#C8A24A" stroke-width="1"/>
  <text x="238" y="127" fill="#E6EDF3" font-size="11" text-anchor="middle">Store A-2</text>
  <text x="238" y="142" fill="#8B949E" font-size="9.5" text-anchor="middle">branch · storeId scoped</text>

  <!-- Members / Roles A -->
  <rect x="36" y="170" width="264" height="46" rx="4" fill="#1C2128" stroke="#30363D" stroke-width="1"/>
  <text x="168" y="190" fill="#E6EDF3" font-size="11" text-anchor="middle">Members / Roles</text>
  <text x="168" y="205" fill="#8B949E" font-size="9.5" text-anchor="middle">tenantId-scoped identity · RBAC</text>

  <!-- ── Tenant B ──────────────────────────────── -->
  <rect x="410" y="62" width="310" height="170" rx="6" fill="#161B22" stroke="#C8A24A" stroke-width="1.5"/>
  <text x="426" y="82" fill="#C8A24A" font-size="10" font-weight="700" letter-spacing="1">TENANT B</text>
  <text x="426" y="96" fill="#8B949E" font-size="9" font-style="italic">separate ownership group · zero shared rows</text>

  <!-- Store B-1 -->
  <rect x="426" y="106" width="130" height="48" rx="4" fill="#1C2128" stroke="#C8A24A" stroke-width="1"/>
  <text x="491" y="127" fill="#E6EDF3" font-size="11" text-anchor="middle">Store B-1</text>
  <text x="491" y="142" fill="#8B949E" font-size="9.5" text-anchor="middle">branch · storeId scoped</text>

  <!-- Members / Roles B -->
  <rect x="426" y="170" width="278" height="46" rx="4" fill="#1C2128" stroke="#30363D" stroke-width="1"/>
  <text x="565" y="190" fill="#E6EDF3" font-size="11" text-anchor="middle">Members / Roles</text>
  <text x="565" y="205" fill="#8B949E" font-size="9.5" text-anchor="middle">tenantId-scoped identity · RBAC</text>

  <!-- isolation barrier label -->
  <line x1="370" y1="62" x2="370" y2="232" stroke="#30363D" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="370" y="254" fill="#30363D" font-size="9" text-anchor="middle">isolation boundary</text>

  <!-- ── PostgreSQL RLS zone ─────────────────────── -->
  <rect x="130" y="278" width="480" height="80" rx="6" fill="#161B22" stroke="#C8A24A" stroke-width="1.5"/>
  <text x="370" y="298" fill="#C8A24A" font-size="10" font-weight="700" text-anchor="middle" letter-spacing="1">PostgreSQL 16 · RLS ENFORCED</text>
  <text x="370" y="316" fill="#E6EDF3" font-size="11" text-anchor="middle">Row-Level Security — every query filtered by tenantId</text>
  <text x="370" y="332" fill="#8B949E" font-size="9.5" text-anchor="middle">runtime DB role must NOT bypass RLS · cross-tenant access returns safe 404</text>
  <text x="370" y="347" fill="#8B949E" font-size="9" text-anchor="middle" font-style="italic">tenant existence must never be revealed by error messages</text>

  <!-- RLS arrows from tenant zones -->
  <line x1="175" y1="232" x2="240" y2="278" stroke="#22D6F6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#tb-arrow-cyan)"/>
  <text x="170" y="260" fill="#22D6F6" font-size="9">RLS row filter</text>
  <line x1="565" y1="232" x2="500" y2="278" stroke="#22D6F6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#tb-arrow-cyan)"/>
  <text x="522" y="260" fill="#22D6F6" font-size="9">RLS row filter</text>

  <!-- ── apps/api ───────────────────────────────── -->
  <rect x="20" y="390" width="320" height="68" rx="6" fill="#161B22" stroke="#C8A24A" stroke-width="1.25"/>
  <text x="36" y="410" fill="#C8A24A" font-size="10" font-weight="600" letter-spacing="1">COMMAND GATEWAY</text>
  <text x="180" y="430" fill="#E6EDF3" font-size="11" font-weight="600" text-anchor="middle">apps/api</text>
  <text x="180" y="446" fill="#8B949E" font-size="9.5" text-anchor="middle">resolves tenantId + storeId from session / token</text>

  <!-- api → postgres -->
  <line x1="200" y1="390" x2="290" y2="358" stroke="#22D6F6" stroke-width="1.5" marker-end="url(#tb-arrow-cyan)"/>
  <text x="218" y="378" fill="#22D6F6" font-size="9">tenant-scoped query</text>

  <!-- ── apps/worker ─────────────────────────────── -->
  <rect x="400" y="390" width="320" height="68" rx="6" fill="#161B22" stroke="#C8A24A" stroke-width="1.25"/>
  <text x="416" y="410" fill="#C8A24A" font-size="10" font-weight="600" letter-spacing="1">ASYNC RUNTIME</text>
  <text x="560" y="430" fill="#E6EDF3" font-size="11" font-weight="600" text-anchor="middle">apps/worker</text>
  <text x="560" y="446" fill="#8B949E" font-size="9.5" text-anchor="middle">carries tenantId in every job payload</text>

  <!-- worker → postgres -->
  <line x1="500" y1="390" x2="450" y2="358" stroke="#22D6F6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#tb-arrow-cyan)"/>
  <text x="482" y="378" fill="#22D6F6" font-size="9">establishes tenant ctx first</text>

  <!-- api → worker (enqueue with tenantId) -->
  <line x1="340" y1="424" x2="400" y2="424" stroke="#C8A24A" stroke-width="1.25" marker-end="url(#tb-arrow-gold)"/>
  <text x="370" y="416" fill="#C8A24A" font-size="9" text-anchor="middle">enqueue job</text>
  <text x="370" y="436" fill="#8B949E" font-size="8.5" text-anchor="middle">tenantId + storeId in payload</text>

  <!-- isolation rule note -->
  <rect x="20" y="458" width="700" height="16" rx="3" fill="#161B22" stroke="none"/>
  <text x="370" y="470" fill="#30363D" font-size="9.5" text-anchor="middle">Workers must establish tenant context before any DB access. Failed jobs are logged with redacted payloads.</text>

  <defs>
    <marker id="tb-arrow-cyan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22D6F6"/>
    </marker>
    <marker id="tb-arrow-gold" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#C8A24A"/>
    </marker>
  </defs>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="740" height="480" fill="none" font-family="system-ui, ui-sans-serif, sans-serif" font-size="12" viewBox="0 0 740 480"><title>Retail Tower OS — Tenant Boundary and Data Ownership</title><desc>Tenant isolation: Tenant A and Tenant B with stores, PostgreSQL RLS boundary, API resolving tenant context, and worker carrying tenantId.</desc><rect width="740" height="480" fill="#0D1117"/><text x="370" y="28" fill="#C8A24A" font-size="13" font-weight="700" letter-spacing=".5" text-anchor="middle">Tenant Boundary &amp; Data Ownership</text><text x="370" y="46" fill="#8B949E" font-size="10" text-anchor="middle">RLS-enforced isolation · worker tenantId propagation</text><rect width="310" height="170" x="20" y="62" fill="#161B22" stroke="#C8A24A" stroke-width="1.5" rx="6"/><text x="36" y="82" fill="#C8A24A" font-size="10" font-weight="700" letter-spacing="1">TENANT A</text><text x="36" y="96" fill="#8B949E" font-size="9" font-style="italic">ownership group · fully isolated context</text><rect width="124" height="48" x="36" y="106" fill="#1C2128" stroke="#C8A24A" stroke-width="1" rx="4"/><text x="98" y="127" fill="#E6EDF3" font-size="11" text-anchor="middle">Store A-1</text><text x="98" y="142" fill="#8B949E" font-size="9.5" text-anchor="middle">branch · storeId scoped</text><rect width="124" height="48" x="176" y="106" fill="#1C2128" stroke="#C8A24A" stroke-width="1" rx="4"/><text x="238" y="127" fill="#E6EDF3" font-size="11" text-anchor="middle">Store A-2</text><text x="238" y="142" fill="#8B949E" font-size="9.5" text-anchor="middle">branch · storeId scoped</text><rect width="264" height="46" x="36" y="170" fill="#1C2128" stroke="#30363D" stroke-width="1" rx="4"/><text x="168" y="190" fill="#E6EDF3" font-size="11" text-anchor="middle">Members / Roles</text><text x="168" y="205" fill="#8B949E" font-size="9.5" text-anchor="middle">tenantId-scoped identity · RBAC</text><rect width="310" height="170" x="410" y="62" fill="#161B22" stroke="#C8A24A" stroke-width="1.5" rx="6"/><text x="426" y="82" fill="#C8A24A" font-size="10" font-weight="700" letter-spacing="1">TENANT B</text><text x="426" y="96" fill="#8B949E" font-size="9" font-style="italic">separate ownership group · zero shared rows</text><rect width="130" height="48" x="426" y="106" fill="#1C2128" stroke="#C8A24A" stroke-width="1" rx="4"/><text x="491" y="127" fill="#E6EDF3" font-size="11" text-anchor="middle">Store B-1</text><text x="491" y="142" fill="#8B949E" font-size="9.5" text-anchor="middle">branch · storeId scoped</text><rect width="278" height="46" x="426" y="170" fill="#1C2128" stroke="#30363D" stroke-width="1" rx="4"/><text x="565" y="190" fill="#E6EDF3" font-size="11" text-anchor="middle">Members / Roles</text><text x="565" y="205" fill="#8B949E" font-size="9.5" text-anchor="middle">tenantId-scoped identity · RBAC</text><line x1="370" x2="370" y1="62" y2="232" stroke="#30363D" stroke-dasharray="4 3" stroke-width="1.5"/><text x="370" y="254" fill="#30363D" font-size="9" text-anchor="middle">isolation boundary</text><rect width="480" height="80" x="130" y="278" fill="#161B22" stroke="#C8A24A" stroke-width="1.5" rx="6"/><text x="370" y="298" fill="#C8A24A" font-size="10" font-weight="700" letter-spacing="1" text-anchor="middle">PostgreSQL 16 · RLS ENFORCED</text><text x="370" y="316" fill="#E6EDF3" font-size="11" text-anchor="middle">Row-Level Security — every query filtered by tenantId</text><text x="370" y="332" fill="#8B949E" font-size="9.5" text-anchor="middle">runtime DB role must NOT bypass RLS · cross-tenant access returns safe 404</text><text x="370" y="347" fill="#8B949E" font-size="9" font-style="italic" text-anchor="middle">tenant existence must never be revealed by error messages</text><line x1="175" x2="240" y1="232" y2="278" stroke="#22D6F6" stroke-dasharray="5 3" stroke-width="1.5" marker-end="url(#tb-arrow-cyan)"/><text x="170" y="260" fill="#22D6F6" font-size="9">RLS row filter</text><line x1="565" x2="500" y1="232" y2="278" stroke="#22D6F6" stroke-dasharray="5 3" stroke-width="1.5" marker-end="url(#tb-arrow-cyan)"/><text x="522" y="260" fill="#22D6F6" font-size="9">RLS row filter</text><rect width="320" height="68" x="20" y="390" fill="#161B22" stroke="#C8A24A" stroke-width="1.25" rx="6"/><text x="36" y="410" fill="#C8A24A" font-size="10" font-weight="600" letter-spacing="1">COMMAND GATEWAY</text><text x="180" y="430" fill="#E6EDF3" font-size="11" font-weight="600" text-anchor="middle">apps/api</text><text x="180" y="446" fill="#8B949E" font-size="9.5" text-anchor="middle">resolves tenantId + storeId from session / token</text><line x1="200" x2="290" y1="390" y2="358" stroke="#22D6F6" stroke-width="1.5" marker-end="url(#tb-arrow-cyan)"/><text x="218" y="378" fill="#22D6F6" font-size="9">tenant-scoped query</text><rect width="320" height="68" x="400" y="390" fill="#161B22" stroke="#C8A24A" stroke-width="1.25" rx="6"/><text x="416" y="410" fill="#C8A24A" font-size="10" font-weight="600" letter-spacing="1">ASYNC RUNTIME</text><text x="560" y="430" fill="#E6EDF3" font-size="11" font-weight="600" text-anchor="middle">apps/worker</text><text x="560" y="446" fill="#8B949E" font-size="9.5" text-anchor="middle">carries tenantId in every job payload</text><line x1="500" x2="450" y1="390" y2="358" stroke="#22D6F6" stroke-dasharray="5 3" stroke-width="1.5" marker-end="url(#tb-arrow-cyan)"/><text x="482" y="378" fill="#22D6F6" font-size="9">establishes tenant ctx first</text><line x1="340" x2="400" y1="424" y2="424" stroke="#C8A24A" stroke-width="1.25" marker-end="url(#tb-arrow-gold)"/><text x="370" y="416" fill="#C8A24A" font-size="9" text-anchor="middle">enqueue job</text><text x="370" y="436" fill="#8B949E" font-size="8.5" text-anchor="middle">tenantId + storeId in payload</text><rect width="700" height="16" x="20" y="458" fill="#161B22" stroke="none" rx="3"/><text x="370" y="470" fill="#30363D" font-size="9.5" text-anchor="middle">Workers must establish tenant context before any DB access. Failed jobs are logged with redacted payloads.</text><defs><marker id="tb-arrow-cyan" markerHeight="8" markerWidth="8" orient="auto" refX="6" refY="3"><path fill="#22D6F6" d="M0,0 L0,6 L8,3 z"/></marker><marker id="tb-arrow-gold" markerHeight="8" markerWidth="8" orient="auto" refX="6" refY="3"><path fill="#C8A24A" d="M0,0 L0,6 L8,3 z"/></marker></defs></svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-labelledby="t d">
  <title id="t">POS core</title>
  <desc id="d">POS terminal with screen and counter base.</desc>
  <defs>
    <linearGradient id="pc-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F0CB6B"/>
      <stop offset="0.5" stop-color="#C8A24A"/>
      <stop offset="1" stop-color="#7A5A14"/>
    </linearGradient>
    <linearGradient id="pc-screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A8F4FB"/>
      <stop offset="1" stop-color="#22D6F6"/>
    </linearGradient>
    <linearGradient id="pc-hi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="pc-sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.6" stdDeviation="1.4" flood-color="#0B0F18" flood-opacity="0.7"/>
    </filter>
  </defs>
  <g filter="url(#pc-sh)">
    <rect x="6" y="8" width="36" height="22" rx="3" fill="url(#pc-body)"/>
    <rect x="6" y="8" width="36" height="22" rx="3" fill="url(#pc-hi)"/>
    <rect x="9" y="11" width="30" height="13" rx="1.5" fill="url(#pc-screen)"/>
  </g>
  <g fill="#0B0F18" opacity="0.55">
    <rect x="11" y="13" width="14" height="1.6"/>
    <rect x="11" y="16" width="22" height="1.6"/>
    <rect x="11" y="19" width="18" height="1.6"/>
  </g>
  <circle cx="36" cy="20" r="2" fill="#0B0F18" opacity="0.8">
    <animate attributeName="opacity" values="0.3;0.95;0.3" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <g filter="url(#pc-sh)">
    <rect x="14" y="30" width="20" height="6" rx="1.4" fill="url(#pc-body)"/>
    <rect x="14" y="30" width="20" height="6" rx="1.4" fill="url(#pc-hi)"/>
    <rect x="4" y="36" width="40" height="6" rx="1.4" fill="#5A4310"/>
    <rect x="4" y="36" width="40" height="2" fill="#ffffff" opacity="0.18"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-labelledby="t d">
  <title id="t">Store network</title>
  <desc id="d">Connected store nodes forming a branch network around a command core.</desc>
  <defs>
    <radialGradient id="sn-core" cx="0.4" cy="0.35" r="0.65">
      <stop offset="0" stop-color="#F0CB6B"/>
      <stop offset="0.5" stop-color="#C8A24A"/>
      <stop offset="1" stop-color="#7A5A14"/>
    </radialGradient>
    <radialGradient id="sn-leaf" cx="0.4" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#A8F4FB"/>
      <stop offset="0.5" stop-color="#22D6F6"/>
      <stop offset="1" stop-color="#0E7A93"/>
    </radialGradient>
    <filter id="sn-sh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1.6" stdDeviation="1.4" flood-color="#0B0F18" flood-opacity="0.7"/>
    </filter>
  </defs>
  <g stroke="#C8A24A" stroke-width="1.2" stroke-dasharray="3 3" fill="none" opacity="0.7">
    <path d="M24 24 L8 12">
      <animate attributeName="stroke-dashoffset" values="0;-6" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M24 24 L40 12">
      <animate attributeName="stroke-dashoffset" values="0;-6" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M24 24 L8 36">
      <animate attributeName="stroke-dashoffset" values="0;-6" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M24 24 L40 36">
      <animate attributeName="stroke-dashoffset" values="0;-6" dur="2s" repeatCount="indefinite"/>
    </path>
  </g>
  <g filter="url(#sn-sh)">
    <circle cx="24" cy="24" r="6" fill="url(#sn-core)"/>
    <circle cx="8" cy="12" r="3.6" fill="url(#sn-leaf)"/>
    <circle cx="40" cy="12" r="3.6" fill="url(#sn-leaf)"/>
    <circle cx="8" cy="36" r="3.6" fill="url(#sn-leaf)"/>
    <circle cx="40" cy="36" r="3.6" fill="url(#sn-leaf)"/>
  </g>
  <circle cx="24" cy="24" r="10" fill="none" stroke="#C8A24A" stroke-width="0.6" opacity="0">
    <animate attributeName="r" values="6;14;6" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="2.8s" repeatCount="indefinite"/>
  </circle>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-labelledby="t d">
  <title id="t">POS connectivity</title>
  <desc id="d">Plug connecting authenticated POS integrations to the platform core.</desc>
  <defs>
    <linearGradient id="in-plug" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F0CB6B"/>
      <stop offset="0.55" stop-color="#C8A24A"/>
      <stop offset="1" stop-color="#7A5A14"/>
    </linearGradient>
    <linearGradient id="in-hi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="in-socket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A8F4FB"/>
      <stop offset="1" stop-color="#22D6F6"/>
    </linearGradient>
    <filter id="in-sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.6" stdDeviation="1.4" flood-color="#0B0F18" flood-opacity="0.7"/>
    </filter>
  </defs>
  <g stroke="#C8A24A" stroke-width="2" stroke-linecap="round" fill="none">
    <path d="M18 4 V12"/>
    <path d="M30 4 V12"/>
  </g>
  <g filter="url(#in-sh)">
    <rect x="14" y="12" width="20" height="14" rx="2.4" fill="url(#in-plug)"/>
    <rect x="14" y="12" width="20" height="14" rx="2.4" fill="url(#in-hi)"/>
    <rect x="20" y="26" width="8" height="6" rx="1.2" fill="url(#in-plug)"/>
  </g>
  <g filter="url(#in-sh)">
    <rect x="14" y="34" width="20" height="10" rx="2.4" fill="url(#in-socket)"/>
    <rect x="14" y="34" width="20" height="10" rx="2.4" fill="url(#in-hi)"/>
  </g>
  <g fill="#0B0F18" opacity="0.7">
    <rect x="20" y="37" width="2" height="4" rx="0.5"/>
    <rect x="26" y="37" width="2" height="4" rx="0.5"/>
  </g>
  <circle cx="24" cy="32" r="1.5" fill="#22D6F6">
    <animate attributeName="cy" values="32;38;32" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>

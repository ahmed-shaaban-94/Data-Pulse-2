<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-labelledby="t d">
  <title id="t">Branch operations</title>
  <desc id="d">Command tower radiating to branch nodes, rendered with depth gradients.</desc>
  <defs>
    <linearGradient id="bo-tower" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F0CB6B"/>
      <stop offset="0.5" stop-color="#C8A24A"/>
      <stop offset="1" stop-color="#8A6A1F"/>
    </linearGradient>
    <linearGradient id="bo-node" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7FE9FB"/>
      <stop offset="1" stop-color="#22D6F6"/>
    </linearGradient>
    <radialGradient id="bo-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22D6F6" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#22D6F6" stop-opacity="0"/>
    </radialGradient>
    <filter id="bo-sh" x="-30%" y="-10%" width="160%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#0B0F18" flood-opacity="0.7"/>
    </filter>
  </defs>
  <g filter="url(#bo-sh)">
    <rect x="20" y="5" width="8" height="9" rx="1.4" fill="url(#bo-tower)"/>
  </g>
  <rect x="20" y="5" width="8" height="2" fill="#ffffff" opacity="0.35"/>
  <g stroke="#C8A24A" stroke-width="1.4" fill="none" stroke-linecap="round">
    <path d="M24 14 V20"/>
    <path d="M24 20 L10 28"/>
    <path d="M24 20 V28"/>
    <path d="M24 20 L38 28"/>
  </g>
  <g filter="url(#bo-sh)">
    <rect x="6" y="27" width="8" height="9" rx="1.4" fill="url(#bo-tower)"/>
    <rect x="20" y="27" width="8" height="9" rx="1.4" fill="url(#bo-tower)"/>
    <rect x="34" y="27" width="8" height="9" rx="1.4" fill="url(#bo-tower)"/>
  </g>
  <g fill="#ffffff" opacity="0.35">
    <rect x="6" y="27" width="8" height="2"/>
    <rect x="20" y="27" width="8" height="2"/>
    <rect x="34" y="27" width="8" height="2"/>
  </g>
  <g>
    <circle cx="10" cy="42" r="2.5" fill="url(#bo-node)">
      <animate attributeName="r" values="2.2;3;2.2" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="24" cy="42" r="2.5" fill="url(#bo-node)">
      <animate attributeName="r" values="2.2;3;2.2" dur="2s" begin="0.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="38" cy="42" r="2.5" fill="url(#bo-node)">
      <animate attributeName="r" values="2.2;3;2.2" dur="2s" begin="1.4s" repeatCount="indefinite"/>
    </circle>
  </g>
  <circle cx="24" cy="9" r="6" fill="url(#bo-glow)" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.6s" repeatCount="indefinite"/>
  </circle>
</svg>

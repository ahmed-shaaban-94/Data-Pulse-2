<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-labelledby="t d">
  <title id="t">Dashboard</title>
  <desc id="d">Control panel showing live metrics and tenant-scoped surfaces.</desc>
  <defs>
    <linearGradient id="db-frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F0CB6B"/>
      <stop offset="0.55" stop-color="#C8A24A"/>
      <stop offset="1" stop-color="#7A5A14"/>
    </linearGradient>
    <linearGradient id="db-screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0F1A24"/>
      <stop offset="1" stop-color="#06121F"/>
    </linearGradient>
    <linearGradient id="db-hi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="db-sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.6" stdDeviation="1.4" flood-color="#0B0F18" flood-opacity="0.7"/>
    </filter>
  </defs>
  <g filter="url(#db-sh)">
    <rect x="4" y="8" width="40" height="28" rx="3" fill="url(#db-frame)"/>
    <rect x="4" y="8" width="40" height="28" rx="3" fill="url(#db-hi)"/>
    <rect x="6.5" y="10.5" width="35" height="23" rx="2" fill="url(#db-screen)"/>
  </g>
  <g stroke="#C8A24A" stroke-width="1" opacity="0.6">
    <path d="M6.5 18 H41.5"/>
    <path d="M18 18 V33.5"/>
  </g>
  <g fill="#22D6F6">
    <rect x="9" y="22" width="6" height="9" rx="0.8">
      <animate attributeName="height" values="9;5;9" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="y" values="22;26;22" dur="2.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="21" y="22" width="2" height="2"/>
    <rect x="25" y="22" width="14" height="2"/>
    <rect x="21" y="27" width="2" height="2"/>
    <rect x="25" y="27" width="10" height="2"/>
    <rect x="21" y="31.5" width="2" height="2"/>
    <rect x="25" y="31.5" width="12" height="2"/>
  </g>
  <rect x="18" y="38" width="12" height="2" rx="1" fill="#C8A24A"/>
</svg>

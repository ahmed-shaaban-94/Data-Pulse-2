<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-labelledby="t d">
  <title id="t">Secure core</title>
  <desc id="d">Layered shield representing tenant isolation, token auth, and audit trail.</desc>
  <defs>
    <linearGradient id="se-shield" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#F0CB6B"/>
      <stop offset="0.5" stop-color="#C8A24A"/>
      <stop offset="1" stop-color="#7A5A14"/>
    </linearGradient>
    <linearGradient id="se-inner" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#A8F4FB"/>
      <stop offset="0.5" stop-color="#22D6F6"/>
      <stop offset="1" stop-color="#0E7A93"/>
    </linearGradient>
    <linearGradient id="se-hi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="se-sh" x="-30%" y="-20%" width="160%" height="140%">
      <feDropShadow dx="0" dy="1.6" stdDeviation="1.4" flood-color="#0B0F18" flood-opacity="0.7"/>
    </filter>
  </defs>
  <g filter="url(#se-sh)">
    <path d="M24 4 L40 11 V23 C40 32 33 39 24 44 C15 39 8 32 8 23 V11 Z" fill="url(#se-shield)"/>
    <path d="M24 4 L40 11 V23 C40 32 33 39 24 44 C15 39 8 32 8 23 V11 Z" fill="url(#se-hi)"/>
  </g>
  <path d="M24 12 L34 16.5 V23.5 C34 29 29.5 33 24 36 C18.5 33 14 29 14 23.5 V16.5 Z" fill="url(#se-inner)" opacity="0.9"/>
  <circle cx="24" cy="24" r="3" fill="#0B0F18" opacity="0.85"/>
  <circle cx="24" cy="24" r="6" fill="none" stroke="#22D6F6" stroke-width="0.6" opacity="0">
    <animate attributeName="r" values="3;8;3" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="2.8s" repeatCount="indefinite"/>
  </circle>
</svg>

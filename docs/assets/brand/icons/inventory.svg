<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-labelledby="t d">
  <title id="t">Inventory</title>
  <desc id="d">Stacked inventory boxes with depth and stock indicators.</desc>
  <defs>
    <linearGradient id="iv-box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F0CB6B"/>
      <stop offset="0.5" stop-color="#C8A24A"/>
      <stop offset="1" stop-color="#7A5A14"/>
    </linearGradient>
    <linearGradient id="iv-hi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="iv-sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.6" stdDeviation="1.4" flood-color="#0B0F18" flood-opacity="0.7"/>
    </filter>
  </defs>
  <g filter="url(#iv-sh)">
    <rect x="6" y="26" width="16" height="16" rx="2" fill="url(#iv-box)"/>
    <rect x="6" y="26" width="16" height="16" rx="2" fill="url(#iv-hi)"/>
    <rect x="26" y="26" width="16" height="16" rx="2" fill="url(#iv-box)"/>
    <rect x="26" y="26" width="16" height="16" rx="2" fill="url(#iv-hi)"/>
    <rect x="16" y="6" width="16" height="16" rx="2" fill="url(#iv-box)"/>
    <rect x="16" y="6" width="16" height="16" rx="2" fill="url(#iv-hi)"/>
  </g>
  <g stroke="#0B0F18" stroke-width="0.8" opacity="0.4">
    <path d="M6 33 H22"/>
    <path d="M26 33 H42"/>
    <path d="M16 13 H32"/>
  </g>
  <g fill="#22D6F6">
    <rect x="13" y="29" width="2" height="2"/>
    <rect x="33" y="29" width="2" height="2"/>
    <rect x="23" y="9" width="2" height="2"/>
  </g>
</svg>

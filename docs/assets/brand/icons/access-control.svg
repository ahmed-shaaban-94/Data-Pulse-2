<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-labelledby="t d">
  <title id="t">Access control</title>
  <desc id="d">Layered shield with keyhole representing access enforcement.</desc>
  <defs>
    <linearGradient id="ac-shield" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#F0CB6B"/>
      <stop offset="0.5" stop-color="#C8A24A"/>
      <stop offset="1" stop-color="#7A5A14"/>
    </linearGradient>
    <linearGradient id="ac-hi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="ac-key" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#A8F4FB"/>
      <stop offset="0.6" stop-color="#22D6F6"/>
      <stop offset="1" stop-color="#0E7A93"/>
    </radialGradient>
    <filter id="ac-sh" x="-30%" y="-20%" width="160%" height="140%">
      <feDropShadow dx="0" dy="1.6" stdDeviation="1.4" flood-color="#0B0F18" flood-opacity="0.7"/>
    </filter>
  </defs>
  <g filter="url(#ac-sh)">
    <path d="M24 4 L40 11 V23 C40 32 33 39 24 44 C15 39 8 32 8 23 V11 Z" fill="url(#ac-shield)"/>
    <path d="M24 4 L40 11 V23 C40 32 33 39 24 44 C15 39 8 32 8 23 V11 Z" fill="url(#ac-hi)"/>
  </g>
  <circle cx="24" cy="22" r="4" fill="url(#ac-key)"/>
  <rect x="22.7" y="24" width="2.6" height="6" rx="1.3" fill="url(#ac-key)"/>
  <circle cx="24" cy="22" r="6" fill="none" stroke="#22D6F6" stroke-width="0.6" opacity="0">
    <animate attributeName="r" values="4;9;4" dur="2.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="2.6s" repeatCount="indefinite"/>
  </circle>

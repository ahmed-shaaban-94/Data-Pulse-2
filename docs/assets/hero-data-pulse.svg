<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" aria-labelledby="title desc" role="img" viewBox="0 0 1280 420"><title id="title">Data Pulse platform hero</title><desc id="desc">Enterprise SaaS hero showing tenant-safe retail data flowing through API, workers, contracts, PostgreSQL, and Redis.</desc><defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset=".5" stop-color="#10233d"/><stop offset="1" stop-color="#0f3b3f"/></linearGradient><linearGradient id="panel" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#fff" stop-opacity=".16"/><stop offset="1" stop-color="#fff" stop-opacity=".06"/></linearGradient><linearGradient id="accent" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#38bdf8"/><stop offset="1" stop-color="#2dd4bf"/></linearGradient><linearGradient id="gold" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#fbbf24"/><stop offset="1" stop-color="#f59e0b"/></linearGradient><filter id="shadow" width="140%" height="160%" x="-20%" y="-20%"><feDropShadow dx="0" dy="22" flood-color="#000" flood-opacity=".32" stdDeviation="18"/></filter><style>.eyebrow{font:700 15px Arial,sans-serif;letter-spacing:2px;fill:#67e8f9}.copy{font:500 21px Arial,sans-serif;fill:#cbd5e1}.chip{font:700 13px Arial,sans-serif;fill:#dbeafe}.nodeTitle{font:800 18px Arial,sans-serif;fill:#fff}.nodeText{font:600 13px Arial,sans-serif;fill:#dbeafe}.line{stroke:#67e8f9;stroke-width:3;stroke-linecap:round;fill:none;opacity:.7}</style></defs><rect width="1280" height="420" fill="url(#bg)"/><path fill="#0f766e" d="M0 410 C190 350 300 440 468 372 C665 292 810 360 992 294 C1122 247 1200 250 1280 224 L1280 420 L0 420 Z" opacity=".18"/><path fill="#2563eb" d="M0 456 C238 400 330 486 520 428 C710 370 820 430 1018 356 C1132 314 1215 316 1280 294 L1280 420 L0 420 Z" opacity=".16"/><g><text x="0" y="0" class="eyebrow" transform="translate(76 92)">MULTI-TENANT RETAIL SAAS FOUNDATION</text><text x="0" y="46" class="copy" transform="translate(76 92)">Secure API, worker, contract, and data primitives for</text><text x="0" y="78" class="copy" transform="translate(76 92)">tenant-safe retail operations at SaaS scale.</text><g transform="translate(76 92) translate(0 128)"><rect width="140" height="38" fill="#fff" stroke="#38bdf8" stroke-opacity=".45" opacity=".1" rx="19"/><text x="22" y="25" class="chip">Tenant-safe</text><rect width="152" height="38" x="158" fill="#fff" stroke="#38bdf8" stroke-opacity=".45" opacity=".1" rx="19"/><text x="181" y="25" class="chip">Contract-first</text><rect width="130" height="38" x="328" fill="#fff" stroke="#38bdf8" stroke-opacity=".45" opacity=".1" rx="19"/><text x="352" y="25" class="chip">Auditable</text></g></g><g filter="url(#shadow)" transform="translate(690 72)"><rect width="466" height="338" x="0" y="0" fill="url(#panel)" stroke="#94a3b8" stroke-opacity=".35" rx="24"/><g><path d="M72 80 C120 32 190 30 238 78" class="line" transform="translate(54 54)"/><path d="M92 175 C155 215 236 204 286 143" class="line" transform="translate(54 54)"/><path d="M244 78 C304 72 336 104 348 158" class="line" transform="translate(54 54)"/><g transform="translate(54 54)"><polygon fill="url(#accent)" points="42 78 96 48 150 78 96 108"/><polygon fill="#2563eb" points="42 78 96 108 96 158 42 128"/><polygon fill="#0891b2" points="96 108 150 78 150 128 96 158"/><text x="74" y="84" class="nodeTitle">API</text><text x="54" y="124" class="nodeText">NestJS</text></g><g transform="translate(54 54)"><polygon fill="url(#gold)" points="228 78 282 48 336 78 282 108"/><polygon fill="#d97706" points="228 78 282 108 282 158 228 128"/><polygon fill="#b45309" points="282 108 336 78 336 128 282 158"/><text x="249" y="84" class="nodeTitle">DB</text><text x="244" y="124" class="nodeText">Postgres</text></g><g transform="translate(54 54)"><polygon fill="#334155" points="132 198 186 168 240 198 186 228"/><polygon fill="#1e293b" points="132 198 186 228 186 278 132 248"/><polygon fill="#0f172a" points="186 228 240 198 240 248 186 278"/><text x="148" y="204" class="nodeTitle">Contracts</text><text x="151" y="244" class="nodeText">OpenAPI</text></g><g transform="translate(54 54)"><polygon fill="#14b8a6" points="286 186 340 156 394 186 340 216"/><polygon fill="#0f766e" points="286 186 340 216 340 266 286 236"/><polygon fill="#115e59" points="340 216 394 186 394 236 340 266"/><text x="302" y="192" class="nodeTitle">Worker</text><text x="314" y="232" class="nodeText">BullMQ</text></g></g></g></svg>
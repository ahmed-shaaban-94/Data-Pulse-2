<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" role="img" aria-labelledby="title desc">
  <title id="title">Shared utilities icon</title>
  <desc id="desc">Three-dimensional shared package nodes with animated connection arcs.</desc>
  <defs>
    <linearGradient id="sh-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f1f5f9"/>
      <stop offset="1" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="sh-a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="0.6" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="sh-b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="0.6" stop-color="#0d9488"/>
      <stop offset="1" stop-color="#134e4a"/>
    </linearGradient>
    <linearGradient id="sh-c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fcd34d"/>
      <stop offset="0.6" stop-color="#d97706"/>
      <stop offset="1" stop-color="#7c2d12"/>
    </linearGradient>
    <radialGradient id="sh-hi" cx="0.3" cy="0.3" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.65"/>
      <stop offset="0.7" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="sh-shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="96" height="96" rx="20" fill="url(#sh-bg)"/>
  <ellipse cx="48" cy="84" rx="24" ry="3" fill="#1e293b" opacity="0.2"/>
  <path stroke="#475569" stroke-linecap="round" stroke-width="2.5" fill="none" opacity="0.85" d="M41 35h14M36 44l9 14M60 44l-9 14"/>
  <g filter="url(#sh-shadow)">
    <circle cx="30" cy="32" r="13" fill="url(#sh-a)"/>
    <circle cx="30" cy="32" r="13" fill="url(#sh-hi)"/>
    <circle cx="66" cy="32" r="13" fill="url(#sh-b)"/>
    <circle cx="66" cy="32" r="13" fill="url(#sh-hi)"/>
    <circle cx="48" cy="66" r="13" fill="url(#sh-c)"/>
    <circle cx="48" cy="66" r="13" fill="url(#sh-hi)"/>
  </g>
  <g>
    <circle r="2.4" fill="#dbeafe">
      <animateMotion dur="2.6s" repeatCount="indefinite" path="M30 32 L66 32"/>
      <animate attributeName="opacity" values="0;1;0" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.4" fill="#ccfbf1">
      <animateMotion dur="2.6s" begin="0.85s" repeatCount="indefinite" path="M66 32 L48 66"/>
      <animate attributeName="opacity" values="0;1;0" dur="2.6s" begin="0.85s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.4" fill="#fef3c7">
      <animateMotion dur="2.6s" begin="1.7s" repeatCount="indefinite" path="M48 66 L30 32"/>
      <animate attributeName="opacity" values="0;1;0" dur="2.6s" begin="1.7s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>

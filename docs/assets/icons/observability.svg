<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-labelledby="t d">
  <title id="t">Observability</title>
  <desc id="d">Telemetry chart with live line drawing.</desc>
  <defs>
    <linearGradient id="ob-frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F0CB6B"/>
      <stop offset="0.55" stop-color="#C8A24A"/>
      <stop offset="1" stop-color="#7A5A14"/>
    </linearGradient>
    <linearGradient id="ob-screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0F1A24"/>
      <stop offset="1" stop-color="#06121F"/>
    </linearGradient>
    <linearGradient id="ob-hi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="ob-sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.6" stdDeviation="1.4" flood-color="#0B0F18" flood-opacity="0.7"/>
    </filter>
  </defs>
  <g filter="url(#ob-sh)">
    <rect x="6" y="10" width="36" height="28" rx="3" fill="url(#ob-frame)"/>
    <rect x="6" y="10" width="36" height="28" rx="3" fill="url(#ob-hi)"/>
    <rect x="8.5" y="12.5" width="31" height="23" rx="2" fill="url(#ob-screen)"/>
  </g>
  <g stroke="#22D6F6" stroke-width="0.5" opacity="0.3">
    <path d="M8.5 17 H39.5"/>
    <path d="M8.5 22 H39.5"/>
    <path d="M8.5 27 H39.5"/>
    <path d="M8.5 32 H39.5"/>
  </g>
  <path d="M10 30 L16 24 L22 28 L28 18 L34 22 L38 14" fill="none" stroke="#22D6F6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="stroke-dasharray" values="0 80;80 0" dur="2.6s" repeatCount="indefinite"/>
  </path>
  <g fill="#22D6F6">
    <circle cx="16" cy="24" r="1.6"><animate attributeName="opacity" values="0;1;0" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="28" cy="18" r="1.6"><animate attributeName="opacity" values="0;1;0" dur="2.6s" begin="0.8s" repeatCount="indefinite"/></circle>
    <circle cx="38" cy="14" r="1.6"><animate attributeName="opacity" values="0;1;0" dur="2.6s" begin="1.6s" repeatCount="indefinite"/></circle>
  </g>
</svg>

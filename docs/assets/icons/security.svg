<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" role="img" aria-labelledby="title desc">
  <title id="title">Security icon</title>
  <desc id="desc">Three-dimensional shield representing the platform default-deny security posture.</desc>
  <defs>
    <linearGradient id="sec-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eff6ff"/>
      <stop offset="1" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="sec-shield" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="0.5" stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="sec-hi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="sec-core" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.5" stop-color="#dbeafe"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </radialGradient>
    <filter id="sec-shadow" x="-30%" y="-10%" width="160%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#1e3a8a" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="96" height="96" rx="20" fill="url(#sec-bg)"/>
  <ellipse cx="48" cy="84" rx="22" ry="3" fill="#1e3a8a" opacity="0.18"/>
  <g filter="url(#sec-shadow)">
    <path d="M48 12 76 22v22c0 19-11 32-28 41-17-9-28-22-28-41V22z" fill="url(#sec-shield)"/>
    <path d="M48 12 76 22v22c0 19-11 32-28 41-17-9-28-22-28-41V22z" fill="url(#sec-hi)"/>
  </g>
  <circle cx="48" cy="48" r="14" fill="none" stroke="#bfdbfe" stroke-width="2" opacity="0.85"/>
  <circle cx="48" cy="48" r="6" fill="url(#sec-core)">
    <animate attributeName="r" values="6;7.5;6" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <path d="m36 49 8 8 18-22" fill="none" stroke="#dbeafe" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>

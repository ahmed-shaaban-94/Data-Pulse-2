<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" aria-labelledby="title desc" role="img" viewBox="0 0 96 96"><title id="title">Auth icon</title><desc id="desc">Three-dimensional padlock with a pulsing token core, representing argon2id auth and bearer tokens.</desc><defs><linearGradient id="au-bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#ecfdf5"/><stop offset="1" stop-color="#a7f3d0"/></linearGradient><linearGradient id="au-body" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#5eead4"/><stop offset=".55" stop-color="#0d9488"/><stop offset="1" stop-color="#134e4a"/></linearGradient><linearGradient id="au-shackle" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#0f766e"/><stop offset="1" stop-color="#065f46"/></linearGradient><linearGradient id="au-hi" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#fff" stop-opacity=".55"/><stop offset=".45" stop-color="#fff" stop-opacity="0"/></linearGradient><radialGradient id="au-core" cx=".5" cy=".4" r=".6"><stop offset="0" stop-color="#ccfbf1"/><stop offset=".5" stop-color="#14b8a6"/><stop offset="1" stop-color="#0f766e"/></radialGradient><filter id="au-shadow" width="140%" height="160%" x="-20%" y="-20%"><feDropShadow dx="0" dy="3" flood-color="#064e3b" flood-opacity=".45" stdDeviation="3"/></filter></defs><rect width="96" height="96" fill="url(#au-bg)" rx="20"/><ellipse cx="48" cy="84" fill="#064e3b" opacity=".22" rx="22" ry="3"/><g filter="url(#au-shadow)"><path fill="none" stroke="url(#au-shackle)" stroke-linecap="round" stroke-width="7" d="M34 42v-9c0-9 6-15 14-15s14 6 14 15v9"/><rect width="46" height="36" x="25" y="42" fill="url(#au-body)" rx="8"/><rect width="46" height="36" x="25" y="42" fill="url(#au-hi)" rx="8"/></g><circle cx="48" cy="58" r="6" fill="url(#au-core)"><animate attributeName="r" dur="2.4s" repeatCount="indefinite" values="6;7.5;6"/><animate attributeName="opacity" dur="2.4s" repeatCount="indefinite" values="1;0.85;1"/></circle><path stroke="#ccfbf1" stroke-linecap="round" stroke-width="4" d="M48 64v8"/></svg>
<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" aria-labelledby="t d" role="img" viewBox="0 0 48 48"><title id="t">Tenant isolation</title><desc id="d">Four separated tenant cells inside a secure boundary.</desc><defs><linearGradient id="ti-frame" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#F0CB6B"/><stop offset=".55" stop-color="#C8A24A"/><stop offset="1" stop-color="#7A5A14"/></linearGradient><linearGradient id="ti-cell-1" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#A8F4FB"/><stop offset="1" stop-color="#22D6F6"/></linearGradient><linearGradient id="ti-cell-2" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#F0CB6B"/><stop offset="1" stop-color="#C8A24A"/></linearGradient><linearGradient id="ti-hi" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#fff" stop-opacity=".4"/><stop offset=".5" stop-color="#fff" stop-opacity="0"/></linearGradient><filter id="ti-sh" width="140%" height="140%" x="-20%" y="-20%"><feDropShadow dx="0" dy="1.6" flood-color="#0B0F18" flood-opacity=".7" stdDeviation="1.4"/></filter></defs><g filter="url(#ti-sh)"><rect width="36" height="36" x="6" y="6" fill="none" stroke="url(#ti-frame)" stroke-width="2" rx="4"/><rect width="13" height="13" x="10" y="10" fill="url(#ti-cell-1)" rx="1.5"/><rect width="13" height="13" x="25" y="10" fill="url(#ti-cell-2)" rx="1.5"/><rect width="13" height="13" x="10" y="25" fill="url(#ti-cell-2)" rx="1.5"/><rect width="13" height="13" x="25" y="25" fill="url(#ti-cell-1)" rx="1.5"/><rect width="13" height="13" x="10" y="10" fill="url(#ti-hi)" rx="1.5"/><rect width="13" height="13" x="25" y="10" fill="url(#ti-hi)" rx="1.5"/><rect width="13" height="13" x="10" y="25" fill="url(#ti-hi)" rx="1.5"/><rect width="13" height="13" x="25" y="25" fill="url(#ti-hi)" rx="1.5"/></g><g stroke="#C8A24A" stroke-linecap="round" stroke-width="1.4" opacity=".85"><path d="M24 8 V40"/><path d="M8 24 H40"/></g><circle cx="24" cy="24" r="2.4" fill="#22D6F6"><animate attributeName=
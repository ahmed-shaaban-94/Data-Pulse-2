<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" role="img" aria-labelledby="title desc">
  <title id="title">API icon</title>
  <desc id="desc">Three-dimensional hexagonal API gateway with pulsing core.</desc>
  <defs>
    <linearGradient id="api-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eff6ff"/>
      <stop offset="1" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="api-outer" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="0.5" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="api-inner" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#0891b2"/>
      <stop offset="1" stop-color="#155e75"/>
    </linearGradient>
    <linearGradient id="api-hi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="api-core" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.6" stop-color="#bae6fd"/>
      <stop offset="1" stop-color="#2563eb"/>
    </radialGradient>
    <filter id="api-shadow" x="-30%" y="-10%" width="160%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#1e3a8a" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="96" height="96" rx="20" fill="url(#api-bg)"/>
  <ellipse cx="48" cy="84" rx="22" ry="3" fill="#1e3a8a" opacity="0.18"/>
  <g filter="url(#api-shadow)">
    <path d="M48 14 78 31v34L48 82 18 65V31z" fill="url(#api-outer)"/>
    <path d="M48 14 78 31v34L48 82 18 65V31z" fill="url(#api-hi)"/>
    <path d="M48 24 68 36v24L48 72 28 60V36z" fill="url(#api-inner)"/>
    <path d="M48 24 68 36v24L48 72 28 60V36z" fill="url(#api-hi)" opacity="0.6"/>
  </g>
  <circle cx="48" cy="48" r="6" fill="url(#api-core)">
    <animate attributeName="r" values="6;8;6" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.8;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <g stroke="#dbeafe" stroke-width="2.5" stroke-linecap="round" opacity="0.85">
    <path d="M48 30v6"/>
    <path d="M48 60v6"/>
    <path d="M30 42l5 3"/>
    <path d="M61 51l5 3"/>
    <path d="M30 54l5-3"/>
    <path d="M61 45l5-3"/>
  </g>
  <text x="48" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="800" fill="#ffffff" letter-spacing="1">API</text>
</svg>

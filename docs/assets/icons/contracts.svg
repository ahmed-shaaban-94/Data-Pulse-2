<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-labelledby="t d">
  <title id="t">Contracts</title>
  <desc id="d">Layered OpenAPI contract sheets.</desc>
  <defs>
    <linearGradient id="co-back" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7A5A14"/>
      <stop offset="1" stop-color="#5A4310"/>
    </linearGradient>
    <linearGradient id="co-front" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F0CB6B"/>
      <stop offset="0.55" stop-color="#C8A24A"/>
      <stop offset="1" stop-color="#7A5A14"/>
    </linearGradient>
    <linearGradient id="co-hi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="co-sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.6" stdDeviation="1.4" flood-color="#0B0F18" flood-opacity="0.7"/>
    </filter>
  </defs>
  <g filter="url(#co-sh)">
    <rect x="10" y="8" width="22" height="30" rx="2.5" fill="url(#co-back)"/>
    <rect x="18" y="14" width="22" height="30" rx="2.5" fill="url(#co-front)"/>
    <rect x="18" y="14" width="22" height="30" rx="2.5" fill="url(#co-hi)"/>
  </g>
  <g stroke="#0B0F18" stroke-width="1.6" stroke-linecap="round" opacity="0.6">
    <path d="M22 22 H36"/>
    <path d="M22 28 H33"/>
    <path d="M22 34 H30"/>
  </g>
  <circle cx="36" cy="40" r="3.2" fill="#22D6F6">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>

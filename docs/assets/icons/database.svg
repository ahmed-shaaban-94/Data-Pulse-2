<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-labelledby="t d">
  <title id="t">Database</title>
  <desc id="d">PostgreSQL system-of-record cylinder with depth.</desc>
  <defs>
    <linearGradient id="dbi-body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5A4310"/>
      <stop offset="0.5" stop-color="#C8A24A"/>
      <stop offset="1" stop-color="#7A5A14"/>
    </linearGradient>
    <linearGradient id="dbi-top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0CB6B"/>
      <stop offset="1" stop-color="#7A5A14"/>
    </linearGradient>
    <linearGradient id="dbi-hi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="dbi-sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.6" stdDeviation="1.4" flood-color="#0B0F18" flood-opacity="0.7"/>
    </filter>
  </defs>
  <g filter="url(#dbi-sh)">
    <path d="M8 14 V36 c0 4 7 7 16 7 s16 -3 16 -7 V14" fill="url(#dbi-body)"/>
    <path d="M8 14 V36 c0 4 7 7 16 7 s16 -3 16 -7 V14" fill="url(#dbi-hi)"/>
    <ellipse cx="24" cy="14" rx="16" ry="6" fill="url(#dbi-top)"/>
    <ellipse cx="24" cy="14" rx="16" ry="6" fill="none" stroke="#5A4310" stroke-width="0.8"/>
  </g>
  <path d="M8 23 c0 4 7 7 16 7 s16 -3 16 -7" fill="none" stroke="#A8F4FB" stroke-width="1" opacity="0.7"/>
  <path d="M8 32 c0 4 7 7 16 7 s16 -3 16 -7" fill="none" stroke="#A8F4FB" stroke-width="1" opacity="0.7"/>
  <g>
    <circle cx="20" cy="10" r="1.4" fill="#22D6F6">
      <animate attributeName="cy" values="10;18;10" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="10" r="1.4" fill="#22D6F6">
      <animate attributeName="cy" values="10;18;10" dur="2.8s" begin="0.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="2.8s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
  </g>

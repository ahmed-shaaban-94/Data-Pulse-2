<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" role="img" aria-labelledby="title desc">
  <title id="title">OpenAPI contracts icon</title>
  <desc id="desc">Three-dimensional contract hub with orbiting tokens representing OpenAPI 3.1 endpoints.</desc>
  <defs>
    <linearGradient id="oa-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0fdfa"/>
      <stop offset="1" stop-color="#99f6e4"/>
    </linearGradient>
    <linearGradient id="oa-ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="0.55" stop-color="#0d9488"/>
      <stop offset="1" stop-color="#134e4a"/>
    </linearGradient>
    <radialGradient id="oa-core" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#ccfbf1"/>
      <stop offset="0.5" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#0f766e"/>
    </radialGradient>
    <linearGradient id="oa-hi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="oa-shadow" x="-30%" y="-10%" width="160%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#134e4a" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="96" height="96" rx="20" fill="url(#oa-bg)"/>
  <ellipse cx="48" cy="84" rx="22" ry="3" fill="#134e4a" opacity="0.2"/>
  <g filter="url(#oa-shadow)">
    <circle cx="48" cy="48" r="27" fill="none" stroke="url(#oa-ring)" stroke-width="7"/>
    <circle cx="48" cy="48" r="27" fill="none" stroke="url(#oa-hi)" stroke-width="7" opacity="0.6"/>
    <circle cx="48" cy="48" r="11" fill="url(#oa-core)"/>
  </g>
  <g stroke="#14b8a6" stroke-linecap="round" stroke-width="5" opacity="0.9">
    <path d="M48 21v10"/>
    <path d="M48 65v10"/>
    <path d="M21 48h10"/>
    <path d="M65 48h10"/>
  </g>
  <g>
    <circle r="3" fill="#5eead4">
      <animateMotion dur="3.6s" repeatCount="indefinite" path="M21 48 a27 27 0 1 0 54 0 a27 27 0 1 0 -54 0"/>
    </circle>
    <circle r="2.5" fill="#0d9488">
      <animateMotion dur="3.6s" begin="1.2s" repeatCount="indefinite" path="M21 48 a27 27 0 1 0 54 0 a27 27 0 1 0 -54 0"/>
    </circle>
    <circle r="2.5" fill="#0f766e">
      <animateMotion dur="3.6s" begin="2.4s" repeatCount="indefinite" path="M21 48 a27 27 0 1 0 54 0 a27 27 0 1 0 -54 0"/>
    </circle>
  </g>
</svg>
